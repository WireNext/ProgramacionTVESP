oro", "desc": "Doraemon, Nobita, Shizuka, Gian y Suneo zarpan hacia el mar del Caribe en busca de aventuras. Nobita es el capitán del barco y el encargado de pelear contra los enemigos que abordan el barco en mitad de su trayecto. Sin embargo, no puede evitar que Shizuka sea raptada. Además, una tormenta impide que la tripulación pueda ir tras ellos. Finalmente, con la ayuda de Mini-Dora navegan siguiendo el rastro de los villanos que persiguen, avistando tierra en la misteriosa Isla del Tesoro. Una vez allí, descubrirán que la isla encierra muchos más secretos de los que ellos nunca pudieron imaginar.", "categoria": "FILM", "emoji": "📡"}, {"hora": "17:55", "fin": "19:24", "titulo": "El oso Yogui", "desc": "El parque de Jellystone está perdiendo visitantes, así que el alcalde ha decidido cerrarlo y vender el terreno. Eso significa que las familias no podrán disfrutar de la belleza de la naturaleza al aire libre y, lo que es peor, que los osos Yogui y Bubu serán expulsados del único hogar que han conocido. Yogui deberá unir sus fuerzas a las de Bubu y el agente Smith para encontrar una forma de salvar el parque del cierre definitivo.", "categoria": "FILM", "emoji": "📡"}, {"hora": "19:24", "fin": "19:51", "titulo": "Doraemon", "desc": "Nobita es un niño que vive con Doraemon, un gato cósmico, procedente del siglo XXII. La misión de Doraemon es proteger a Nobita y sacarlo de líos. Doraemon tiene un bolsillo que está en contacto con el siglo XXII y le proporciona los inventos más sorprendentes, que utiliza para salvar a Nobita, aunque casi siempre son empleados equivocadamente. De esta manera, Doraemon termina por complicar más los líos en donde se mete. Aparte de Doraemon, Nobita tiene otro amigo, Shizuka, una niña generosa y amable de la cual está enamorado.", "categoria": "KIDS", "emoji": "🧸"}, {"hora": "19:51", "fin": "20:20", "titulo": "Doraemon", "desc": "Nobita es un niño que vive con Doraemon, un gato cósmico, procedente del siglo XXII. La misión de Doraemon es  la salut, la natura i la vida quotidiana. Un programa per compartir coneixements amb científics i experts.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "04:31", "fin": "05:00", "titulo": "Quèquicom", "desc": "Tenir ploma. Espai divulgatiu en què diferents reporters mostren de forma amena, clara i entenedora la relació entre la ciència i diferents aspectes de la salut, la natura i la vida quotidiana. Un programa per compartir coneixements amb científics i experts.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "05:00", "fin": "05:46", "titulo": "La Renaixença", "desc": "Les espardenyes. No ets bon català si no has portat unes espardenyes en algun moment de la teva vida. Pot ser que sigui el millor calçat que podem portar? Avui els hi dediquem el capítol.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "05:46", "fin": "06:42", "titulo": "Vosaltres mateixos", "desc": "Infiltració sorpresa. El reporter d'investigació Carles Tamayo s'infiltra al programa com un membre (més) de l'equip sense que ni l'Andreu ni la majoria de companys ho sàpiguen.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "06:42", "fin": "07:40", "titulo": "Vosaltres mateixos", "desc": "A bon port. L'Andreu parla amb el creador de la barretina més llarga del món i amb un valent que s'ha construït una embarcació per travessar l'Atlàntic a rem.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "07:40", "fin": "08:26", "titulo": "El convidat", "desc": "Peret. Albert Om passa un cap de setmana amb Peret, el rei de la rumba. Presentador i cantant han compartit dos dies de confidències en els quals Om ha pogut descobrir les contradiccions d'un món, el gitano, que Peret sempre ha treballat per canviar.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "08:26", "fin": "09:14", "titulo": "El convidat", "desc": "Joaquim Barraquer. Albert Om passa un cap de setmana en una clínica. És on viu el doctor Barraquer, un dels millors oftalmòlegs del món, però també un personatge singular que Om descobrirà a través de dos dies de converses. Un metge de fortes conviccions, tant a la vida com a la feina.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "09:14", "fin": "10:02", "titulo": "El Foraster", "desc": "La Vall d'Àger. La Vall d'Àger, a la comarca de la Noguera, és la meca del vol lliure i també és un indret únic per l'observació astronòmica. Diuen que Àger té el millor cel de Catalunya, i en Quim hi arriba amb la intenció de conèixer la gent que viu just a sota.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "10:02", "fin": "10:52", "titulo": "El Foraster", "desc": "Sant Martí de Llémena. Sant Martí de Llémena, a la comarca del Gironès, està format per cinc nuclis dispersos al llarg i a l'ample d'una vall de conte, situada a només deu minuts de la ciutat de Girona. Fent quilòmetres amunt i avall, en Quim coneixerà els seus habitants.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "10:52", "fin": "11:39", "titulo": "Natura sàvia", "desc": "Ocells marins. De les Illes Medes fins a Sant Carles de la Ràpita, de punta a punta de Catalunya resseguint el mar per conèixer algunes espècies que no toquen mai terra ferma. Per fi aprendrem a diferenciar les gavines dels gavians.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "11:39", "fin": "12:26", "titulo": "La Renaixença", "desc": "El ciri. Qui no ha intentat encendre un ciri a casa perquè se li compleixi algun desig tot i no haver cregut mai en res? Doncs això intentem fer a ''La Renaixença'' dedicant-li aquest capítol.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "12:26", "fin": "12:53", "titulo": "Quèquicom", "desc": "Legionel·la, la malaltia nebulosa. Espai divulgatiu en què diferents reporters mostren de forma amena, clara i entenedora la relació entre la ciència i diferents aspectes de la salut, la natura i la vida quotidiana. Un programa per compartir coneixements amb científics i experts.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "12:53" a convertir en un fenomen arreu del món.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "16:01", "fin": "17:14", "titulo": "Sense ficció: Estimant Maradona", "desc": "Què tenen en comú un noi jugant en un carrer de Vila Fiorito i l'amo d'una cantina de Nàpols? Què tenen en comú 500 persones celebrant el nadal el 30 d'octubre i 25 fanàtics del futbol mostrant els seus tatuatges? Tots estan estimant a Maradona. És el mateix Diego qui repassa la seva vida des de Cuba i ens introdueix en un viatge que va trobant la passió dels seus seguidors a tot el món en un documental dirigit per Javier Vázquez l'any 2005.", "categoria": "FILM", "emoji": "📡"}, {"hora": "17:14", "fin": "18:07", "titulo": "Mundo mineral: Granito", "desc": "Hi ha una roca que constitueix una bona part de l'escorça dels nostres continents i de les arrels de les nostres muntanyes. És gairebé indestructible. Amb el temps, però, acaba transformant-se i convertint-se en un autèntic suport per al desenvolupament de la vida.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "18:07", "fin": "19:00", "titulo": "Las recetas de Julie: El Valle de Maurienne", "desc": "Vall de Maurienne. En aquest episodi, la Julie se'n va a la neu i visita la vall de Maurienne, a la regió de Savoia. Per començar, viu l'experiència d'anar amb un trineu de gossos amb en Christophe. Tot seguit, aprèn a elaborar una pasta típica de la regió, els crozets, amb la Marie-Aude.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "19:00", "fin": "19:28", "titulo": "Quèquicom", "desc": "QQC i... matemàtiques: fent números. Espai divulgatiu en què diferents reporters mostren de forma amena, clara i entenedora la relació entre la ciència i diferents aspectes de la salut, la natura i la vida quotidiana. Un programa per compartir coneixements amb científics i experts.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "19:28", "fin": "19:58", "titulo": "Quèquicom", "desc": "QQC i... la genètica. Espai divulgatiu en què diferents reporters mostren de forma amena, clara i entenedora la relació entre la ciència i diferents aspectes de la salut, la natura i la vida quotidiana. Un programa per compartir coneixements amb científics i experts.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "19:58", "fin": "20:24", "titulo": "Volcanes y hombres: Etna", "desc": "Arnaud Guérin, fotògraf professional i geòleg apassionat per la vulcanologia, se'n va a Sicília, per conèixer persones que viuen a tocar de l'Etna. Ens mostrarà, entre d'altres coses, les tradicions populars i religioses que ha originat el perill constant de l'Etna.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "20:24", "fin": "20:44", "titulo": "Marcians", "desc": "Trencar el ritme. Espai que busca explicar des de la cultura i l'art diversos aspectes de la condició humana. El programa vol conèixer personalitats singulars que fan d'aquest planeta un lloc més interessant i també busca en el món de la creació respostes per entendre el nostre present.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "20:44", "fin": "21:39", "titulo": "avis", "desc": "Elena Barraquer. Nascuda a Barcelona. Filla, neta i besneta de cèlebres oftalmòlegs, no va sorprendre ningú que triés el mateix camí. Des de fa anys, combina la pràctica clínica amb expedicions al continent africà, on ajuda persones sense accés a la cirurgia ocular a recuperar la visió.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "21:39", "fin": "22:30", "titulo": "Han robat ''La Gioconda''", "desc": "L'any 1911, ''La Gioconda'' va ser robada del Museu del Louvre en un dels casos més sorprenents de la història de l'art. La investigació, plena de girs i sospitosos il·lustres, com Picasso, es desenvolupa en un clima de tensió política i desperta un interès mundial.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "22:30", "fin": "23:14", "titulo": "Tesoros perdidos de Egipto: Los secretos sin resolver de Tutankamón", "desc": "Avui dia, Tutankamon és el faraó més conegu , pensamiento y personalidades de la vida judía en España y en el resto del mundo.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "08:05", "fin": "08:30", "titulo": "Últimas preguntas", "desc": "Programa religioso sobre temas de interés cultural, histórico, católico, moral y familiar. ''Últimas preguntas'' analiza la presencia de la Iglesia en la cultura y la sociedad actual. Cada programa incluye un reportaje y una entrevista a personas relevantes de la sociedad sobre un tema de actualidad, como la posición de la Iglesia frente al terrorismo, la ley de política familiar o la entrada en vigor del euro. El espacio religioso intenta abordar cuestiones relacionadas con la fe católica desde distintos aspectos y analizar el contenido de los documentos que publique la santa sede o la conferencia episcopal española; así como acercar la situación de los católicos en algunos lugares del mundo o el diálogo entre distintas religiones.''Últimas preguntas'', programa elaborado por los Servicios Religiosos de Televisión Española, empezó su andadura el 30 de octubre de 1983, por lo que supera los veinte años en antena.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "08:30", "fin": "08:35", "titulo": "Testimonio", "desc": "Miniespacio de cinco minutos que ofrece reportajes narrados en primera persona, intercalando personajes anónimos y rostros conocidos, con el objetivo de dar a conocer las distintas realidades de la Iglesia. Su meta es acercar la dimensión religiosa y trascendente al hombre a través de la vida de sacerdotes, religiosos, laicos, adultos, jóvenes y de su forma de entender la religión. El espacio abarca temas tan diversos como la vocación, la acción sociocaritativa de la iglesia, la enfermedad, la marginación o la exclusión social. El programa también tiene en cuenta el calendario litúrgico, atendiendo a las distintas efemérides como la navidad, la pascua, el pentecostés, el mes de María, la jornada del enfermo, la época de las primeras comuniones... però también atiende a acontecimientos de carácter social como la entrega de la declaración de la renta.''Testimonio'' es un programa elaborado por los Servicios Religiosos de Televisión Española.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "08:35", "fin": "09:00", "titulo": "Pueblo de Dios", "desc": "Programa religioso que ofrece reportajes sobre el trabajo que realizan las ONG o comunidades religiosas en España y en el mundo. Retrata los proyectos que se desarrollan en el campo de la educación y la salud para ayudar a las capas sociales más necesitadas.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "09:00", "fin": "10:00", "titulo": "El día del señor", "desc": "Programa religioso que retransmite la celebración de la eucaristía desde diferentes parroquias de toda España y un reportaje relacionado con la localidad, su patrimonio cultural, artístico, o de la festividad que se celebra en la liturgia.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "10:00", "fin": "10:35", "titulo": "España pueblo a pueblo", "desc": "Almagro-La Laguna. Recorre los rincones más auténticos del país, descubriendo localidades con historia, tradiciones y personajes únicos que reflejan la riqueza cultural y humana de España.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "10:35", "fin": "11:05", "titulo": "España pueblo a pueblo", "desc": "Alcañiz y Teror. Recorre los rincones más auténticos del país, descubriendo localidades con historia, tradiciones y personajes únicos que reflejan la riqueza cultural y humana de España.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "11:05", "fin": "11:30", "titulo": "Flash Moda", "desc": "La cadena pública desfila por la pasarela de la mano de Nieves Álvarez en este repaso a las novedades del mundo de la moda, las últimas tendencias y las colecciones de vanguardia. Además, el programa presta especial atención al trabajo de los diseñadores españoles.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "11:30", "fin": "12:00", "titulo": " n santuario de la vida, en lo profundo del corazón de Texas.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "14:29", "fin": "15:29", "titulo": "Antilopes, los heroes anonimos de las llanuras", "desc": "La vida de un antílope rara vez es fácil y se enfrenta a condiciones climáticas extremas, ríos, incendios y depredadores de todas las formas y tamaños.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:29", "fin": "15:53", "titulo": "Grandes viajes en tren: Suecia 2ª Parte", "desc": "Philippe nos lleva al norte, a Suecia. Su viaje comienza más allá del Círculo Polar, en Laponia.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:53", "fin": "16:26", "titulo": "Grandes viajes en tren: Mongolia 1ª Parte", "desc": "Nuestro trotamundos, Philippe Gougler, decide atravesar Mongolia de norte a sur, utilizando la única línea ferroviaria abierta a los viajeros.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "16:26", "fin": "17:13", "titulo": "Europa desde el cielo: Irlanda", "desc": "Este espectacular viaje aéreo muestra Irlanda como nunca antes se había visto. Las cámaras aéreas descubren la tecnología que se esconde detrás de uno de los campos deportivos de más alta tecnología de Europa, sobrevuelan el dramático espectáculo del Deer Rut de Dublín y siguen a un equipo que salva a las focas grises protegidas de Irlanda. Junto a la escarpada costa occidental y las islas fracturadas, descubriremos los logros de la ingeniería que están actualizando el campo rural de Irlanda.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "17:13", "fin": "18:01", "titulo": "Europa desde el cielo: Islandia", "desc": "Este espectacular viaje aéreo muestra Islandia como nunca antes se había visto. Las cámaras de los drones siguen a los arqueólogos que luchan contra las erupciones volcánicas para salvar la historia de los vikingos, captan las raras vistas de las ballenas jorobadas y revelan las quitanieves cuidadosamente coreografiadas que luchan por limpiar las pistas del aeropuerto en invierno. En el país del fuego y el hielo, sobrevolaremos las maravillas arquitectónicas modernas que brillan en el dramático paisaje islandés.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "18:01", "fin": "19:04", "titulo": "Escocia desde el aire", "desc": "El presentador James Crawford nos revela cómo los urbanistas y arquitectos tomaron los cielos de Escocia tras la Segunda Guerra Mundial y utilizaron el punto de vista \"celestial\" en su tarea de rediseñar pueblos y ciudades a lo largo y ancho del Cinturón Central. Desde uno de los primeros bloques de pisos de Escocia, pasando por viviendas en la Ciudad Nueva, hasta la construcción de una autopista que llegaba hasta el corazón de Glasgow..., junto con la visión para abarcarlo todo, James nos descubre cómo estas controvertidas y utópicas visiones han transformado nuestras vidas y cómo estamos conviviendo con ese legado hasta el día de hoy.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:04", "fin": "19:55", "titulo": "Escocia desde el aire", "desc": "None", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:55", "fin": "20:54", "titulo": "Europa desde el cielo: Península Ibérica", "desc": "Este recorrido aéreo por la península ibérica, y por los tres paises la comparten. Sus principales ciudades, Lisboa, Barcelona, Madrid, Bilbao, Cádiz.. y sus obras de ingeniería, visitaremos una  muestra una montaña rusa de récord, unos trabajos de limpieza de ventanas espeluznantes en Bernidorm y el parque solar flotante más grande de Europa.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "20:54", "fin": "21:57", "titulo": "Fútbol es fútbol", "desc": "El programa, que hizo su debut en 1994, vuelve en una versión renovada de la mano de Javier Callejo, actual director de Deportes de RTVM. Con esta nueva etapa, el espacio busca mantener su vocación original de combinar entretenimiento y fútbol.", "categoria": "SPORTS", "emoji": "⚽"}, {"hora": "21:57", "fin": "22:55", "titulo": "Atlántico: Un mal presagio", "desc": "En la costa de Ghana siguen en pie los fuertes que se destinaron al comercio de esclavos. Entrarán en sus mazmorras y en la capital visitarán el mayor vertedero electrónico del mundo. Vinsen regresa recuperado de Madrid y se sumergen en el mundo del vudú.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "22:55", "fin": "23:49", "titulo": "Atlántico: Retorno al origen", "desc": "Daniel y Vinsen, a pesar de 9 meses de parón debido a la pandemia, deciden continuar el viaje. Benín y Camerún serán su destino. Cruzarán el Parque Nacional de Pendjari, convivirán con los pigmeos baka y los koma, una tribu de las montañas.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "23:49", "fin": "00:34", "titulo": "Una historia de crímenes: Jurado popular", "desc": "Desde 1995, cualquier ciudadano mayor de edad en España puede ser llamado a formar parte de un jurado popular en casos de asesinato u homicidio. En este episodio se abordará el funcionamiento de esta figura, sus ventajas y desventajas.", "categoria": "DOCUMENTARY", "emoji": "🎥"}]}, {"id": "Mitele_Calle.TV", "name": "Mitele_Calle.TV", "icon": "", "programs": [{"hora": "00:20", "fin": "01:00", "titulo": "Callejeros", "desc": "Serie de documentales-reportajes de temática social en los que un cámara y un periodista muestran aspectos de la vida cotidiana que no suelen aparecer en los medios de comunicación.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "01:00", "fin": "01:40", "titulo": "Callejeros", "desc": "Serie de documentales-reportajes de temática social en los que un cámara y un periodista muestran aspectos de la vida cotidiana que no suelen aparecer en los medios de comunicación.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "01:40", "fin": "02:40", "titulo": "Conexión Samanta", "desc": "Espacio de investigación y reportajes presentado por Samanta Villar.", "categoria": "None", "emoji": "📡"}, {"hora": "02:40", "fin": "04:00", "titulo": "Conexión Samant con el toque frutal de las uvas. Y para rematar, un postre 100% casero, tulipas con crema de naranja y merengue.", "categoria": "None", "emoji": "📡"}, {"hora": "01:45", "fin": "02:16", "titulo": "Torres en la cocina - Al buen tiempo legumbres", "desc": "Los hermanos Torres dedican hoy el programa a las legumbres y cocinan una ensalada de lentejas con arenque y unas deliciosas y sutiles habitas con langostinos.", "categoria": "None", "emoji": "📡"}, {"hora": "02:16", "fin": "02:47", "titulo": "Torres en la cocina - Lasaña de verduras y lubina con gambas", "desc": "Sergio y Javier van a cocinar una lasaña hecha solo de verduras y acompañada de una pasta de remolacha y además unos rollitos de lubina con gambas. Como invento, una fuente de sandía con su propia pulpa y carcasa.", "categoria": "None", "emoji": "📡"}, {"hora": "02:47", "fin": "03:18", "titulo": "Torres en cocina Lasaña crujiente crema galletas chocolate", "desc": "Lasaña crujiente y crema de galletas y chocolate. Hoy cocina con Javier y Sergio el humorista David Guapo una lasaña crujiente rellena de verduras y una base hecha con galletas de chocolate que están rellenas con crema de chocolate blanco.", "categoria": "None", "emoji": "📡"}, {"hora": "03:18", "fin": "04:00", "titulo": "A pedir de boca - Queso denominación origen Cabrales", "desc": "El queso de Cabrales.", "categoria": "None", "emoji": "📡"}, {"hora": "04:00", "fin": "04:28", "titulo": "El señor de los bosques - Las fragas do Eume", "desc": "Hoy visitaremos el bosque del río Eume, es uno de los bosques de ribera mejor conservados de Europa con una dimensión de nueve mil hectáreas, su sío es fundamental para este ecosistema y también para los vecinos que viven cerca. Belinda Washington nos acompañará en este mágico recorrido.", "categoria": "None", "emoji": "📡"}, {"hora": "04:28", "fin": "04:57", "titulo": "El señor de los bosques - Las fragas de Cataso", "desc": "Esta semana vamos a recorrer la Fraga de Catasos en Pontevedra, sus castaños centenarios alcanzan los treinta metros de altura y son los que crecen más rápido de toda Europa, Pepe Solla jefe de cocina y propietario de Casa Solla nos acompañará en este recorrido por los seccretos del bosque.", "categoria": "None", "emoji": "📡"}, {"hora": "04:57", "fin": "05:25", "titulo": "El señor de los bosques - Collsacabra", "desc": "Hoy estamos no muy lejos del bullicio de Barcelona, donde se encuentra la comarca de Collsacabra. Este bosque mezcla lo mediterráneo con lo centroeuropeo gracias a las lluvias abundantes y a su gran riqueza botánica y micológica. Nos acompañará en esta ocasión Odile Rodríguez de la Fuente.", "categoria": "None", "emoji": "📡"}, {"hora": "05:25", "fin": "05:54", "titulo": "El señor de los bosques - Pinilla del Valle", "desc": "Pinilla del Valle, zona de especial conservación en el parque nacional de Guadarrama, en la cocina Diego Ferrer nos espera con su receta y Rozalén nos acompañará en esta visita.", "categoria": "None", "emoji": "📡"}, {"hora": "05:54", "fin": "06:22", "titulo": "El señor de los bosques - Hayedo de Otzarreta- Bizkaia", "desc": "Hoy vamos a sumergirnos en uno de los hayedos más misterioso del país, el hayedo de Otzarreta- Bizkaia, un paisaje propicio para las setas y las flores que recorreremos de la mano de Anthony Blake.", "categoria": "None", "emoji": "📡"}, {"hora": "06:22", "fin": "06:51", "titulo": "El señor de los bosques - Guadalajara", "desc": "Esta semana hemos venido a la Sierra de Guadalajara, La Tejera Negra; reside su nombre en los Tejos que la cubrían antaño. Hoy los protagonistas serán las hayas, los pinos y los robles. Nos acompañará Juan Muñoz del dúo Cruz y Raya.", "categoria": "None", "emoji": "📡"}, {"hora": "06:51", "fin": "07:40", "titulo": "Cocina al punto con Peña y Tamara -Calabacín pollo,gratinado", "desc": "Calabacín relleno de pollo y gratinado. En el programa de hoy, Peña y Tamara cocinan dos recetas muy apetecibles: Calabacín relleno y un Falso capuccino. Ágatha Ruiz de la Prada,Ana Guerra a cocina - Albóndigas de pollo y barquillos", "desc": "Sergio y Javier cocinan unas albóndigas de pollo, pero con un ingrediente que les da un carácter diferente, las gambas y de postre unos barquillos rellenos de chocolate blanco y pistacho. La dietista Virginia Gómez habla de las listas de ingredientes que aparecen en los envasados.", "categoria": "None", "emoji": "📡"}, {"hora": "13:07", "fin": "13:39", "titulo": "Torres en la cocina - Le damos la vuelta", "desc": "Para comenzar el programa, Los Torres preparan un sabroso flan de bacalao. Y para finalizar, un delicioso arroz caldoso con pollo al chilindrón.", "categoria": "None", "emoji": "📡"}, {"hora": "13:39", "fin": "14:10", "titulo": "Torres en la cocina - El cerdo blanco", "desc": "Hoy los hermanos Torres proponen una receta de manitas de cerdo rellenas con una presentación diferente y muy sorprendente.", "categoria": "None", "emoji": "📡"}, {"hora": "14:10", "fin": "14:38", "titulo": "A pedir de boca - Jamón denominación origen Guijuelo", "desc": "A pedir de boca. Empezó el 5-8-2001. Serie documental de 8 capítulos, de 30 minutos de duración, dirigida por Rafael Romero.", "categoria": "None", "emoji": "📡"}, {"hora": "14:38", "fin": "15:07", "titulo": "A pedir de boca - Delicias gastronómicas tierras leonesas", "desc": "Delicias de tierras leonesas. Un viaje por la provincia de Leon para descubrir algunos de sus alimentos de calidad mas tipicos. Nos adentramos por los Ancares en la comarca berciana para investigar el origen del singular embutido: el Botillo de El Bierzo. Historia, elaboracion, cocinado y los goces de su degustacion, acompañado de los Vinos con Denominacion de Origen Bierzo. En Astorga, asistimos a la elaboración de la preciada Cecina de Leon. Y nos abandonamos en manos de grandes cocineros que nos procuran placeres gastronómicos insospechados. Histórico de emisiones: - 04/01/2001 - 14/05/2008.", "categoria": "None", "emoji": "📡"}, {"hora": "15:07", "fin": "15:34", "titulo": "A pedir de boca - ión en el parque nacional de Guadarrama, en la cocina Diego Ferrer nos espera con su receta y Rozalén nos acompañará en esta visita.", "categoria": "None", "emoji": "📡"}, {"hora": "18:55", "fin": "19:23", "titulo": "El señor de los bosques - Hayedo de Otzarreta- Bizkaia", "desc": "Hoy vamos a sumergirnos en uno de los hayedos más misterioso del país, el hayedo de Otzarreta- Bizkaia, un paisaje propicio para las setas y las flores que recorreremos de la mano de Anthony Blake.", "categoria": "None", "emoji": "📡"}, {"hora": "19:23", "fin": "19:52", "titulo": "El señor de los bosques - Guadalajara", "desc": "Esta semana hemos venido a la Sierra de Guadalajara, La Tejera Negra; reside su nombre en los Tejos que la cubrían antaño. Hoy los protagonistas serán las hayas, los pinos y los robles. Nos acompañará Juan Muñoz del dúo Cruz y Raya.", "categoria": "None", "emoji": "📡"}, {"hora": "19:52", "fin": "20:42", "titulo": "Cocina al punto con Peña y Tamara -Calabacín pollo,gratinado", "desc": "Calabacín relleno de pollo y gratinado. En el programa de hoy, Peña y Tamara cocinan dos recetas muy apetecibles: Calabacín relleno y un Falso capuccino. Ágatha Ruiz de la Prada,Ana Guerra,Begoña Fraire,Blanca Padilla,Cecilia Gómez,Cristina Figueira,Javier García Peña,José Mota,María Gómez García,Miriam Diaz Aroca,Natalia de Molina,Rocío Muñoz,Santi Rodríguez,Soraya Arnelas,Tamara Falcó.", "categoria": "None", "emoji": "📡"}, {"hora": "20:42", "fin": "21:33", "titulo": "Cocina al punto con Peña y Tamara - Torta del Casar", "desc": "El chef visita el Casar de Cáceres, en Extremadura para ver el proceso de fabricación de su famosa Torta del Casar. Ya en la cocina, Peña y Tamara cocinan Torta del Casar con mollejas fritas y setas de temporada y Bizcocho Bamboleante de queso. Invitado: Bruno Squarcia. Ágatha Ruiz de la Prada,Ana Guerra,Begoña Fraire,Blanca Padilla,Cecilia Gómez,Cristina Figueira,Javier García Peña,José Mota,María Gómez García,Miriam Diaz Aroca,Natalia de Molina,Rocío Muñoz,  "15:15", "titulo": "Alex Hugo", "desc": "Para lo bueno y para lo malo. En una pintoresca capilla de montaña, Juliette y Martin celebran su boda rodeados de familiares y amigos. La ceremonia transcurre entre sonrisas y emoción. Pero al salir de la iglesia, mientras los niños lanzan arroz y la pareja se besa, un disparo interrumpe la felicidad.Alex recibe un roce de bala, pero el novio cae gravemente herido, alcanzado en el pecho. La conmoción sacude al pueblo. ¿Quién querría matar a Martin el día de su boda y delante de todos?Mientras investiga, Alex descubre que Martin no era tan transparente como parecía. Cada pista abre una nueva línea de sospecha, y cada testigo aporta versiones incompletas o contradictorias.La verdad obligará a enfrentar traiciones, motivaciones ocultas y una red de mentiras construida durante años y que ahora se derrumba con violencia. Lo que debía ser un día de celebración se convierte en una prueba de resistencia emocional para Juliette. y en una carrera contrarreloj para Alex.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "15:15", "fin": "16:55", "titulo": "Alex Hugo", "desc": "La que perdona. Durante una salida a la montaña, Alex ve cómo una joven escaladora, Audrey, es secuestrada y arrastrada a la fuerza hacia un coche. Corre tras el vehículo, pero no consigue alcanzarlo. La víctima es la hija de un amigo muy cercano que murió salvando la vida de Alex. El secuestro revive en él sentimientos de culpa y dolor que creía controlados.La alerta de secuestro moviliza a la policía de Marsella, pero Alex quiere entender qué pudo hacer de Audrey un objetivo. Al investigar su vida reciente, descubre comportamientos y decisiones que no encajan con la joven que él recordaba. Sus hallazgos sugieren que Audrey podría haberse convertido al islam y haber sido víctima de un proceso de radicalización.Este nuevo contexto complica la búsqueda y abre la posibilidad de que el secuestro esté relacionado con redes peligrosas o con personas que manipulaban a la joven.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "16:55", "fin": "17:50", "titulo": "Tándem", "desc": "Episodi 12. Un prestigiós advocat apareix assassinat al marge d'un riu. El cas amaga una intricada història familiar: el mort tenia un germà bessó i tots dos estaven implicats en un afer judicial relacionat amb la mort d'un jove caiaquista.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "17:50", "fin": "17:58", "titulo": "Atrapa'm si pots. Els millors moments", "desc": "Els millors moments del programa ''Atrapa'm si pots'', un ''quiz show'' clàssic, de preguntes i respostes, presentat per Llucià Ferrer.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "17:58", "fin": "18:06", "titulo": "Atrapa'm si pots. Els millors moments", "desc": "Els millors moments del programa ''Atrapa'm si pots'', un ''quiz show'' clàssic, de preguntes i respostes, presentat per Llucià Ferrer.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "18:06", "fin": "18:20", "titulo": "Atrapa'm si pots. Els millors moments", "desc": "Els millors moments del programa ''Atrapa'm si pots'', un ''quiz show'' clàssic, de preguntes i respostes, presentat per Llucià Ferrer.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "18:20", "fin": "19:00", "titulo": "Alguna pregunta més?", "desc": "Episodi 19. Espai satíric que fa un repàs en clau d'humor a l'actualitat política i al panorama televisiu català, espanyol i internacional. El programa és una creació dels responsables del programa que s'emetia amb el mateix nom a Catalunya Ràdio.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "19:00", "fin": "20:05", "titulo": "Telenotícies vespre cap de setmana", "desc": "Raquel Sans és l'encarregada de fer arribar les informacions més destacades en l'edició del vespre del ''Telenotícies'' del cap de setmana.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "20:05", "fin": "20:55", "titulo": "30 minuts: La IA, la meva confident mortal", "desc": "ChatGPT: Et pot matar? Els chatbots eblo. ¿Quién querría matar a Martin el día de su boda y delante de todos?Mientras investiga, Alex descubre que Martin no era tan transparente como parecía. Cada pista abre una nueva línea de sospecha, y cada testigo aporta versiones incompletas o contradictorias.La verdad obligará a enfrentar traiciones, motivaciones ocultas y una red de mentiras construida durante años y que ahora se derrumba con violencia. Lo que debía ser un día de celebración se convierte en una prueba de resistencia emocional para Juliette. y en una carrera contrarreloj para Alex.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "15:15", "fin": "16:55", "titulo": "Alex Hugo", "desc": "La que perdona. Durante una salida a la montaña, Alex ve cómo una joven escaladora, Audrey, es secuestrada y arrastrada a la fuerza hacia un coche. Corre tras el vehículo, pero no consigue alcanzarlo. La víctima es la hija de un amigo muy cercano que murió salvando la vida de Alex. El secuestro revive en él sentimientos de culpa y dolor que creía controlados.La alerta de secuestro moviliza a la policía de Marsella, pero Alex quiere entender qué pudo hacer de Audrey un objetivo. Al investigar su vida reciente, descubre comportamientos y decisiones que no encajan con la joven que él recordaba. Sus hallazgos sugieren que Audrey podría haberse convertido al islam y haber sido víctima de un proceso de radicalización.Este nuevo contexto complica la búsqueda y abre la posibilidad de que el secuestro esté relacionado con redes peligrosas o con personas que manipulaban a la joven.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "16:55", "fin": "17:50", "titulo": "Tándem", "desc": "Episodi 12. Un prestigiós advocat apareix assassinat al marge d'un riu. El cas amaga una intricada història familiar: el mort tenia un germà bessó i tots dos estaven implicats en un afer judicial relacionat amb la mort d'un jove caiaquista.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "17:50", "fin": "17:58", "titulo": "Atrapa'm si pots. Els // ── THEME ─────────────────────────────────────────────────────
const html      = document.documentElement;
const toggle    = document.getElementById('themeToggle');
const thumb     = document.getElementById('toggleThumb');
const metaTheme = document.getElementById('meta-theme');

function applyTheme(dark) {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  thumb.textContent = dark ? '🌙' : '☀️';
  metaTheme.content = dark ? '#080c1a' : '#f0f4ff';
  localStorage.setItem('epg-theme', dark ? 'dark' : 'light');
  toggle.checked = dark;
}

const savedTheme = localStorage.getItem('epg-theme');
applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
toggle.addEventListener('change', () => applyTheme(toggle.checked));

// ── FAVORITES ─────────────────────────────────────────────────
function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem('epg-favs') || '[]')); }
  catch { return new Set(); }
}

function saveFavs(set) {
  localStorage.setItem('epg-favs', JSON.stringify([...set]));
}

    card.classList.toggle('is-fav', isFav);

  updateCounts();
  // Re-render if we're on favs tab
  if (currentTab === 'favoritos') render();
}

// ── TIME ──────────────────────────────────────────────────────
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function timeToMins(hhmm) {
  if (!hhmm) return -1;
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function isPast(hora, fin) {
  const now = timeToMins(nowHHMM());
  if (fin) return timeToMins(fin) <= now;
  return timeToMins(hora) < now - 60;
}

function isNow(hora, fin) {
  if (!fin) return false;
  const now = timeToMins(nowHHMM());
  return timeToMins(hora) <= now && now < timeToMins(fin);
}

function progressPct(hora, fin) {
  const start = timeToMins(hora);
  const end   = timeToMins(fin);
  const now   = timeToMins(nowHHMM());
  if (end <= start) return 0;
  return Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
}

// ── STATE ─────────────────────────────────────────────────────
let currentTab = 'todos';
let searchQuery = '';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

// ── COUNTS ────────────────────────────────────────────────────
function updateCounts() {
  const favs = getFavs();
  const now  = nowHHMM();
  let nowCount = 0;
  CHANNELS.forEach(ch => {
    ch.programs.forEach(p => { if (isNow(p.hora, p.fin)) nowCount++; });
  });
  document.getElementById('countTodos').textContent  = CHANNELS.length;
  document.getElementById('countFavs').textContent   = favs.size;
  document.getElementById('countAhora').textContent  = nowCount;
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchesSearch(ch, q) {
  if (!q) return true;
  if (ch.name.toLowerCase().includes(q)) return true;
  return ch.programs.some(p =>
    p.titulo.toLowerCase().includes(q) ||
    (p.desc && p.desc.toLowerCase().includes(q)) ||
    (p.categoria && p.categoria.toLowerCase().includes(q))
  );
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('lista');
  const empty     = document.getElementById('emptyState');
  const favs      = getFavs();
  const q         = searchQuery.toLowerCase();

  let list = CHANNELS.filter(ch => {
    if (!matchesSearch(ch, q)) return false;
    if (currentTab === 'favoritos') return favs.has(ch.id);
    if (currentTab === 'ahora')     return ch.programs.some(p => isNow(p.hora, p.fin));
    return true;
  });

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.add('visible');
    const icons  = { todos:'🔭', favoritos:'⭐', ahora:'📡' };
    const msgs   = {
      todos: 'No se encontraron canales',
      favoritos: 'Aún no tienes favoritos.<br>Pulsa ★ en un canal para añadirlo.',
      ahora: 'No hay programas en antena ahora mismo.'
    };
    document.getElementById('emptyIcon').textContent = icons[currentTab];
    document.getElementById('emptyMsg').innerHTML    = msgs[currentTab];
    return;
  }

  empty.classList.remove('visible');

  // Favs first
  list.sort((a, b) => {
    const af = favs.has(a.id) ? 0 : 1;
    const bf = favs.has(b.id) ? 0 : 1;
    return af - bf || a.name.localeCompare(b.name);
  });

  const fragments = list.map((ch, idx) => {
    const isFav    = favs.has(ch.id);
    const delay    = Math.min(idx * 0.025, 0.4);
    const iconHTML = ch.icon
      ? `<img class="canal-icon" src="${esc(ch.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = ch.icon ? 'style="display:none"' : '';

    // Filter programs if searching
    let progs = ch.programs;
    if (q) {
      const chMatch = ch.name.toLowerCase().includes(q);
      if (!chMatch) {
        progs = progs.filter(p =>
          p.titulo.toLowerCase().includes(q) ||
          (p.desc && p.desc.toLowerCase().includes(q)) ||
          (p.categoria && p.categoria.toLowerCase().includes(q))
        );
      }
    }

    const progsHTML = progs.map(p => {
      const active  = isNow(p.hora, p.fin);
      const past    = !active && isPast(p.hora, p.fin);
      const catTag  = p.categoria ? `<span class="prog-cat">${esc(p.categoria)}</span>` : '';
      const nowBadge = active ? `<span class="ahora-badge">▶ ahora</span>` : '';
      const descHTML = p.desc ? `<div class="desc">${esc(p.desc)}</div>` : '';
      const progressHTML = active && p.fin
        ? `<div class="prog-progress"><div class="prog-progress-fill" style="width:${progressPct(p.hora,p.fin)}%"></div></div>`
        : '';

      return `<div class="programa${active?' ahora':''}${past?' pasado':''}">
        <div class="hora-col">
          <span class="hora">${esc(p.hora)}</span>
          ${p.fin ? `<span class="fin-hora">${esc(p.fin)}</span>` : ''}
        </div>
        <span class="prog-emoji">${p.emoji||'📡'}</span>
        <div class="prog-body">
          <span class="titulo">${esc(p.titulo)}</span>
          <div class="prog-meta">${catTag}${nowBadge}</div>
          ${descHTML}
          ${progressHTML}
        </div>
      </div>`;
    }).join('');

    // Start collapsed if no current program and not a fav
    const hasNow = ch.programs.some(p => isNow(p.hora, p.fin));
    const collapsed = !hasNow && !isFav && currentTab === 'todos' ? 'collapsed' : '';

    return `<div class="canal-card ${collapsed} ${isFav?'is-fav':''}" data-id="${esc(ch.id)}" style="animation-delay:${delay}s">
      <div class="canal-header">
        <div class="canal-header-left" onclick="toggleCard(this)">
          ${iconHTML}
          <div class="canal-icon-placeholder" ${placeholderStyle}>📺</div>
          <div>
            <div class="canal-nombre">${esc(ch.name)}</div>
            <div class="canal-count">${progs.length} programas</div>
          </div>
        </div>
        <div class="canal-actions">
          <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${esc(ch.id)}')" title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}">★</button>
          <span class="canal-chevron" onclick="toggleCard(this)">▾</span>
        </div>
      </div>
      <div class="programas-list">${progsHTML}</div>
    </div>`;
  });

  container.innerHTML = fragments.join('');
  updateCounts();
}

// ── TOGGLE COLLAPSE ───────────────────────────────────────────
function toggleCard(el) {
  el.closest('.canal-card').classList.toggle('collapsed');
}

// ── SEARCH ────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
let searchTimer;

searchInput.addEventListener('input', function () {
  searchQuery = this.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  render();
  searchInput.focus();
});

// ── BACK TO TOP ───────────────────────────────────────────────
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateCounts();
  render();
  document.getElementById('loadingScreen').classList.add('hidden');

  // Auto-refresh counts every minute
  setInterval(() => { updateCounts(); render(); }, 60000);
});
</script>
