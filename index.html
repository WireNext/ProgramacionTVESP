", "titulo": "'Kaiolak' immunitaterako, eskaladarako eta jumar duelurako", "desc": "El Conquistador. Kanpamentu aberatsean Yocahu gozatzen ari da, Guaban oso pobrea eta Corocote pobrea den bitartean. Immunitate-proban, “Kaiolak”, parte-hartzaileek kaiolatik ihes egin behar dute lurra zulatuz, garfioarekin pala eskuratuz eta kapitaina bambuetan eramanez ikurrinara. Corocotek irabazi du proba, Yocahu bigarren eta Guaban azken. Nominazioetan, Giacchi, Ilia eta Aitor eskalada eta jumar proba batean lehiatu dira banderatxoak jasotzeko.", "categoria": "None", "emoji": "📡"}, {"hora": "06:26", "fin": "08:55", "titulo": "Kateatuta", "desc": "El Conquistador. “Kateatuta” immunitate-jokoan, taldeek kateatuta lehiatu behar dute lau banderatxo lortzeko. Guaban (horiak) garaile atera da eta arrantzarako kit-a jaso du sari gisa, Corocote (urdinak) azken postuan geratu den bitartean. Izendapenetan, Fellinik immunitatea jaso du eta Locuras duelura bidali dute; harekin batera, Mendi eta Oxkar (biak urdinak) lokatzetako labirintoan lehiatuko dira.", "categoria": "None", "emoji": "📡"}, {"hora": "08:55", "fin": "10:59", "titulo": "Su-dorreak eta makila mozkorrak", "desc": "El Conquistador. “Su-Dorreak” immunitate-proban, Guaban garaile izan da eta Corocotek zein talde berdeak galdu dute. Oxkarrek, medikuak artatu ondoren, lehiaketa utzi du. Asanbladan, Fellini eta Marta izendatu dituzte, eta Guabanek Locuras aukeratu du 'Makila Mozkorrak' duelurako.", "categoria": "None", "emoji": "📡"}, {"hora": "10:59", "fin": "12:37", "titulo": "Taldeak bateratzea eta kapitainen agurra", "desc": "El Conquistador. El Conquistador del Caribe azken txanpan sartu da: 12 lehiakide geratzen dira eta orain banaka lehiatzen dira. Etxek antortxen jokoa irabazi du eta immunitatea Txoskinekin partekatu du; Irune izendatua izan da. Kapitainak —Aini, Arantxa, Iri eta Lobo— agurtu dira emozioz beterik. Dueluan, neskek galdu dute: Helen, Irune, Olaia eta Iria kanporatuak izan dira. Etxek kanpamentu aberatsean gozatu du Txoskinekin. Hurrengo saioan jakinaraziko da hurrengo kanporatua nor izango den.", "categoria": "None", "emoji": "📡"}, {"hora": "12:37", "fin": "14:16", "titulo": "Kanpamentu aberatsa, kanpamentu pobrea", "desc": "El Conquistador. Asanbladan, Hamza Irunerekin batera izendatua izan da, eta Etxek, kanpamentu aberatsean, Aitor aukeratu du hirugarren duelistarako. Txoskinek eta Etxek erosotasunez gozatzen duten bitartean, gainerakoak janari faltaz kexu dira. Duelua bi banderatxo jasotzea eta tirolinan joan-etorria eginez eramatea da.", "categoria": "None", "emoji": "📡"}, {"hora": "14:16", "fin": "16:31", "titulo": "Zigorra arauak hausteagatik", "desc": "El Conquistador. Kanpamentu bateratuan, Zuru, Etxe eta Locuras kanpoan janaria bilatzen harrapatu dituzte eta immunitate-proban parte hartzeko aukera kendu diete. Proban, bikoteka, soka batetik igo eta kokoak harrapatu behar dituzte likidoa ateratzeko; Aitor eta Txoskin garaile izan dira eta kanpamentu aberatsean gozatu dute. Zuzendaritzak ihesaldian parte hartu zuten hirurak duelura bidali ditu,  Tirolinanara.", "categoria": "None", "emoji": "📡"}, {"hora": "16:31", "fin": "18:37", "titulo": "Immunitatea lortzeko pista amerikarra", "desc": "El Conquistador. Kanpamentu bateratuan, lehiakideek pista amerikarra gainditu behar dute, banaka eta bikoteka: uretako banderatxoa hartu, oztopoak gainditu eta horma igo ikurrinara iristeko. Locuras garaile izan da eta Helen kanporatua. Asanbladan, Tole izendatu dute eta Locurasek Etxe aukeratu du hirugarren duelistarako. Duelua, palmondoa sokarekin igo eta kokoak jasotzea.", "categoria": "None", "emoji": "📡"}]}, {"id": "ETBON_Herritxiki.TV", "name": "ETBON_Herritxiki.TV", "icon": "", "programs": [{"hora": "00:51", "fin": "02:13", "titulo": "Zugarramurdi", "desc": "Herri Txiki, Infernu Handi. Zuhaitzek Tía Lolarekin hasten du eguna, bere gosaria ezagutuz. Joxerekin eta Kontxita eta Ikerrekin ere egoten da. Gainera, kontrabandoan aritutako bi bizilagun ezagutzen ditu. Pagadik ardi erara prestatzen ikasten du, zinema figurante batekin hitz egiten du eta Zugarramurdiko kobazuloak bisitatzen ditu. Amaitzeko, luzaketak egiten ditu Amaiarekin.", "categoria": "None", "emoji": "📡"}, {"hora": "02:13", "fin": "03:31", "titulo": "Muxika", "desc": "Herri Txiki, Infernu Handi. Pagadik eguna hasten du Nahiaren eskutik, Mujikako dorretxearen historia ezagutuz. Imanolek itsasoko bizipenak kontatuko dizkio, eta Bedak bere etxe praktikoa erakutsiko dio. Maume auzoan Sabin, azken artzaina, ezagutuko du. Zuhaitzek arrautza gordina gosalduko du Felirekin, Ajuria bisitatuko du Torrekin eta Maume Joxe Marirekin, auzoa Bizkaia eta Araba artean banatuta dagoela azaltzen dio. Amaitzeko, Amparo aktore eta bizitasunez beteriko emakumea ezagutuko du.", "categoria": "None", "emoji": "📡"}, {"hora": "03:31", "fin": "04:48", "titulo": "Bertizarana", "desc": "Herri Txiki, Infernu Handi. Pagadik Bertizaranako natura eta bizimodua ezagutuko ditu: Bertizko jauregia, artzain bat, irrati bat eta bildots berezi bat. Zuhaitzek, berriz, herritarrekin parchisean jolastu, baratzea ezagutu, Legasako eliza bisitatu eta Oieregiko festen berri izango du.", "categoria": "None", "emoji": "📡"}, {"hora": "04:48", "fin": "06:04", "titulo": "Zaratamo", "desc": "Herri Txiki, Infernu Handi. Zuhaitz eta Pagadi Zaratamo herria bisitatzen dute. Zuhaitzek Iñaki, Anton, Beñat eta Marilen ezagutzen ditu, bizitza berezidunak dituzten herritarrak. Pagadik, bere aldetik, Ainararekin hitz egiten du etxebizitzen gabeziaz, Brauliorekin doa Mercabilbaora eta Josurekin musika-terapiaz ikasten du. Unai ere ezagutzen du, Kristoren Pasioan sarritan parte hartu duen herritarra.", "categoria": "None", "emoji": "📡"}, {"hora": "06:04", "fin": "07:20", "titulo": "Etxauribar", "desc": "Herri Txiki, Infernu Handi. Pagadik eskaladan hasteko lehen pausoak ematen ditu Habirekin, eta Ritxarrekin munduko txoriez ikasten du. Juan Inaziok bere bidaiez eta Sarbil jatetxeko egunerokotasunaz hitz egiten dio. Arantzarekin eta Mariarekin, Etxauriko inauterietako Gerexipot pertsonaia ezagutzen du. Zuhaitzek Mikel ezagutzen du, Argiñaritzeko ogi famatua goraipatzen diona. Asierrek arraunean eta uretan lan egitearen inguruan hitz egiten dio. Iñaki eta Begoñaren etxea bisitatzen du, eta azkenik, Txemak Etxauribarko bitxikeriak erakusten dizkio.", "categoria": "None", "emoji": "📡"}, {"hora": "07:20", "fin": "08:32", "titulo": "Oikia", "desc": "Herri Txiki, Infernu Handi. Pagadik Oikiako bizilagunak ezagutzen ditu: Arantzak Mantzizidorko zubiaren garrantziaz hitz egiten dio, Mikelek herriko traineraren garaipena gogoratzen du eta Pellok auzoko festak aipatzen ditu. Jose Julianekin Konde etxeko misterioetan murgiltzen da. Zuhaitzek bizilagun bitxiak ezagutzen ditu: Mariajexuxek bere produktuak erakusten dizkio, Manuelak pintxo bat jaten du beti, Mila bere kafearen ohiturez aritzen da eta Bonik eskualdeko oilategirik handiena erakusten dio.", "categoria": "None", "emoji": "📡"}, {"hora": "08:32", "fin": "09:55", "titulo": "Amaiur", "desc": "Herri Txiki, Infernu Handi. Zuhaitz Gurrutxaga eta Mikel Pagadi Amaiur bisitatzen dute, Baztanen. Pagadik bunker bat ezagutzen du, Francok bisitatu zuena, patinatzen ikasten du eta gazteluaren eta herriko arkua historia ezagutzen du. Mieljok tokiko maitemintzeko moduez hitz egiten dio. Zuhaitzek Xantirekin gosaltzen du, 84 urteko Maritxurekin bere autoa gidatzen ikusten du, 90 urteko Carmenen puntua egiten ikusten du eta Beñardo eta Maiteren maitasun istorioa entzuten du.", "categoria": "None", "emoji": "📡"}, {"hora": "09:55", "fin": "11:12", "titulo": "Berriz", "desc": "Herri Txiki, Infernu Handi. Pagadik Rodolfo ezagutzen du, Berrizen lehiatu zen Mary izeneko elefantearen istorioa kontatzen diona. Festetan edari magiko baten sekretuak aurkitzen saiatzen da eta Rafarekin eta bere bizikleta modernoarekin ezagutzen da. Bestalde, Zuhaitzek Dana Moyarekin pisua galtzeko trikimailuak ikasten ditu, kubatar erritmoez gozatzen du eta Andikoa auzoko ur miragarrien propietateak ezagutzen ditu. Bere bisita Hilario Alkortarekin bukatzen du, 94 urte beteta energia eta bizitasun handikoa.", "categoria": "None", "emoji": "📡"}]}, {"id": "ETBON_Sukaldaritza.TV", "name": "ETBON_Sukaldaritza.TV", "icon": "", "programs": [{"hora": "00:55", "fin": "01:08", "titulo": "Marmitakoa", "desc": "Euskal sukaldaritzaren ezinbestekoak. Javi Rivero sukaldariaren eskutik, gure sukaldaritza munduko onenetakoa bihurtu duten ezinbesteko platerak ezagutuko ditugu. Gaur plater tradizional bat prestatuko dugu, gure arrantzaleak bere ontzietan betidanik prestatu dutena; Marmitako.", "categoria": "None", "emoji": "📡"}, {"hora": "01:08", "fin": "02:06", "titulo": "12. Bergara", "desc": "Sukaldaria. Bergarako biztanleen istorio gastronomikoak bildu ditu Joseba Arguiñano sukaldariak. Protagonistak: Iñigo Almorza, Edurne Arregi, Reyes Azkoitia, Agustin Larrañaga, Bergarako Erraldoiak, Ibon Unamuno eta Mikel Ibarzabal.", "categoria": "None", "emoji": "📡"}, {"hora": "02:06", "fin": "02:17", "titulo": "Legatzez betetako piperrak", "desc": "Euskal sukaldaritzaren ezinbestekoak. Javi Rivero sukaldariaren eskutik, gure sukaldaritza munduko onenetakoa bihurtu duten ezinbesteko platerak ezagutuko ditugu. Gaur legatzez betetako piperrak prestatuko ditugu, baratzeko onena eta itsasoko onena batzen dituen platera.", "categoria": "None", "emoji": "📡"}, {"hora": "02:17", "fin": "02:30", "titulo": "Euskal pastela", "desc": "Euskal sukaldaritzaren ezinbestekoak. Javi Rivero sukaldariaren eskutik, gure sukaldaritza munduko onenetakoa bihurtu duten ezinbesteko platerak ezagutuko ditugu. Gaur Euskal Herriko postre ezagun eta preziatuenetariko bat prestatuko dugu: Euskal pastela.", "categoria": "None", "emoji": "📡"}, {"hora": "02:30", "fin": "03:27", "titulo": "13. Bakio", "desc": "Sukaldaria. Joseba Arguiñanok Bakioko biztanleen istorio gastronomikoak bilduko ditu. Partaideak: Aitor Llaguno, Igor Lopategi, Iñaki Olabarri, Jesus Olazar, Jon Peli Hormaetxea eta Jose Antonio Bustamenate.", piración para la cocina. Y el colaborador Pepe Colubi desvela qué se cuece en camerinos, la jugosa ‘Cara B’ de cualquier festival. El mejor menú para saciar el hambre de música en vivo.", "categoria": "MUSIC", "emoji": "🎵"}, {"hora": "02:00", "fin": "02:55", "titulo": "Banana Split - Programa 7: Poder crudo", "desc": "Algunos alimentos son mejores en crudo. Con ciertas músicas ocurre lo mismo: con menos condimentos, gustan más. Hay músicos y cocineros especialistas en crudeza: Mala Rodríguez, Barón Rojo, Los Punsetes o el reconocido chef Edorta Lamo nos acompañan en este menú sin aditivos ni conservantes.", "categoria": "None", "emoji": "📡"}, {"hora": "02:55", "fin": "03:40", "titulo": "De tapas por España - 26/05/24", "desc": "Sin descripción.", "categoria": "None", "emoji": "📡"}, {"hora": "03:40", "fin": "04:25", "titulo": "De tapas por España - Valencia, ciudad mítica", "desc": "A orillas del Mediterráneo me recibe Valencia. Una ciudad plasmada en las obras de pintores como Sorolla al que podré acercarme en el Museo de Bellas Artes. Un paseo lleno de historia y de sabor.", "categoria": "None", "emoji": "📡"}, {"hora": "04:25", "fin": "05:00", "titulo": "Así ha sido el estreno de Playchez", "desc": "En este primer programa, Javi Estévez nos enseña a preparar unas ricas tartaletas de de Halloween. ¿Te animas a cocinarlas con él?", "categoria": "None", "emoji": "📡"}, {"hora": "05:00", "fin": "05:26", "titulo": "Atleta Gourmet - Asturias; paraíso natural y gourmet", "desc": "La tierra perfecta para encontrar buena comida y naturaleza sorprendente al mismo tiempo.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "05:26", "fin": "05:52", "titulo": "Atleta Gourmet - Cádiz", "desc": "Cádiz, una ruta mágica y llena de sabor donde Íñigo disfruta de la increíble riqueza gastronómica.", "categoria": "None", "emoji": "📡"}]}, {"id": "RTVE_Conciertos_R3.TV", "name": "RTVE_Conciertos_R3.TV", "icon": "", "programs": [{"hora": "00:22", "fin": "00:51", "titulo": "Proyecto Solaz   // ============================================================
  // THEME
  // ============================================================
  const html       = document.documentElement;
  const toggle     = document.getElementById('themeToggle');
  const thumb      = document.getElementById('toggleThumb');
  const metaTheme  = document.getElementById('meta-theme');

  function applyTheme(dark) {
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    thumb.textContent = dark ? '🌙' : '☀️';
    metaTheme.content = dark ? '#080c1a' : '#f0f4ff';
    localStorage.setItem('epg-theme', dark ? 'dark' : 'light');
    toggle.checked = dark;
  }

  const saved = localStorage.getItem('epg-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const initDark = saved ? saved === 'dark' : prefersDark;
  applyTheme(initDark);

  toggle.addEventListener('change', () => applyTheme(toggle.checked));

  // ============================================================
  // TIME HELPERS
  // ============================================================
  function nowHHMM() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function isNow(hora, fin) {
    if (!fin) return false;
    const t = nowHHMM();
    return t >= hora && t < fin;
  }

  // ============================================================
  // RENDER
  // ============================================================
  function escHTML(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderChannels(list) {
    const container = document.getElementById('lista');
    const empty     = document.getElementById('emptyState');

    if (!list.length) {
      container.innerHTML = '';
      empty.classList.add('visible');
      return;
    }
    empty.classList.remove('visible');

    let totalProgs = 0;
    let nowCount   = 0;
    const fragments = [];

    list.forEach((ch, idx) => {
      totalProgs += ch.programs.length;

      let progsHTML = '';
      ch.programs.forEach(p => {
        const active = isNow(p.hora, p.fin);
        if (active) nowCount++;
        const catTag = p.categoria
          ? `<span class="prog-cat">${escHTML(p.categoria)}</span>`
          : '';
        const nowBadge = active ? `<span class="ahora-badge">▶ ahora</span>` : '';
        const descHTML = p.desc
          ? `<div class="desc">${escHTML(p.desc)}</div>`
          : '';
        progsHTML += `
          <div class="programa ${active ? 'ahora' : ''}">
            <div class="hora-col">
              <span class="hora">${escHTML(p.hora)}</span>
              ${p.fin ? `<span class="fin-hora">${escHTML(p.fin)}</span>` : ''}
            </div>
            <span class="prog-emoji">${p.emoji || '📡'}</span>
            <div class="prog-body">
              <span class="titulo">${escHTML(p.titulo)}</span>
              <div class="prog-meta">${catTag}${nowBadge}</div>
              ${descHTML}
            </div>
          </div>`;
      });

      const iconHTML = ch.icon
        ? `<img class="canal-icon" src="${escHTML(ch.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const placeholderStyle = ch.icon ? 'display:none' : '';

      const delay = Math.min(idx * 0.03, 0.5);

      fragments.push(`
        <div class="canal-card" data-id="${escHTML(ch.id)}" style="animation-delay:${delay}s">
          <div class="canal-header" onclick="toggleCard(this)">
            <div class="canal-info">
              ${iconHTML}
              <div class="canal-icon-placeholder" style="${placeholderStyle}">📺</div>
              <div>
                <div class="canal-nombre">${escHTML(ch.name)}</div>
                <div class="canal-count">${ch.programs.length} programas hoy</div>
              </div>
            </div>
            <span class="canal-chevron">▾</span>
          </div>
          <div class="programas-list">${progsHTML}</div>
        </div>`);
    });

    container.innerHTML = fragments.join('');

    // Update stats
    document.getElementById('statCanales').textContent  = `📡 ${list.length} canales`;
    document.getElementById('statProgramas').textContent = `🎬 ${totalProgs} programas`;
    document.getElementById('statAhora').textContent     = `🔴 ${nowCount} en antena`;
  }

  // ============================================================
  // COLLAPSE / EXPAND
  // ============================================================
  function toggleCard(headerEl) {
    headerEl.closest('.canal-card').classList.toggle('collapsed');
  }

  // ============================================================
  // SEARCH
  // ============================================================
  let searchTimer;
  document.getElementById('search').addEventListener('input', function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const q = this.value.trim().toLowerCase();
      if (!q) { renderChannels(CHANNELS); return; }
      const filtered = CHANNELS.filter(ch => {
        if (ch.name.toLowerCase().includes(q)) return true;
        return ch.programs.some(p =>
          p.titulo.toLowerCase().includes(q) ||
          (p.desc && p.desc.toLowerCase().includes(q))
        );
      });
      renderChannels(filtered);
    }, 200);
  });

  // ============================================================
  // BACK TO TOP
  // ============================================================
  const backTop = document.getElementById('backTop');
  window.addEventListener('scroll', () => {
    backTop.classList.toggle('visible', window.scrollY > 300);
  }, { passive: true });
  backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  // ============================================================
  // INIT
  // ============================================================
  window.addEventListener('DOMContentLoaded', () => {
    renderChannels(CHANNELS);
    document.getElementById('loadingScreen').classList.add('hidden');
  });
  </script>
