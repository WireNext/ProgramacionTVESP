andonaron tras un incidente provocado por Nacho en una de ellas. Ahora, diez años después, descubren que Nacho ha muerto y que ha dejado preparada una apuesta póstuma: ganará su herencia, valorada en 17 millones de euros, el amigo que logre más audiencia en televisión antes de que termine el año.", "categoria": "FILM", "emoji": "📡"}, {"hora": "06:36", "fin": "08:13", "titulo": "Mari", "desc": "La directora de \"La inocencia\", Lucía Alemany, cambia completamente de registro en este segundo largometraje protagonizado por Paco León y Ernesto Alterio en el que ambos descubren que llevan compartiendo desde hace años a la misma mujer.", "categoria": "FILM", "emoji": "📡"}, {"hora": "08:13", "fin": "09:47", "titulo": "Si yo fuera rico", "desc": "Sin un duro en el bolsillo y a punto de separarse de su esposa Maite, la vida de Santi parece haber tocado fondo hasta que se convierte en el afortunado ganador de 25 millones de euros de la lotería. Sólo hay un problema: si no quiere tener que darle la mitad del premio a Maite, tendrá que ocultar su suerte a todo el mundo, incluidos sus amigos y familiares.", "categoria": "FILM", "emoji": "📡"}, {"hora": "09:47", "fin": "11:25", "titulo": "Lo dejo cuando quiera", "desc": "Pedro, Arturo y Eligio son tres profesores universitarios a los que la crisis ha dejado sin trabajo. La solución a sus problemas la encuentran en el proyecto de investigación de Pedro: un complejo vitamínico que ofrece desfase sin efectos secundarios. Juntos se lanzarán al mundo de la noche y de los negocios turbios para comercializar la mercancía.", "categoria": "FILM", "emoji": "📡"}, {"hora": "11:25", "fin": "13:25", "titulo": "Operación Camarón", "desc": "Carlos Therón (\"Lo dejo cuando quiera\", \"Es por tu bien\") dirige a Julián López, Natalia de Molina, Carlos Librado 'Nene' y Miren Ibarguren en una comedia de acción muy cañí llena de persecuciones, fuego cruzado y caídas al vacío.", "categoria": "FILM", "emoji": "📡"}, {"hora": "13:25", "fin": "15:22", "titulo": "Astérix y Obélix contra César", "desc": "Toda la Galia está ocupada por los romanos, toda excepto un pequeño poblado del norte. Allí habitan galos indomables que rechazan a los invasores y se dedican a hacer la vida imposible a los legionarios romanos con la ayuda de una pócima mágica que les otorga una fuerza sobrehumana. El mismo Julio César decide visitar a los rebeldes ante la imposibilidad de que los suyos se hagan con el mando de este pequeño territorio.", "categoria": "FILM", "emoji": "📡"}, {"hora": "15:22", "fin": "17:18", "titulo": "Astérix y Obélix: Misión Cleopatra", "desc": "En el año 52 antes de Cristo, Egipto, gobernado por la poderosa Cleopatra, decidida a entregar su corazón a Julio César, ha caído bajo el yugo del Imperio Romano. Harta de los sarcasmos de César, la orgullosa y bella reina hace una apuesta con él: si consigue construir un castillo para él en el espacio de tres meses, en medio del desierto, él reconocerá que el pueblo egipcio es el más grande de todos. Cleopatra confía la misión a Numerobis, un emergente arquitecto vanguardista al que cubrirá de oro si triunfa o arrojará a los cocodrilos si fracasa. El arquitecto necesita un milagro para llevar a cabo el proyecto, y pide ayuda desesperada a Astérix y Obélix.", "categoria": "FILM", "emoji": "📡"}, {"hora": "17:18", "fin": "18:51", "titulo": "Siempre a tu lado", "desc": "Un profesor de universidad acoge a un perro vagabundo que ha encontrado en una estación. El animal, apodado Hachi, empezará una nueva vida al lado de su nuevo amo, pero a éste también le cambiará la vida al descubrir los lazos que se pueden crear entre un animal y una persona. Cada mañana, Hachi acompaña a su amo a la estación de tren para despedirse de él antes de empezar su jornada laboral y luego, regresa cada tarde al mismo lugar para darle la bienvenida.", "categoria": "FILM", "emoji": "📡"}, {"hora": "18:51", "fin": "20:29", "titulo": "Gold", "desc": "Zac Efron (\"El gran showman\", saga \"Malditos vecinos\") o Philippe Gougle decide visitar el mundo en tren. A través de este medio de transporte, conocerá a gente muy diversa y se descubrirá los monumentos y lugares más representativos de cada país. Desde Escocia a Tanzania, pasando por Marruecos o Brasil.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:50", "fin": "16:25", "titulo": "Grandes viajes en tren: 1ª Parte Indonesia", "desc": "En este episodio nuestro destino es Asia, y más concretamente Indonesia, el país de las islas. El viaje de Philippe comienza en Padang, en la isla de Sumatra, tomando el tren para llegar a la región de Minangkabau y sus fabulosos arrozales.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "16:25", "fin": "17:10", "titulo": "Europa desde el cielo: Escocia", "desc": "Este impresionante recorrido aéreo muestra Escocia desde una perspectiva completamente nueva. Las cámaras revelan innovadores generadores de electricidad aprovechando las mareas, majestuosos castillos en lo alto de los acantilados y el campo de golf más antiguo del mundo. Tendremos una visión única de la vida en las numerosas y pintorescas islas de Escocia y seremos testigos de las obras de vértigo de un puente que bate récords.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "17:10", "fin": "18:00", "titulo": "Europa desde el cielo: Dinamarca", "desc": "Este espectacular viaje aéreo revela Dinamarca como nunca antes se había visto. Las cámaras descubren una central eléctrica de última generación con una pista de esquí en su tejado, sobrevuelan una procesión de los guardias de élite de la Familia Real y cómo se reparan casas únicas que no se encuentran en ningún otro lugar de la Tierra. Exploraremos las numerosas islas que componen esta pequeña nación y descubriremos el castillo que inspiró a Shakespeare para escribir su obra Hamlet.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "18:00", "fin": "19:05", "titulo": "Escocia desde el aire", "desc": "En el último episodio de la emblemática serie \"Escocia desde el aire\", analizaremos cómo la fotografía aérea ha revelado el pasado lejano y oculto de Escocia, descubriendo los secretos enterrados justo bajo nuestros pies. Desde un campo en Aberdeenshire donde aparece el concepto mismo de tiempo, pasando por el fantasmal perfil de un jardín ornamental perdido, hasta el descubrimiento de cientos de hornos de pizza que una vez alimentaron a las poderosas legiones de Roma, el presentador James Crawford nos revela cómo nuestros antepasados escribieron su historia sobre el paisaje de Escocia.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:05", "fin": "19:55", "titulo": "Secretos de la antigua China: Los tesoros del reino perdido", "desc": "El descubrimiento de un extraordinario tesoro de bronce y oro ha revelado un reino perdido hace mucho tiempo. Ahora, el arqueólogo Sam Willis y su equipo de expertos utilizan tecnología de vanguardia con drones láser para explorar la misteriosa civilización que está transformando todo lo que sabemos sobre los orígenes de la antigua China.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:55", "fin": "21:20", "titulo": "Saqqara, la primera pirámide", "desc": "La necrópolis de Saqqara, a unos 30 kilómetros de El Cairo, guarda uno de los tesoros más fascinantes de la civilización egipcia: la pirámide del faraón Pepi II.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "21:20", "fin": "23:10", "titulo": "Michael", "desc": "Frank Quinlan es un reportero sensacionalista del National Mirror que está acostumbrado a oír las cosas más increíbles y fantásticas. Entre ellas ha oído hablar de Michael, un ángel que ha dado un golpe en un banco de Iowa para sacar de los apuros económicos a la viejecita con la que vive, lo que ha despertando la curiosidad de todo el país.", "categoria": "FILM", "emoji": "📡"}, {"hora": "23:10", "fin": "00:50", "titulo": "Inocencia rebelde", "desc": "Trent tiene 21 años y trabaja cortando el césped en los jardines en las casas de la lujosa urbanización Camelot Gardens donde él, de familia humilde, se siente muy aislado. La jardinería es el único vínculo que mantiene con ese lugar ya que le gente que vive ahí y el tipo de vida que llevan no le interesa lo más mínimo. Al lugar llega una nueva familia cuya hija de 10 años, atrae en seguida la atención de Trent. La niña sufre también graves problemas afectivos derivados de una enfermedad cardiaca, cuya consecuencia física es una enorme cicatriz que tiene en el pecho. En las afueras de la urbanización conocerá a Trent, que vive en una caravana, y del que en seguida se hace amiga y empiezan a sentir el uno por el otro muchísimo cariño y fascinación, algo que no será bien visto por la hipócrita sociedad con la que se codean y de la que se sienten absolutamente desplazados.", "categoria": "FILM", "emoji": "📡"}]}, {"id": "Levante.TV", "name": "Levante.TV", "icon": "", "programs": [{"hora": "00:00", "fin": "00:30", "titulo": "Aventurístico", "desc": "Programa semanal de reportajes sobre actividades en la naturaleza. Una manera de comenzar a disfrutar de la espectacularidad de la escalada/, el senderismo/, kayak/, rafting/, vías ferratas/, alpinismo/, btt/, espeleología/, submarinismo/, hípica/, vuelo en parapente y más.", "categoria": "None", "emoji": "📡"}, {"hora": "00:30", "fin": "03:30", "titulo": "En archivo", "desc": "Vuelve a ver las mejores entrevistas y reportajes de Levante TV.", "categoria": "None", "emoji": "📡"}, {"hora": "03:30", "fin": "06:00", "titulo": "En archivo", "desc": "Vuelve a ver las mejores entrevistas y reportajes de Levante TV.", "categoria": "None", "emoji": "📡"}, {"hora": "06:00", "fin": "06:30", "titulo": "Laia cuentacuentos", "desc": "Laia cuenta los mejores cuentos para grandes y pequeños.", "categoria": "None", "emoji": "📡"}, {"hora": "06:30", "fin": "07:00", "titulo": "Educando con valentía", "desc": "Programa de Levante Televisión dedicado a los perros. Especialmente hablaremos sobre la educación de los canes y como mejorar sus condic :28", "titulo": "El Señor de los bosques - Hayedo de Urbasa", "desc": "El Hayedo de Urbasa, en Navarra, es un laberinto de hayas y formaciones rocosas cubiertas de musgo. Andrés Salado, director de orquesta y jurado de Prodigios, será el atento acompañante de Vicente Sevilla por esta ruta, donde conoceremos un método para saber la edad de los árboles sin talarlos.", "categoria": "None", "emoji": "📡"}, {"hora": "04:28", "fin": "04:57", "titulo": "El señor de los bosques - Braña de las Cadenas", "desc": "Para conocer la Braña de las Cadenas, en la comunidad de Asturias, Vicente Sevilla cuenta con una olímpica invitada: la ex saltadora de altura Ruth Beitia. La mejor atleta española de todos los tiempos y el micólogo hablan de osos con dos miembros de la Fundación Oso de Asturias y encuentran setas.", "categoria": "None", "emoji": "📡"}, {"hora": "04:57", "fin": "05:25", "titulo": "El señor de los bosques - La Font de l'Adou", "desc": "El Parque Natural del Cadí-Moixeró es el entorno por donde pasearán Vicente Sevilla y el actor Octavi Pujades. Bajo avellanos y hayas.", "categoria": "None", "emoji": "📡"}, {"hora": "05:25", "fin": "05:54", "titulo": "El señor de los bosques - Chorrera de las Hoyuelas", "desc": "El extremo oriental de la Sierra de Gredos, en la provincia de Ávila, encontramos la Chorrera de las Hoyuelas, un bosque formado por castañares espesos y prados con robles y chopos. El paseo de Vicente Sevilla es en esta ocasión con la monologuista Sara Escudero.", "categoria": "None", "emoji": "📡"}, {"hora": "05:54", "fin": "06:22", "titulo": "El señor de los bosques - Cañón del río Pirón", "desc": "El cañón del río Pirón, en la Sierra de Guadarrama, es el marco de nuestro micólogo, Vicente Sevilla, y Jesús Cabrero, actor de series como 'Hospital Central' o 'Centro Médico'. En estas tierras segovianas encontramos setas como las del álamo o la del chopo, ambas asociadas a estos árboles de ribera.", "categoria": "None", "emoji": "📡"}, {"hora": "06:22", "fin": "06:5 iens nos trae un pescado de sabor exquisito y textura inconfundible: el besugo. Nos lo va a preparar Mario Sandoval, un chef con dos Estrellas Michelin. Además, charlaremos con el actor Secun de la Rosa y contaremos con Celia Villalobos, Ken Appledorn, Tania Llasera y Micky Irisarri.", "categoria": "None", "emoji": "📡"}, {"hora": "15:01", "fin": "15:48", "titulo": "Como Sapiens - Socarrat, tortos asturianos y gató mallorquín", "desc": "Programa 54: Socarrat, tortos asturianos y gató mallorquín. Hoy, Como Sapiens y Carolina Cerezuela viajan hasta Palma de Mallorca para degustar un dulce típico de la gastronomía balear, el gató mallorquín. Además, cocinamos la tradicional fideuà valenciana con Sole Giménez y contamos con Celia Villalobos, Tania Llasera y el chef Íñigo Urrechu.", "categoria": "None", "emoji": "📡"}, {"hora": "15:48", "fin": "16:16", "titulo": "El Señor de los bosques - Hayedo de Urbasa", "desc": "El Hayedo de Urbasa, en Navarra, es un laberinto de hayas y formaciones rocosas cubiertas de musgo. Andrés Salado, director de orquesta y jurado de Prodigios, será el atento acompañante de Vicente Sevilla por esta ruta, donde conoceremos un método para saber la edad de los árboles sin talarlos.", "categoria": "None", "emoji": "📡"}, {"hora": "16:16", "fin": "16:45", "titulo": "El señor de los bosques - Braña de las Cadenas", "desc": "Para conocer la Braña de las Cadenas, en la comunidad de Asturias, Vicente Sevilla cuenta con una olímpica invitada: la ex saltadora de altura Ruth Beitia. La mejor atleta española de todos los tiempos y el micólogo hablan de osos con dos miembros de la Fundación Oso de Asturias y encuentran setas.", "categoria": "None", "emoji": "📡"}, {"hora": "16:45", "fin": "17:13", "titulo": "El señor de los bosques - La Font de l'Adou", "desc": "El Parque Natural del Cadí-Moixeró es el entorno por donde pasearán Vicente Sevilla y el actor Octavi Pujades. Bajo avellanos y hayas.", "categoria": "None", "emoji": "📡"}, {"hora": "17:13", "fin": "17:42", "titulo": "El señor de los bosques - Chorrera de las Hoyuelas", "desc": "El extremo oriental de la Sierra de Gredos, en la provincia de Ávila, encontramos la Chorrera de las Hoyuelas, un bosque formado por castañares espesos y prados con robles y chopos. El paseo de Vicente Sevilla es en esta ocasión con la monologuista Sara Escudero.", "categoria": "None", "emoji": "📡"}, {"hora": "17:42", "fin": "18:10", "titulo": "El señor de los bosques - Cañón del río Pirón", "desc": "El cañón del río Pirón, en la Sierra de Guadarrama, es el marco de nuestro micólogo, Vicente Sevilla, y Jesús Cabrero, actor de series como 'Hospital Central' o 'Centro Médico'. En estas tierras segovianas encontramos setas como las del álamo o la del chopo, ambas asociadas a estos árboles de ribera.", "categoria": "None", "emoji": "📡"}, {"hora": "18:10", "fin": "18:39", "titulo": "El señor de los bosques - Bosque de Fervenza", "desc": "El centenario bosque da Fervenza, en la provincia de Lugo, acoge a Vicente Sevilla y al actor gallego Antonio Durán Morris. En esta reserva de la Biosfera, situada en el curso alto del río Miño, conoceremos los marasmius, que resucitan al hidratarlos, y el ombligo de Venus, una planta comestible.", "categoria": "None", "emoji": "📡"}, {"hora": "18:39", "fin": "19:29", "titulo": "Cocina al punto con Peña y Tamara - El longuerón de Ayamonte", "desc": "En el programa de hoy Peña visita Ayamonte, en Huelva, donde se sumergirá en el mar para pescar el famoso longuerón. También, el chef y Tamara cocinan hoy estas dos recetas: Fideuá de longuerón, chopitos y gambas y Tarta rústica de melocotón. Invitado: el dúo Camela. Ágatha Ruiz de la Prada,Ana Guerra,Begoña Fraire,Blanca Padilla,Cecilia Gómez,Cristina Figueira,Javier García Peña,José Mota,María Gómez García,Miriam Diaz Aroca,Natalia de Molina,Rocío Muñoz,Santi Rodríguez,Soraya Arnelas,Tamara Falcó.", "categoria": "None", "emoji": "📡"}, {"hora": "19:29", "fin": "20:20", "titulo": "Cocina al punto con Peña y Tamara - // ── THEME ─────────────────────────────────────────────────────
const html      = document.documentElement;
const toggle    = document.getElementById('themeToggle');
const thumb     = document.getElementById('toggleThumb');
const metaTheme = document.getElementById('meta-theme');

function applyTheme(dark) {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  thumb.textContent = dark ? '🌙' : '☀️';
  metaTheme.content = dark ? '#080c1a' : '#f0f4ff';
  localStorage.setItem('epg-theme', dark ? 'dark' : 'light');
  toggle.checked = dark;
}

const savedTheme = localStorage.getItem('epg-theme');
applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
toggle.addEventListener('change', () => applyTheme(toggle.checked));

// ── FAVORITES ─────────────────────────────────────────────────
function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem('epg-favs') || '[]')); }
  catch { return new Set(); }
}

function saveFavs(set) {
  localStorage.setItem('epg-favs', JSON.stringify([...set]));
}

function toggleFav(chId) {
  const favs = getFavs();
  if (favs.has(chId)) { favs.delete(chId); } else { favs.add(chId); }
  saveFavs(favs);
  // Update button in DOM
  const card = document.querySelector(`.canal-card[data-id="${chId}"]`);
  if (card) {
    const btn = card.querySelector('.fav-btn');
    const isFav = favs.has(chId);
    btn.classList.toggle('active', isFav);
    card.classList.toggle('is-fav', isFav);
  }
  updateCounts();
  // Re-render if we're on favs tab
  if (currentTab === 'favoritos') render();
}

// ── TIME ──────────────────────────────────────────────────────
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function timeToMins(hhmm) {
  if (!hhmm) return -1;
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function isPast(hora, fin) {
  const now = timeToMins(nowHHMM());
  if (fin) return timeToMins(fin) <= now;
  return timeToMins(hora) < now - 60;
}

function isNow(hora, fin) {
  if (!fin) return false;
  const now = timeToMins(nowHHMM());
  return timeToMins(hora) <= now && now < timeToMins(fin);
}

function progressPct(hora, fin) {
  const start = timeToMins(hora);
  const end   = timeToMins(fin);
  const now   = timeToMins(nowHHMM());
  if (end <= start) return 0;
  return Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
}

// ── STATE ─────────────────────────────────────────────────────
let currentTab = 'todos';
let searchQuery = '';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

// ── COUNTS ────────────────────────────────────────────────────
function updateCounts() {
  const favs = getFavs();
  const now  = nowHHMM();
  let nowCount = 0;
  CHANNELS.forEach(ch => {
    ch.programs.forEach(p => { if (isNow(p.hora, p.fin)) nowCount++; });
  });
  document.getElementById('countTodos').textContent  = CHANNELS.length;
  document.getElementById('countFavs').textContent   = favs.size;
  document.getElementById('countAhora').textContent  = nowCount;
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchesSearch(ch, q) {
  if (!q) return true;
  if (ch.name.toLowerCase().includes(q)) return true;
  return ch.programs.some(p =>
    p.titulo.toLowerCase().includes(q) ||
    (p.desc && p.desc.toLowerCase().includes(q)) ||
    (p.categoria && p.categoria.toLowerCase().includes(q))
  );
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('lista');
  const empty     = document.getElementById('emptyState');
  const favs      = getFavs();
  const q         = searchQuery.toLowerCase();

  let list = CHANNELS.filter(ch => {
    if (!matchesSearch(ch, q)) return false;
    if (currentTab === 'favoritos') return favs.has(ch.id);
    if (currentTab === 'ahora')     return ch.programs.some(p => isNow(p.hora, p.fin));
    return true;
  });

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.add('visible');
    const icons  = { todos:'🔭', favoritos:'⭐', ahora:'📡' };
    const msgs   = {
      todos: 'No se encontraron canales',
      favoritos: 'Aún no tienes favoritos.<br>Pulsa ★ en un canal para añadirlo.',
      ahora: 'No hay programas en antena ahora mismo.'
    };
    document.getElementById('emptyIcon').textContent = icons[currentTab];
    document.getElementById('emptyMsg').innerHTML    = msgs[currentTab];
    return;
  }

  empty.classList.remove('visible');

  // Favs first
  list.sort((a, b) => {
    const af = favs.has(a.id) ? 0 : 1;
    const bf = favs.has(b.id) ? 0 : 1;
    return af - bf || a.name.localeCompare(b.name);
  });

  const fragments = list.map((ch, idx) => {
    const isFav    = favs.has(ch.id);
    const delay    = Math.min(idx * 0.025, 0.4);
    const iconHTML = ch.icon
      ? `<img class="canal-icon" src="${esc(ch.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = ch.icon ? 'style="display:none"' : '';

    // Filter programs if searching
    let progs = ch.programs;
    if (q) {
      const chMatch = ch.name.toLowerCase().includes(q);
      if (!chMatch) {
        progs = progs.filter(p =>
          p.titulo.toLowerCase().includes(q) ||
          (p.desc && p.desc.toLowerCase().includes(q)) ||
          (p.categoria && p.categoria.toLowerCase().includes(q))
        );
      }
    }

    const progsHTML = progs.map(p => {
      const active  = isNow(p.hora, p.fin);
      const past    = !active && isPast(p.hora, p.fin);
      const catTag  = p.categoria ? `<span class="prog-cat">${esc(p.categoria)}</span>` : '';
      const nowBadge = active ? `<span class="ahora-badge">▶ ahora</span>` : '';
      const descHTML = p.desc ? `<div class="desc">${esc(p.desc)}</div>` : '';
      const progressHTML = active && p.fin
        ? `<div class="prog-progress"><div class="prog-progress-fill" style="width:${progressPct(p.hora,p.fin)}%"></div></div>`
        : '';

      return `<div class="programa${active?' ahora':''}${past?' pasado':''}">
        <div class="hora-col">
          <span class="hora">${esc(p.hora)}</span>
          ${p.fin ? `<span class="fin-hora">${esc(p.fin)}</span>` : ''}
        </div>
        <span class="prog-emoji">${p.emoji||'📡'}</span>
        <div class="prog-body">
          <span class="titulo">${esc(p.titulo)}</span>
          <div class="prog-meta">${catTag}${nowBadge}</div>
          ${descHTML}
          ${progressHTML}
        </div>
      </div>`;
    }).join('');

    // Start collapsed if no current program and not a fav
    const hasNow = ch.programs.some(p => isNow(p.hora, p.fin));
    const collapsed = !hasNow && !isFav && currentTab === 'todos' ? 'collapsed' : '';

    return `<div class="canal-card ${collapsed} ${isFav?'is-fav':''}" data-id="${esc(ch.id)}" style="animation-delay:${delay}s">
      <div class="canal-header">
        <div class="canal-header-left" onclick="toggleCard(this)">
          ${iconHTML}
          <div class="canal-icon-placeholder" ${placeholderStyle}>📺</div>
          <div>
            <div class="canal-nombre">${esc(ch.name)}</div>
            <div class="canal-count">${progs.length} programas</div>
          </div>
        </div>
        <div class="canal-actions">
          <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${esc(ch.id)}')" title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}">★</button>
          <span class="canal-chevron" onclick="toggleCard(this)">▾</span>
        </div>
      </div>
      <div class="programas-list">${progsHTML}</div>
    </div>`;
  });

  container.innerHTML = fragments.join('');
  updateCounts();
}

// ── TOGGLE COLLAPSE ───────────────────────────────────────────
function toggleCard(el) {
  el.closest('.canal-card').classList.toggle('collapsed');
}

// ── SEARCH ────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
let searchTimer;

searchInput.addEventListener('input', function () {
  searchQuery = this.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  render();
  searchInput.focus();
});

// ── BACK TO TOP ───────────────────────────────────────────────
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateCounts();
  render();
  document.getElementById('loadingScreen').classList.add('hidden');

  // Auto-refresh counts every minute
  setInterval(() => { updateCounts(); render(); }, 60000);
});
</script>
</body>
</html>
