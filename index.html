ments amb científics i experts.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "05:25", "fin": "06:09", "titulo": "Afers exteriors", "desc": "Kènia. Kènia, il·lusió per ser el gran país de l'Àfrica central. Kènia, un país format per diverses ètnies, busca tenir una identitat pròpia potent per poder convertir-se en referent a la zona. L'explotació de la seva natura vol ser la base per crear indústria.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "06:09", "fin": "06:54", "titulo": "Afers exteriors", "desc": "Corea del Sud 1. Corea busca l'excel·lència, però amb un cost personal i social difícil d'assimilar. El programa intentarà entendre la seva manera de fer des del punt de vista laboral. Es descobrirà la seva complicada relació amb Corea del Nord i el seu passat de dominació japonesa.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "06:54", "fin": "07:21", "titulo": "Viure als Pirineus: Un arqueòleg dels Pirineus", "desc": "Pèir Cóts és un arqueòleg historiador que s'ha passat al món de la hostaleria. És un canvi d'activitat radical i s'adona que és molt més absorbent del que es pensava.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "07:21", "fin": "07:48", "titulo": "Viure als Pirineus: Un pilot dels Pirineus", "desc": "Zigzaguejar a 200 quilòmetres per hora entre els pics de la serralada dels Pirineus, esmunyir-se entre els núvols i la boira, portar càrregues de centenars de quilos fins a més de 2.000 metres d'altitud, fer viure l'economia de la muntanya.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "07:48", "fin": "08:36", "titulo": "Per sempre: Hem tingut un fill", "desc": "Poques circumstàncies canvien tant la vida de parella com el naixement d'un fill. Consolida l'amor, o té conseqüències devastadores, canvia els termes de la relació, genera papers diferents. En aquest capítol ens preguntem com modifica la parella el naixement d'un fill.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "08:36", "fin": "09:26", "titul os a bordo destruyan el avión. Además, Hetty le da a Nell una misión críptica.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "13:45", "fin": "14:35", "titulo": "CSI: Miami", "desc": "Entre la espada y la pared. Un hombre es asesinado cuando alguien lanza una tablilla de un puente.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "14:35", "fin": "15:35", "titulo": "CSI: Miami", "desc": "Hasta las últimas consecuencias. Un hombre es asesinado debido a una llamada falsa al 911.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "15:35", "fin": "16:30", "titulo": "CSI: Miami", "desc": "Perdiendo los estribos. El nuevo investigador médico de CSI es asesinado; las calles de Miami se están volviendo cada vez más peligrosas.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "16:30", "fin": "17:20", "titulo": "CSI: Miami", "desc": "Resurrección. Las pruebas sobre quién disparó a Horatio llevan al equipo hasta algunos de los más peligrosos de Miami.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "17:20", "fin": "18:15", "titulo": "CSI: Miami", "desc": "No volveremos a repostar. Los habitantes de Miami comienzan a asesinarse los unos a los otros por la subida disparada del precio del gas.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "18:15", "fin": "19:10", "titulo": "FBI", "desc": "Complejo de Dios. Tras la muerte de un médico, el equipo busca a un asesino en serie que actúa por motivos religiosos. Scola debe tomar una decisión de vida o muerte.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "19:10", "fin": "20:10", "titulo": "FBI", "desc": "Toda la rabia. Cuando la explosión de un autobús acaba con varias vidas inocentes, el equipo debe entrar en acción para desmantelar a los terroristas responsables.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "20:10", "fin": "21:05", "titulo": "FBI", "desc": "Remordimientos. Durante la investigación del asesinato de un banquero y la desaparición de una mujer, el equipo descubre una conexión con un antiguo caso de Jubal.", "cat jo Ram, que les ayudarán a solventar todos los peligros.", "categoria": "KIDS", "emoji": "🧸"}, {"hora": "06:15", "fin": "06:45", "titulo": "Érase una vez... los inventores", "desc": "Arquímides y los griegos. Serie de animación dirigida a que los pequeños conozcan los inventores y descubridores más importantes de la historia. De manera divulgativa y entretenida, cada capítulo aborda un tema o un inventor en concreto, desde la China antigua hasta las grandes celebridades del siglo XX, como Albert Einstein o Neil Armstrong, pasando por los sabios griegos, los científicos polifacéticos del Renacimiento y los grandes inventores de la era industrial.", "categoria": "KIDS", "emoji": "🧸"}, {"hora": "06:45", "fin": "07:15", "titulo": "Érase una vez... los inventores", "desc": "Heron de Alejandría. En el siglo I de nuestra era, la famosa escuela de Alejandría reunió un numeroso grupo de investigadores. Uno de sus últimos representantes es el conocido Herón y sus geniales inventos como su máquina de vapor o incluso el antepasado del piano.", "categoria": "KIDS", "emoji": "🧸"}, {"hora": "07:15", "fin": "07:45", "titulo": "El punto sobre la historia", "desc": "Museo del aire. En esta ruta dejamos las bicicletas aparcadas junto a los hangares del Museo del Aire para recordar la historia de la aviación española y mundial. La actriz Katia Klein relata la hazaña de los hermanos Wright, dos constructores de bicicletas que volaron en 1903.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "07:45", "fin": "08:15", "titulo": "El punto sobre la historia", "desc": "Ateneo de Madrid. En este programa se dejan las bicicletas a las puertas de una de las instituciones culturales más importantes de la historia y el presente de Madrid: El Ateneo. Pasamos por la Galería de retratos, donde Ana Rosetti nos recuerda la figura de Emilia Pardo Bazán.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "08:15", "fin": "09:00", "titulo": "Callejeando", "desc": "Programa que recorre, enseña y a": "13:10", "fin": "13:35", "titulo": "Hora Deportiva", "desc": "Espacio dedicado al deporte con entrevistas, reportajes y humor. Presentado por Javier Callejo y Juanma Cueto, el programa destacará lo más importante del día aunque también habrá tiempo para el entretenimiento y el análisis de los expertos colaboradores.", "categoria": "SPORTS", "emoji": "⚽"}, {"hora": "13:35", "fin": "13:45", "titulo": "El tiempo 2", "desc": "De lunes a viernes, al término del Telenoticias 2, se recogen las principales previsiones meteorológicas y se comentan las temperaturas registradas en diferentes puntos de la Comunidad Autónoma de Madrid.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "13:45", "fin": "14:40", "titulo": "Planeta Verde: Mundos acuáticos", "desc": "Las plantas acuáticas crean algunos de los hábitats más bellos, extraños e importantes de la Tierra. Para resistir a las fuertes corrientes, las plantas utilizan una especie de superpegamento.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "14:40", "fin": "15:30", "titulo": "El mundo invisible de los bosques: El baobab", "desc": "Los baobabs reinan en el bosque seco tropical, en la costa oeste de Madagascar. A su alrededor, la vida se ha organizado para hacer frente a la falta de agua.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:30", "fin": "15:55", "titulo": "Grandes viajes en tren: Ecuador Parte 1", "desc": "Philippe Gougler comienza su viaje a los pies del Chimborazo, un volcán de la Cordillera de los Andes, en la estación ferroviaria a mayor altitud del país, asentada a 3610 metros. Viaja a bordo de un tren turístico, atravesando paisajes magníficos hasta llegar a la capital. A tan solo unos kilómetros de Quito, se encuentra con un sacerdote al que los creyentes aguardan con gran impaciencia. Tras una visita a la iglesia de La Compañía en Quito, una iglesia cuyo interior está totalmente cubierto de oro, Philippe prosigue su viaje a bordo del tren de La Nariz Del Diablo, que supera desniveles vertiginosos.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:55", "fin": "16:45", "titulo": "Viajes alucinantes en tren: Andalucía, sur de España", "desc": "Viajes alucinantes en tren es un descubrimiento inolvidable a través de algunos de los paisajes más espectaculares de la Tierra.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "16:45", "fin": "17:30", "titulo": "Grandes viajes en tren: Noruega 1", "desc": "Philippe Gougler viaja a Europa del Norte. Dirección a Noruega, en pleno invierno, es la ocasión de descubrir un tren quitanieves y el tren expreso que funciona sean cuales sean las condiciones climáticas.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "17:30", "fin": "18:25", "titulo": "Suiza, el corazón de los Alpes", "desc": "Suiza tiene una cultura nacional que integra tres influencias: alemana, Italiana y francesa. Posee un patrimonio insospechado: su pasado medieval, la alquimia o prestigiosas abadías. Sus ciudades y valles alpinos fueron de los primeros en promover la ecología.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "18:25", "fin": "19:25", "titulo": "Monumentos sagrados: Templos asiáticos: Seres humanos, naturaleza y dioses", "desc": "En el vasto continente asiático, la horizontalidad de los templos y santuarios refleja la proximidad geográfica a la naturaleza primitiva y a los seres vivos. En su corazón, es una geometría compleja inspirada en el cosmos, los elementos naturales y el cuerpo humano.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:25", "fin": "19:50", "titulo": "Grandes viajes en tren: Turquía 2ª parte", "desc": "Turquía es un país de una riqueza increíble, tanto en patrimonio cultural e histórico como en paisajes naturales.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:50", "fin": "21:40", "titulo": "Mujeres espías en la Segunda Guerra Mundial", "desc": "Los extraordinarios sacrificios y contribuciones de cada mujer ponen de relieve su firme compromiso con la causa aliada; todas ellas son la prueba del poder de la determinación frente a la adversidad.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "21:40", "fin": "23:20", "titulo": "Mercenarios de élite", "desc": "Donovan Chalmers, un ejecutivo multimillonario de Nueva York, contrata a un equipo de mercenarios para combatir a 'El Bulero', un peligroso terrorista que le está chantajeando.", "categoria": "FILM", "emoji": "📡"}, {"hora": "23:20", "fin": "00:55", "titulo": "Sólo falta el asesino", "desc": "Phoebe, una turista estadounidense, y Julian, un actor en paro de la misma nacionalidad, que no se conocen, encuentran en Roma a un perro perdido por el que dan una cuantiosa recompensa. Cuando van a entregárselo en Montecarlo a su dueña, Miss Van Douguen, una acaudalada mujer, la encuentran muerta. Por una serie de malentendidos se verán envueltos en su asesinato junto a otro matrimonio.", "categoria": "FILM", "emoji": "📡"}]}, {"id": "Mitele_Calle.TV", "name": "Mitele_Calle.TV", "icon": "", "programs": [{"hora": "00:25", "fin": "01:30", "titulo": "Cabo Vadillo", "desc": "Pablo Vadillo, un policía de Las Ramblas de Barcelona, se adentra en los barrios de las ciudades más peligrosas del mundo como Chile, El Salvador, Bogotá o Sucre.", "categoria": "None", "emoji": "📡"}, {"hora": "01:30", "fin": "02:35", "titulo": "La Vida Con Samanta", "desc": "Samanta convivirá con personas peculiares que contarán su día a día a través de ella.", "categoria": "None", "emoji": "📡"}, {"hora": "02:35", "fin": "04:00", "titulo": "En El Punto De Mira", "desc": "Programa de investigaciones en profundidad, en los puntos del planeta donde se producen las noticias y ofreciendo una visión 360º de cada asunto.", "categoria": "None", "emoji": "📡"}, {"hora": "04:00", "fin": "04:35", "titulo": "Callejeros", "desc": "Serie de documentales-reportajes de temática social en los que un cámara y un periodista muestran aspectos de la vida cotidiana que no suelen aparecer en los medios de comunicación.", "categoria": "ENTERT // ── THEME ─────────────────────────────────────────────────────
const html      = document.documentElement;
const toggle    = document.getElementById('themeToggle');
const thumb     = document.getElementById('toggleThumb');
const metaTheme = document.getElementById('meta-theme');

function applyTheme(dark) {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  thumb.textContent = dark ? '🌙' : '☀️';
  metaTheme.content = dark ? '#080c1a' : '#f0f4ff';
  localStorage.setItem('epg-theme', dark ? 'dark' : 'light');
  toggle.checked = dark;
}

const savedTheme = localStorage.getItem('epg-theme');
applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
toggle.addEventListener('change', () => applyTheme(toggle.checked));

// ── FAVORITES ─────────────────────────────────────────────────
function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem('epg-favs') || '[]')); }
  catch { return new Set(); }
}

function saveFavs(set) {
  localStorage.setItem('epg-favs', JSON.stringify([...set]));
}

function toggleFav(chId) {
  const favs = getFavs();
  if (favs.has(chId)) { favs.delete(chId); } else { favs.add(chId); }
  saveFavs(favs);
  // Update button in DOM
  const card = document.querySelector(`.canal-card[data-id="${chId}"]`);
  if (card) {
    const btn = card.querySelector('.fav-btn');
    const isFav = favs.has(chId);
    btn.classList.toggle('active', isFav);
    card.classList.toggle('is-fav', isFav);
  }
  updateCounts();
  // Re-render if we're on favs tab
  if (currentTab === 'favoritos') render();
}

// ── TIME ──────────────────────────────────────────────────────
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function timeToMins(hhmm) {
  if (!hhmm) return -1;
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function isPast(hora, fin) {
  const now = timeToMins(nowHHMM());
  if (fin) return timeToMins(fin) <= now;
  return timeToMins(hora) < now - 60;
}

function isNow(hora, fin) {
  if (!fin) return false;
  const now = timeToMins(nowHHMM());
  return timeToMins(hora) <= now && now < timeToMins(fin);
}

function progressPct(hora, fin) {
  const start = timeToMins(hora);
  const end   = timeToMins(fin);
  const now   = timeToMins(nowHHMM());
  if (end <= start) return 0;
  return Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
}

// ── STATE ─────────────────────────────────────────────────────
let currentTab = 'todos';
let searchQuery = '';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

// ── COUNTS ────────────────────────────────────────────────────
function updateCounts() {
  const favs = getFavs();
  const now  = nowHHMM();
  let nowCount = 0;
  CHANNELS.forEach(ch => {
    ch.programs.forEach(p => { if (isNow(p.hora, p.fin)) nowCount++; });
  });
  document.getElementById('countTodos').textContent  = CHANNELS.length;
  document.getElementById('countFavs').textContent   = favs.size;
  document.getElementById('countAhora').textContent  = nowCount;
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchesSearch(ch, q) {
  if (!q) return true;
  if (ch.name.toLowerCase().includes(q)) return true;
  return ch.programs.some(p =>
    p.titulo.toLowerCase().includes(q) ||
    (p.desc && p.desc.toLowerCase().includes(q)) ||
    (p.categoria && p.categoria.toLowerCase().includes(q))
  );
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('lista');
  const empty     = document.getElementById('emptyState');
  const favs      = getFavs();
  const q         = searchQuery.toLowerCase();

  let list = CHANNELS.filter(ch => {
    if (!matchesSearch(ch, q)) return false;
    if (currentTab === 'favoritos') return favs.has(ch.id);
    if (currentTab === 'ahora')     return ch.programs.some(p => isNow(p.hora, p.fin));
    return true;
  });

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.add('visible');
    const icons  = { todos:'🔭', favoritos:'⭐', ahora:'📡' };
    const msgs   = {
      todos: 'No se encontraron canales',
      favoritos: 'Aún no tienes favoritos.<br>Pulsa ★ en un canal para añadirlo.',
      ahora: 'No hay programas en antena ahora mismo.'
    };
    document.getElementById('emptyIcon').textContent = icons[currentTab];
    document.getElementById('emptyMsg').innerHTML    = msgs[currentTab];
    return;
  }

  empty.classList.remove('visible');

  // Favs first
  list.sort((a, b) => {
    const af = favs.has(a.id) ? 0 : 1;
    const bf = favs.has(b.id) ? 0 : 1;
    return af - bf || a.name.localeCompare(b.name);
  });

  const fragments = list.map((ch, idx) => {
    const isFav    = favs.has(ch.id);
    const delay    = Math.min(idx * 0.025, 0.4);
    const iconHTML = ch.icon
      ? `<img class="canal-icon" src="${esc(ch.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = ch.icon ? 'style="display:none"' : '';

    // Filter programs if searching
    let progs = ch.programs;
    if (q) {
      const chMatch = ch.name.toLowerCase().includes(q);
      if (!chMatch) {
        progs = progs.filter(p =>
          p.titulo.toLowerCase().includes(q) ||
          (p.desc && p.desc.toLowerCase().includes(q)) ||
          (p.categoria && p.categoria.toLowerCase().includes(q))
        );
      }
    }

    const progsHTML = progs.map(p => {
      const active  = isNow(p.hora, p.fin);
      const past    = !active && isPast(p.hora, p.fin);
      const catTag  = p.categoria ? `<span class="prog-cat">${esc(p.categoria)}</span>` : '';
      const nowBadge = active ? `<span class="ahora-badge">▶ ahora</span>` : '';
      const descHTML = p.desc ? `<div class="desc">${esc(p.desc)}</div>` : '';
      const progressHTML = active && p.fin
        ? `<div class="prog-progress"><div class="prog-progress-fill" style="width:${progressPct(p.hora,p.fin)}%"></div></div>`
        : '';

      return `<div class="programa${active?' ahora':''}${past?' pasado':''}">
        <div class="hora-col">
          <span class="hora">${esc(p.hora)}</span>
          ${p.fin ? `<span class="fin-hora">${esc(p.fin)}</span>` : ''}
        </div>
        <span class="prog-emoji">${p.emoji||'📡'}</span>
        <div class="prog-body">
          <span class="titulo">${esc(p.titulo)}</span>
          <div class="prog-meta">${catTag}${nowBadge}</div>
          ${descHTML}
          ${progressHTML}
        </div>
      </div>`;
    }).join('');

    // Start collapsed if no current program and not a fav
    const hasNow = ch.programs.some(p => isNow(p.hora, p.fin));
    const collapsed = !hasNow && !isFav && currentTab === 'todos' ? 'collapsed' : '';

    return `<div class="canal-card ${collapsed} ${isFav?'is-fav':''}" data-id="${esc(ch.id)}" style="animation-delay:${delay}s">
      <div class="canal-header">
        <div class="canal-header-left" onclick="toggleCard(this)">
          ${iconHTML}
          <div class="canal-icon-placeholder" ${placeholderStyle}>📺</div>
          <div>
            <div class="canal-nombre">${esc(ch.name)}</div>
            <div class="canal-count">${progs.length} programas</div>
          </div>
        </div>
        <div class="canal-actions">
          <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${esc(ch.id)}')" title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}">★</button>
          <span class="canal-chevron" onclick="toggleCard(this)">▾</span>
        </div>
      </div>
      <div class="programas-list">${progsHTML}</div>
    </div>`;
  });

  container.innerHTML = fragments.join('');
  updateCounts();
}

// ── TOGGLE COLLAPSE ───────────────────────────────────────────
function toggleCard(el) {
  el.closest('.canal-card').classList.toggle('collapsed');
}

// ── SEARCH ────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
let searchTimer;

searchInput.addEventListener('input', function () {
  searchQuery = this.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  render();
  searchInput.focus();
});

// ── BACK TO TOP ───────────────────────────────────────────────
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateCounts();
  render();
  document.getElementById('loadingScreen').classList.add('hidden');

  // Auto-refresh counts every minute
  setInterval(() => { updateCounts(); render(); }, 60000);
});
</script>
