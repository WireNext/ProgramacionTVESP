ua y medieval, analizando la construcción de las megaestructuras y las estrategias utilizadas para sitiar y resistir.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "06:30", "fin": "07:15", "titulo": "Los conciertos de La 2: Aud. Nacional CNDM Capella de Ministrers", "desc": "Aud. Nacional CNDM Capella de Ministrers (parte 1). Retransmisión de un concierto de la Orquesta Sinfónica y el Coro de RTVE. Nacida en 1965, pronto se convirtió en una orquesta de primerísima fila. Su repertorio es el clásico-romántico, la música española y el servicio a la creación musical de nuestro tiempo.", "categoria": "MUSIC", "emoji": "🎵"}, {"hora": "07:15", "fin": "07:30", "titulo": "Medina en tve", "desc": "Programa de culto islámico.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "07:30", "fin": "07:45", "titulo": "Buenas noticias. TV", "desc": "Programa de las Iglesias Evangélicas que depende de la FEREDE (Federación de Entidades Religiosas Evangélicas de España). El espacio informa, a través de reportajes y entrevistas en estudio, de las actividades de los seguidores de esta fe en España.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "07:45", "fin": "08:00", "titulo": "Shalom", "desc": "Programa semanal dirigido a la comunidad judía que, a través de reportajes y entrevistas, analiza temas de actualidad como ciencia, educación, festividades, cocina, medicina, mística, pensamiento y personalidades de la vida judía en España y en el resto del mundo.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "08:00", "fin": "08:25", "titulo": "Últimas preguntas", "desc": "Programa religioso sobre temas de interés cultural, histórico, católico, moral y familiar. ''Últimas preguntas'' analiza la presencia de la Iglesia en la cultura y la sociedad actual. Cada programa incluye un reportaje y una entrevista a personas relevantes de la sociedad sobre un tema de actualidad, como la posición de la Iglesia frente al terrorismo, la ley de política familiar o la entrada en vigor del euro. El espacio religioso intenta abordar cuestiones relacionadas con la fe católica desde distintos aspectos y analizar el contenido de los documentos que publique la santa sede o la conferencia episcopal española; así como acercar la situación de los católicos en algunos lugares del mundo o el diálogo entre distintas religiones.''Últimas preguntas'', programa elaborado por los Servicios Religiosos de Televisión Española, empezó su andadura el 30 de octubre de 1983, por lo que supera los veinte años en antena.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "08:25", "fin": "08:30", "titulo": "Testimonio", "desc": "Miniespacio de cinco minutos que ofrece reportajes narrados en primera persona, intercalando personajes anónimos y rostros conocidos, con el objetivo de dar a conocer las distintas realidades de la Iglesia. Su meta es acercar la dimensión religiosa y trascendente al hombre a través de la vida de sacerdotes, religiosos, laicos, adultos, jóvenes y de su forma de entender la religión. El espacio abarca temas tan diversos como la vocación, la acción sociocaritativa de la iglesia, la enfermedad, la marginación o la exclusión social. El programa también tiene en cuenta el calendario litúrgico, atendiendo a las distintas efemérides como la navidad, la pascua, el pentecostés, el mes de María, la jornada del enfermo, la época de las primeras comuniones... però también atiende a acontecimientos de carácter social como la entrega de la declaración de la renta.''Testimonio'' es un programa elaborado por los Servicios Religiosos de Televisión Española.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "08:30", "fin": "09:30", "titulo": "El día del señor", "desc": "Convento de Santa Ana y San José, Madrid. Programa religioso que retransmite la celebración de la eucaristía desde diferentes parroquias de toda España y un reportaje relacionado con la localidad, su patrimonio cultural, artístico, o de la festividad que se celebra en la liturgia.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "09:30", "fin": "09:55", "titulo": "Pueblo de Dios", "desc": "Programa religioso que ofrece reportajes sobre el trabajo que realizan las ONG o comunidades religiosas en España y en el mundo. Retrata los proyectos que se desarrollan en el campo de la educación y la salud para ayudar a las capas sociales más necesitadas.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "09:55", "fin": "10:05", "titulo": "La 2 express", "desc": "En este espacio de corta duración se ofrece un adelanto de los contenidos que se van a emitir en la cadena. También hay lugar para resúmenes y momentos destacados de programas ya emitidos.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "10:05", "fin": "10:35", "titulo": "España pueblo a pueblo", "desc": "Las Palmas de Gran Canaria y Tacoronte. Recorre los rincones más auténticos del país, descubriendo localidades con historia, tradiciones y personajes únicos que reflejan la riqueza cultural y humana de España.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "10:35", "fin": "11:00", "titulo": "Flash Moda", "desc": "La cadena pública desfila por la pasarela de la mano de Nieves Álvarez en este repaso a las novedades del mundo de la moda, las últimas tendencias y las colecciones de vanguardia. Además, el programa presta especial atención al trabajo de los diseñadores españoles.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "11:00", "fin": "11:30", "titulo": "El escarabajo verde: Una odisea alimentaria", "desc": "Programa divulgativo sobre ecología y medio ambiente. Sus contenidos quieren llegar a un público amplio y no especializado, para que todos descubran que la ecología es interesante porque es necesaria, útil y amena.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "11:30", "fin": "12:00", "titulo": "RTVE responde", "desc": "Beatriz Ariño, Defensora de la Audiencia de RTVE, pone cada mes sobre la mesa las sugerencias, quejas o consultas más destacadas que llegan a la Oficina de la Defensora.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "12:00", "fin": "12:40", "titulo": "Caminos de Sefarad, diario de una ciclista: En busca de la Extremadura judía", "desc": "Ainara Hernando da inicio a una nueva travesía en Garrovillas, una localidad de Extremadura que nos transporta a la época medieval. Recorrerá parte de la Ruta Vía de la Plata antes de llegar hasta aquí.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "12:40", "fin": "13:30", "titulo": "Saber y ganar", "desc": "El concurso, presentado por Jordi Hurtado, es el programa diario con más años de emisión en la historia de la televisión en España. Durante el programa, tres concursantes se enfrentan a diferentes pruebas de conocimientos culturales y de agilidad mental.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "13:30", "fin": "14:15", "titulo": "Saber y ganar", "desc": "El concurso, presentado por Jordi Hurtado, es el programa diario con más años de emisión en la historia de la televisión en España. Durante el programa, tres concursantes se enfrentan a diferentes pruebas de conocimientos culturales y de agilidad mental.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "14:15", "fin": "15:10", "titulo": "Into the blue: Ambon", "desc": "Las islas Molucas, también conocidas como las islas de las Especias, son un archipiélago de Indonesia. En la isla de Ambon veremos un pulpo de anillos azules, muy venenoso, y una serpiente del mar de China cuyo veneno es 10 veces más potente que el de una cobra.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:10", "fin": "16:00", "titulo": "Historias de primavera", "desc": "La primavera es un tiempo de nuevos comienzos y nueva vida. El mundo está lleno de alegría de vivir, y la pura fuerza de la naturaleza nunca es más tangible que durante esta temporada, en la que la naturaleza despierta de su helado invierno gris.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "16:00", "fin": "16:50", "titulo": "Nacido para ser salvaje: Rio, la cría to de Minnesota, el parque nacional de Voyageurs está lleno de secretos y sorpresas. El parque, al que solo se puede acceder por agua, tiene una extensión de 218 055 acres y es un mosaico de hermosos lagos transparentes y bosques inmaculados en los que habitan algunas de las especies más famosas de Norteamérica, como lobos, alces y cárabos lapones.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "14:22", "fin": "15:19", "titulo": "Cazadores del bosque", "desc": "Los bosques son hábitats densos y oscuros, un reino de sombras, ideal para que los depredadores acechen, ya sea el visón en el suelo del bosque, el azor en las copas de los árboles y los grandes depredadores, linces y lobos entre medias.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:19", "fin": "15:53", "titulo": "Grandes viajes en tren: 2ª Parte Indonesia", "desc": "En este episodio nuestro destino es Asia, y más concretamente Indonesia, el país de las islas. El viaje de Philippe comienza en Padang, en la isla de Sumatra, tomando el tren para llegar a la región de Minangkabau y sus fabulosos arrozales.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:53", "fin": "16:27", "titulo": "Grandes viajes en tren: 1ª Parte Finlandia", "desc": "En este episodio Philippe Gougler nos lleva en pleno invierno al norte de Europa: Finlandia. Su viaje comienza en Helsinki, la capital. En la estación se esconde un misterioso túnel, que te transporta a la cima del país, en la tierra de Santa Claus.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "16:27", "fin": "17:14", "titulo": "Europa desde el cielo: Maravillas del continente", "desc": "Este documental aéreo de acceso único muestra las tradiciones, innovaciones y avances de ingeniería que continúan dando forma a estas grandes naciones modernas del continente europeo.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "17:14", "fin": "18:02", "titulo": "Europa desde el cielo: Reino Unido", "desc": "En este espectacular viaje aéreo mostramos el Reino Unido como nunca lo había visto antes. Nuestras cámaras sobrevuelan la Calzada del Gigante mientras los recolectores de basura limpian la costavan montados sobre motos acuáticas. Observamos a los jardineros manejar sus motosierras colgados sobre el tejado del Eden Project y sobrevolamos el skyline de Londres mientras se limpia a fondo uno de los rascacielos más altos de la ciudad.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "18:02", "fin": "18:58", "titulo": "Amazonas: mujeres guerreras", "desc": "A raíz de recientes descubrimientos, una serie de expertos internacionales afrontan una nueva expedición arqueológica. Intentar desvelar la verdad que se esconde tras el mito de las Amazonas.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "18:58", "fin": "19:49", "titulo": "Europa desde el cielo: Islas griegas", "desc": "Este recorrido aéreo por las islas griegas muestra el vertiginoso perfil de Santorini,  una excavación para extraer obsidiana y un festival con un clímax explosivo.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:49", "fin": "20:40", "titulo": "Europa desde el cielo: Gran Bretaña", "desc": "Este recorrido aéreo por Gran Bretaña muestra el castillo más grande de Gales, el desplazamiento de vacas de las Tierras Altas y una máquina gigante que realiza puentes.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "20:40", "fin": "21:41", "titulo": "Tesoros de Europa: Croacia", "desc": "Esta es la Croacia con la que siempre soñaste, pero también la Croacia que nunca imaginaste: desde el tesoro de la Catedral de Zagreb hasta las cumbres nevadas del Parque Nacional Velebit, y desde el azul paisaje de la Isla de Ston hasta el misterioso castillo Trakoscan.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "21:41", "fin": "22:40", "titulo": "Tesoros de Europa: Laponia", "desc": "Laponia, en la imaginación popular, sigue siendo ante todo la tierra de Papá Noel, llena de paisajes nevados, pero es mucho más que eso. Descubramos este territorio fascinante y poco conocido.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "22:40", "fin": "23:32", "titulo": "Atlántico: Nómadas de plástico", "desc": "La ruta africana comienza en la azul Chefchauen y en el laberinto de la medina de Fez. Atravesamos el Atlas y las gargantas del Toda para seguir después por el desierto más allá de los bereberes.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "23:32", "fin": "00:23", "titulo": "Atlántico: Historias de polvo y arena", "desc": "Serie documental que se sumerge en los territorios bañados por este océano: de la Península Ibérica a Marruecos, pasando por Azores y Canarias, para seguir después rumbo al sur a través de los fascinantes países del Golfo de Guinea.", "categoria": "DOCUMENTARY", "emoji": "🎥"}]}, {"id": "Mitele_Calle.TV", "name": "Mitele_Calle.TV", "icon": "", "programs": [{"hora": "00:15", "fin": "00:55", "titulo": "Callejeros", "desc": "Serie de documentales-reportajes de temática social en los que un cámara y un periodista muestran aspectos de la vida cotidiana que no suelen aparecer en los medios de comunicación.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "00:55", "fin": "01:40", "titulo": "Callejeros", "desc": "Serie de documentales-reportajes de temática social en los que un cámara y un periodista muestran aspectos de la vida cotidiana que no suelen aparecer en los medios de comunicación.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "01:40", "fin": "02:40", "titulo": "Conexión Samanta", "desc": "Espacio de investigación y reportajes presentado por Samanta Villar.", "categoria": "None", "emoji": "📡"}, {"hora": "02:40", "fin": "03:40", "titulo": "Conexión Samanta", "desc": "Espacio de investigación y reportajes presentado por Samanta Villar.", "categoria": "None", "emoji": "📡"}, {"hora": "03:40", "fin": "04:00", "titulo": "Ny Killers", "desc": "Conducido y narrado por la periodista Mamen Sala, ‘NY Killers’ aborda los crímenes más impactantes acaecidos lia de Molina,Rocío Muñoz,Santi Rodríguez,Soraya Arnelas,Tamara Falcó.", "categoria": "None", "emoji": "📡"}]}, {"id": "RTVE_Cuentame.TV", "name": "RTVE_Cuentame.TV", "icon": "", "programs": [{"hora": "00:15", "fin": "01:23", "titulo": "T5 - Episodio 12", "desc": "Tormenta de verano. Después de encontrarse a su familia sumida en el caos, Herminia intenta poner algo de orden. Sin embargo, todavía no ha podido hablar con Antonio. Ana Duato,Carmen Climent,Imanol Arias,Irene Visedo,María Galiana,Pablo Rivero,Paloma Bloyd.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "01:23", "fin": "02:15", "titulo": "T5 - Episodio 13", "desc": "Cinco y acción. Un equipo de más de cien personas, miles de horas de trabajo. Repasamos los momentos más divertidos del rodaje de la temporada que ahora termina. Ana Duato,Carmen Climent,Imanol Arias,Irene Visedo,María Galiana,Pablo Rivero,Paloma Bloyd.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "02:15", "fin": "04:00", "titulo": "T5 - Episodio 9", "desc": "Si tú me dices ven. Antonio sigue distanciándose de Mercedes y el poco tiempo que pasa en casa lo dedica a escuchar música clásica, para asombro de toda la familia. Ana Duato,Carmen Climent,Imanol Arias,Irene Visedo,María Galiana,Pablo Rivero,Paloma Bloyd.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "04:00", "fin": "04:59", "titulo": "T21 - Capítulo 2", "desc": "La vida al vuelo. Antonio ha sufrido un atropello y se encuentra tendido en el suelo inconsciente. Ya en el hospital, su estado de salud es preocupante. Ha tenido que ser intervenido de urgencia y nadie sabe si superará la operación. Ana Duato,Carmen Climent,Imanol Arias,Irene Visedo,María Galiana,Pablo Rivero,Paloma Bloyd.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "04:59", "fin": "06:00", "titulo": "T21 - Capítulo 3", "desc": "La cruda realidad. Año 2020. Se ha superado el pico de la pandemia y Antonio, que sigue ingresado en el hospital por Covid 19, también parece que ha superado una de sus batallas, aunque tod rmina siendo de lo más inesperado: descubre que tiene una hija adolescente, cuya existencia sospechaba pero que nunca se había atrevido a confirmar, que quiere conocerlo. La aparición de Angela perturba la ordenada rutina de Roy, aunque poco a poco comienza a disfrutar de una relación que nunca había soñado. Y pronto, ella se siente fascinada por la carrera cuestionable de su padre, que comienza a enseñarle, a regañadientes, los trucos del oficio y se siente consternado y maravillado al mismo tiempo por su talento natural para el engaño.", "categoria": "FILM", "emoji": "📡"}]}, {"id": "Ubeat.TV", "name": "Ubeat.TV", "icon": "", "programs": [{"hora": "00:00", "fin": "00:30", "titulo": "Ubeat Go", "desc": "Contenidos exclusivos de fútbol, deportes urbanos, ciencia, temas paranormales.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "00:30", "fin": "00:45", "titulo": "Ultimate X", "desc": "Giovanni Vianna. Acción y deporte en un mismo lugar. Snowboarding, lo mejor del BMX, el Skate con las mejores acrobacias, giros y grandes nombres del panorama competitivo de los deportes extremos.", "categoria": "SPORTS", "emoji": "⚽"}, {"hora": "00:45", "fin": "01:00", "titulo": "Ultimate X", "desc": "Custom. Acción y deporte en un mismo lugar. Snowboarding, lo mejor del BMX, el Skate con las mejores acrobacias, giros y grandes nombres del panorama competitivo de los deportes extremos.", "categoria": "SPORTS", "emoji": "⚽"}, {"hora": "01:00", "fin": "01:15", "titulo": "Ultimate X", "desc": "Dark Fest. Acción y deporte en un mismo lugar. Snowboarding, lo mejor del BMX, el Skate con las mejores acrobacias, giros y grandes nombres del panorama competitivo de los deportes extremos.", "categoria": "SPORTS", "emoji": "⚽"}, {"hora": "01:15", "fin": "01:30", "titulo": "Ultimate X", "desc": "Eli Beukes. Acción y deporte en un mismo lugar. Snowboarding, lo mejor del BMX, el Skate con las mejores acrobacias, giros y grandes nombres del panorama competitivo de los deportes extremos.", "c // ── THEME ─────────────────────────────────────────────────────
const html      = document.documentElement;
const toggle    = document.getElementById('themeToggle');
const thumb     = document.getElementById('toggleThumb');
const metaTheme = document.getElementById('meta-theme');

function applyTheme(dark) {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  thumb.textContent = dark ? '🌙' : '☀️';
  metaTheme.content = dark ? '#080c1a' : '#f0f4ff';
  localStorage.setItem('epg-theme', dark ? 'dark' : 'light');
  toggle.checked = dark;
}

const savedTheme = localStorage.getItem('epg-theme');
applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
toggle.addEventListener('change', () => applyTheme(toggle.checked));

function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem('epg-favs') || '[]')); }
  catch { return new Set(); }
}

function saveFavs(set) {
  localStorage.setItem('epg-favs', JSON.stringify([...set]));
}

function toggleFav(chId) {
  const favs = getFavs();
  if (favs.has(chId)) { favs.delete(chId); } else { favs.add(chId); }
  saveFavs(favs);
  // Update button in DOM
  const card = document.querySelector(`.canal-card[data-id="${chId}"]`);
  if (card) {
    const btn = card.querySelector('.fav-btn');
    const isFav = favs.has(chId);
    btn.classList.toggle('active', isFav);
    card.classList.toggle('is-fav', isFav);
  }
  updateCounts();
  // Re-render if we're on favs tab
  if (currentTab === 'favoritos') render();
}

// ── TIME ──────────────────────────────────────────────────────
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function timeToMins(hhmm) {
  if (!hhmm) return -1;
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function isPast(hora, fin) {
  const now = timeToMins(nowHHMM());
  if (fin) return timeToMins(fin) <= now;
  return timeToMins(hora) < now - 60;
}

function isNow(hora, fin) {
  if (!fin) return false;
  const now = timeToMins(nowHHMM());
  return timeToMins(hora) <= now && now < timeToMins(fin);
}

function progressPct(hora, fin) {
  const start = timeToMins(hora);
  const end   = timeToMins(fin);
  const now   = timeToMins(nowHHMM());
  if (end <= start) return 0;
  return Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
}

// ── STATE ─────────────────────────────────────────────────────
let currentTab = 'todos';
let searchQuery = '';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

// ── COUNTS ────────────────────────────────────────────────────
function updateCounts() {
  const favs = getFavs();
  const now  = nowHHMM();
  let nowCount = 0;
  CHANNELS.forEach(ch => {
    ch.programs.forEach(p => { if (isNow(p.hora, p.fin)) nowCount++; });
  });
  document.getElementById('countTodos').textContent  = CHANNELS.length;
  document.getElementById('countFavs').textContent   = favs.size;
  document.getElementById('countAhora').textContent  = nowCount;
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchesSearch(ch, q) {
  if (!q) return true;
  if (ch.name.toLowerCase().includes(q)) return true;
  return ch.programs.some(p =>
    p.titulo.toLowerCase().includes(q) ||
    (p.desc && p.desc.toLowerCase().includes(q)) ||
    (p.categoria && p.categoria.toLowerCase().includes(q))
  );
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('lista');
  const empty     = document.getElementById('emptyState');
  const favs      = getFavs();
  const q         = searchQuery.toLowerCase();

  let list = CHANNELS.filter(ch => {
    if (!matchesSearch(ch, q)) return false;
    if (currentTab === 'favoritos') return favs.has(ch.id);
    if (currentTab === 'ahora')     return ch.programs.some(p => isNow(p.hora, p.fin));
    return true;
  });

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.add('visible');
    const icons  = { todos:'🔭', favoritos:'⭐', ahora:'📡' };
    const msgs   = {
      todos: 'No se encontraron canales',
      favoritos: 'Aún no tienes favoritos.<br>Pulsa ★ en un canal para añadirlo.',
      ahora: 'No hay programas en antena ahora mismo.'
    };
    document.getElementById('emptyIcon').textContent = icons[currentTab];
    document.getElementById('emptyMsg').innerHTML    = msgs[currentTab];
    return;
  }

  empty.classList.remove('visible');

  // Favs first
  list.sort((a, b) => {
    const af = favs.has(a.id) ? 0 : 1;
    const bf = favs.has(b.id) ? 0 : 1;
    return af - bf || a.name.localeCompare(b.name);
  });

  const fragments = list.map((ch, idx) => {
    const isFav    = favs.has(ch.id);
    const delay    = Math.min(idx * 0.025, 0.4);
    const iconHTML = ch.icon
      ? `<img class="canal-icon" src="${esc(ch.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = ch.icon ? 'style="display:none"' : '';

    // Filter programs if searching
    let progs = ch.programs;
    if (q) {
      const chMatch = ch.name.toLowerCase().includes(q);
      if (!chMatch) {
        progs = progs.filter(p =>
          p.titulo.toLowerCase().includes(q) ||
          (p.desc && p.desc.toLowerCase().includes(q)) ||
          (p.categoria && p.categoria.toLowerCase().includes(q))
        );
      }
    }

    const progsHTML = progs.map(p => {
      const active  = isNow(p.hora, p.fin);
      const past    = !active && isPast(p.hora, p.fin);
      const catTag  = p.categoria ? `<span class="prog-cat">${esc(p.categoria)}</span>` : '';
      const nowBadge = active ? `<span class="ahora-badge">▶ ahora</span>` : '';
      const descHTML = p.desc ? `<div class="desc">${esc(p.desc)}</div>` : '';
      const progressHTML = active && p.fin
        ? `<div class="prog-progress"><div class="prog-progress-fill" style="width:${progressPct(p.hora,p.fin)}%"></div></div>`
        : '';

      return `<div class="programa${active?' ahora':''}${past?' pasado':''}">
        <div class="hora-col">
          <span class="hora">${esc(p.hora)}</span>
          ${p.fin ? `<span class="fin-hora">${esc(p.fin)}</span>` : ''}
        </div>
        <span class="prog-emoji">${p.emoji||'📡'}</span>
        <div class="prog-body">
          <span class="titulo">${esc(p.titulo)}</span>
          <div class="prog-meta">${catTag}${nowBadge}</div>
          ${descHTML}
          ${progressHTML}
        </div>
      </div>`;
    }).join('');

    // Start collapsed if no current program and not a fav
    const hasNow = ch.programs.some(p => isNow(p.hora, p.fin));
    const collapsed = !hasNow && !isFav && currentTab === 'todos' ? 'collapsed' : '';

    return `<div class="canal-card ${collapsed} ${isFav?'is-fav':''}" data-id="${esc(ch.id)}" style="animation-delay:${delay}s">
      <div class="canal-header">
        <div class="canal-header-left" onclick="toggleCard(this)">
          ${iconHTML}
          <div class="canal-icon-placeholder" ${placeholderStyle}>📺</div>
          <div>
            <div class="canal-nombre">${esc(ch.name)}</div>
            <div class="canal-count">${progs.length} programas</div>
          </div>
        </div>
        <div class="canal-actions">
          <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${esc(ch.id)}')" title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}">★</button>
          <span class="canal-chevron" onclick="toggleCard(this)">▾</span>
        </div>
      </div>
      <div class="programas-list">${progsHTML}</div>
    </div>`;
  });

  container.innerHTML = fragments.join('');
  updateCounts();
}

// ── TOGGLE COLLAPSE ───────────────────────────────────────────
function toggleCard(el) {
  el.closest('.canal-card').classList.toggle('collapsed');
}

// ── SEARCH ────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
let searchTimer;

searchInput.addEventListener('input', function () {
  searchQuery = this.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  render();
  searchInput.focus();
});

// ── BACK TO TOP ───────────────────────────────────────────────
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateCounts();
  render();
  document.getElementById('loadingScreen').classList.add('hidden');

  // Auto-refresh counts every minute
  setInterval(() => { updateCounts(); render(); }, 60000);
});
</script>
</body>
