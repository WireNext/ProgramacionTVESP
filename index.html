d", "desc": "Joe Kidd, antiguo cazarrecompensas, es contratado por un terrateniente para que capture a Chama, un rebelde líder mejicano. Después de que los hombres de Chama le roben los caballos, Kidd comienza a perseguirle, hasta que las circunstancias le hacen ver que no está apoyando al bando correcto.", "categoria": "FILM", "emoji": "📡"}, {"hora": "02:12", "fin": "02:42", "titulo": "Love Shopping TV", "desc": "Espacio de teletienda en el que se ofrecen demostraciones de productos, que se pueden adquirir llamando por teléfono.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "02:42", "fin": "04:08", "titulo": "El agente", "desc": "Año 2030. El mundo se encuentra en un perenne estado de recesión económica y se enfrenta a problemas medioambientales. Todos los ciudadanos que son improductivos son exiliados a una colonia llamada New Eden. Noah es un trabajador social que investiga el caso de Rachel, una madre soltera, y su hijo Lucas quienes han sido desterrados por alguna razón. Su misión será investigar qué ha sucedido y salvar sus vidas.", "categoria": "FILM", "emoji": "📡"}, {"hora": "04:08", "fin": "04:10", "titulo": "Mad Movie", "desc": "Captain Fantastic. Microespacio que dará a conocer diversos detalles y datos curiosos del título que Be Mad ofrezca a continuación.", "categoria": "FILM", "emoji": "📡"}, {"hora": "04:10", "fin": "05:46", "titulo": "El compromiso", "desc": "Cuando Joe Nast se ve obligado a cambiar sus planes de boda a causa de una pérdida inesperada, intenta estar a la altura de lo que se espera de él: un entregado y desconsolado novio a punto de casarse y el yerno perfecto de Ben y JoJo, los padres de su difunta prometida. Pero, de repente, otra mujer se cruza en su camino y Joe debe enfrentarse a la disyuntiva de cumplir con el papel que tenía asignado o seguir los nuevos dictados de su corazón.", "categoria": "FILM", "emoji": "📡"}, {"hora": "05:46", "fin": "07:45", "titulo": "Capitán fantástico", "desc": "Ben Cash y su mujer Leslie han creado un paraíso apartado de la civilización para criar a sus seis hijos lejos de la cultura consumista moderna.", "categoria": "FILM", "emoji": "📡"}, {"hora": "07:45", "fin": "10:00", "titulo": "Una policía en apuros", "desc": "Johanna Pasquali es una joven policía pero no es como las otras. Para los otros policías es simpática pero totalmente nula. Sin embargo, dotada de buenas habilidades, su torpeza hace de ella una amenaza para los delincuentes... y para la gente. Le asignan misiones sin importancia, pero ella se entrena sin descanso, en su tiempo libre, para hacer realidad su sueño de ser la primera mujer en formar parte del grupo de élite de RAID, los cuerpos especiales.", "categoria": "FILM", "emoji": "📡"}, {"hora": "10:00", "fin": "11:45", "titulo": "La cazarrecompensas", "desc": "Stephanie Plum es una orgullosa chica de Jersey a quien no le falta carácter, a pesar de que lleva seis meses sin trabajo y de que las deudas le han hecho perder hasta su coche. Necesitada de dinero rápido, Stephanie toma una medida desesperada: recurrir al indeseable de su primo Vinnie para que le haga un hueco en su agencia de fianzas. Su nuevo trabajo, de cazadora de recompensas, consistirá en encontrar y llevar ante la justicia a clientes que no comparezcan en los juicios después de haber sido puestos en libertad bajo fianza. Aunque nunca ha visto unas esposas de cerca y la única arma que conoce es el spray de autodefensa, eso no le impide asumir la caza y captura del fugitivo más escurridizo de la empresa: el expolicía antivicio y sospechoso de asesinato Joe Morelli.", "categoria": "FILM", "emoji": "📡"}, {"hora": "11:45", "fin": "13:30", "titulo": "Little Nicky", "desc": "La madre del tímido Nicky es un ángel y su padre el mismísimo diablo, el cual pretende en vano que su hijo continúe la tradición familiar, aunque no está seguro de que esté lo suficientemente preparado para sustituirle. Tan sólo cuando su padre es amenazado por sus hermanos mayores, Adrian y Cassius, para heredar el trono o formar un infierno particular en la Tierra, en Nueva York, Nicky intervendrá para restaurar el equilibrio entre el bien y el mal en la Tierra. Lugar al que han ido sus hermanos, cansados de la dictadura paterna, para instaurar su propio reino. Por ello Nicky se ve obligado a ir en su busca para impedírselo. A pesar de que la cómoda vida de Nicky en el Infierno, al que le gustaría pasarse el día escuchando música 'rock' en su habitación sin nada que hacer, tiene muy poco que ver con las peligrosas calles de Nueva York.", "categoria": "FILM", "emoji": "📡"}, {"hora": "13:30", "fin": "15:20", "titulo": "16 calles", "desc": "A las 08:02h de la mañana, el detective de la policía de Nueva York Jack Mosley recibe la orden de trasladar al delincuente Eddie Bunker de la celda al juzgado en el que va a declarar a las 10:00h. Hay 16 calles de distancia.", "categoria": "FILM", "emoji": "📡"}, {"hora": "15:20", "fin": "17:10", "titulo": "Emboscada", "desc": "Un exoficial de policía de Nueva York convertido en alguacil de un pequeño pueblo rural de Georgia tiene que lidiar con una banda de ladrones que han tomado como rehén a un médico adinerado.", "categoria": "FILM", "emoji": "📡"}, {"hora": "17:10", "fin": "18:50", "titulo": "Secuestrados", "desc": "Mack trabaja en una central hidroeléctrica en una pequeña población de Georgia del Sur. Todo discurre con tranquilidad, hasta que un grupo de mercenarios liderados por Ron asaltan la instalación.", "categoria": "FILM", "emoji": "📡"}, {"hora": "18:50", "fin": "20:30", "titulo": "Apex", "desc": "Cinco cazadores de élite pagan para cazar a un hombre en una isla desierta. Pero cuando su presa comienza a defenderse, los roles de cazadores y de la presa cambian.", "categoria": "FILM", "emoji": "📡"}, {"hora": "20:30", "fin": "22:15", "titulo": "El hombre de Toronto", "desc": "Un caso de identidad equivocada obliga a un empresario inepto a colaborar con el asesino conocido como el «Hombre de Toronto» para sobrevivir.", "cate hora": "15:49", "fin": "16:30", "titulo": "Manual de supervivència", "desc": "La tradició catalana de la innovació. Catalunya és terra de romànic, terra de bolets i, sobretot, terra d'emprenedors. Queda clar que per semblar un català autèntic s'ha de ser una mica innovador i, amb aquest propòsit, el Marc-Antoine (Quebec) s'esforçarà per aprendre els secrets de la cuina creativa.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "16:30", "fin": "17:23", "titulo": "Las recetas de Julie: El Borbonés", "desc": "El Borbonès. En aquest episodi, la Julie visita la regió del massís de Sancy, a Alvèrnia. Amb la Félicie, que és ramadera i formatgera, elabora una recepta que no coneixia.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "17:23", "fin": "18:07", "titulo": "Ben Fogle: Return to the Wild: Norway Arctic", "desc": "En Ben torna a visitar algunes de les persones que va conèixer a la seva sèrie anterior ''Ben Fogle: New Lives in the Wild'' per veure com els ha anat des que els va conèixer.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "18:07", "fin": "19:00", "titulo": "Mundo mineral: Granito", "desc": "Hi ha una roca que constitueix una bona part de l'escorça dels nostres continents i de les arrels de les nostres muntanyes. És gairebé indestructible. Amb el temps, però, acaba transformant-se i convertint-se en un autèntic suport per al desenvolupament de la vida.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:00", "fin": "19:07", "titulo": "Talent creatiu: Núria Conangla, viloncelista", "desc": "La violoncel·lista de La Garriga és un dels talents musicals més emergents del país. El seu talent com a violoncel·lista està fora de debat. Intenta obrir-se pas com a intèrpret de pop.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:07", "fin": "19:31", "titulo": "Dinamita", "desc": "Sèrie d'humor, escrita i dirigida pel grup teatral català Tricicle, que ofereix a cada emissió una successió de gags que té en els seus personatges un f uer que tenía en juego más de un millón de dólares en fichas.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "21:00", "fin": "21:55", "titulo": "CSI: Vegas", "desc": "En la sala blanca. Cuando se descubren los cadáveres de dos asistentes al Festival Romántico de la Regencia, el equipo de CSI descubre una espeluznante relación entre sus asesinatos y casos anteriores.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "21:55", "fin": "22:45", "titulo": "CSI: Vegas", "desc": "Ojos. Una fiesta de influencers acaba con el brutal asesinato de un popular invitado. El negocio paralelo de Chris Park lo convierte en el único cualificado para dirigir al equipo de CSI en su investigación.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "22:45", "fin": "23:35", "titulo": "CSI: Vegas", "desc": "Baratijas. Cuando un joven aparece escondido en el garaje de un desconocido, el equipo de CSI busca a su madre desaparecida. Además, Max recibe una extraña carta con símbolos en tinta plateada que Folsom y Allie reconocen de anteriores escenas del crimen.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "23:35", "fin": "00:40", "titulo": "CSI: Vegas", "desc": "Cuando se calmen las cosas. El día libre de Catherine con su nieta se ve interrumpido cuando una mujer despierta de un coma de cuatro años y recuerda detalles de la noche en que murió su hermana.", "categoria": "SERIES", "emoji": "📺"}]}, {"id": "Euronews.TV", "name": "Euronews.TV", "icon": "", "programs": [{"hora": "00:00", "fin": "00:15", "titulo": "Euronews Now", "desc": "Las noticias de última hora y un análisis en profundidad de los titulares más destacados de Europa y del resto del mundo.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "00:15", "fin": "00:30", "titulo": "Euronews Now", "desc": "Las noticias de última hora y un análisis en profundidad de los titulares más destacados de Europa y del resto del mundo.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "00:30", "fin": "01:00", "titulo": "Euronews Now", "desc": "Las notic // ── THEME ─────────────────────────────────────────────────────
const html      = document.documentElement;
const toggle    = document.getElementById('themeToggle');
const thumb     = document.getElementById('toggleThumb');
const metaTheme = document.getElementById('meta-theme');

function applyTheme(dark) {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  thumb.textContent = dark ? '🌙' : '☀️';
  metaTheme.content = dark ? '#080c1a' : '#f0f4ff';
  localStorage.setItem('epg-theme', dark ? 'dark' : 'light');
  toggle.checked = dark;
}

const savedTheme = localStorage.getItem('epg-theme');
applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
toggle.addEventListener('change', () => applyTheme(toggle.checked));

// ── FAVORITES ─────────────────────────────────────────────────
function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem('epg-favs') || '[]')); }
  catch { return new Set(); }
}

function saveFavs(set) {
  localStorage.setItem('epg-favs', JSON.stringify([...set]));
}

function toggleFav(chId) {
  const favs = getFavs();
  if (favs.has(chId)) { favs.delete(chId); } else { favs.add(chId); }
  saveFavs(favs);
  // Update button in DOM
  const card = document.querySelector(`.canal-card[data-id="${chId}"]`);
  if (card) {
    const btn = card.querySelector('.fav-btn');
    const isFav = favs.has(chId);
    btn.classList.toggle('active', isFav);
    card.classList.toggle('is-fav', isFav);
  }
  updateCounts();
  // Re-render if we're on favs tab
  if (currentTab === 'favoritos') render();
}

// ── TIME ──────────────────────────────────────────────────────
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function timeToMins(hhmm) {
  if (!hhmm) return -1;
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function isPast(hora, fin) {
  const now = timeToMins(nowHHMM());
  if (fin) return timeToMins(fin) <= now;
  return timeToMins(hora) < now - 60;
}

function isNow(hora, fin) {
  if (!fin) return false;
  const now = timeToMins(nowHHMM());
  return timeToMins(hora) <= now && now < timeToMins(fin);
}

function progressPct(hora, fin) {
  const start = timeToMins(hora);
  const end   = timeToMins(fin);
  const now   = timeToMins(nowHHMM());
  if (end <= start) return 0;
  return Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
}

// ── STATE ─────────────────────────────────────────────────────
let currentTab = 'todos';
let searchQuery = '';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

// ── COUNTS ────────────────────────────────────────────────────
function updateCounts() {
  const favs = getFavs();
  const now  = nowHHMM();
  let nowCount = 0;
  CHANNELS.forEach(ch => {
    ch.programs.forEach(p => { if (isNow(p.hora, p.fin)) nowCount++; });
  });
  document.getElementById('countTodos').textContent  = CHANNELS.length;
  document.getElementById('countFavs').textContent   = favs.size;
  document.getElementById('countAhora').textContent  = nowCount;
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchesSearch(ch, q) {
  if (!q) return true;
  if (ch.name.toLowerCase().includes(q)) return true;
  return ch.programs.some(p =>
    p.titulo.toLowerCase().includes(q) ||
    (p.desc && p.desc.toLowerCase().includes(q)) ||
    (p.categoria && p.categoria.toLowerCase().includes(q))
  );
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('lista');
  const empty     = document.getElementById('emptyState');
  const favs      = getFavs();
  const q         = searchQuery.toLowerCase();

  let list = CHANNELS.filter(ch => {
    if (!matchesSearch(ch, q)) return false;
    if (currentTab === 'favoritos') return favs.has(ch.id);
    if (currentTab === 'ahora')     return ch.programs.some(p => isNow(p.hora, p.fin));
    return true;
  });

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.add('visible');
    const icons  = { todos:'🔭', favoritos:'⭐', ahora:'📡' };
    const msgs   = {
      todos: 'No se encontraron canales',
      favoritos: 'Aún no tienes favoritos.<br>Pulsa ★ en un canal para añadirlo.',
      ahora: 'No hay programas en antena ahora mismo.'
    };
    document.getElementById('emptyIcon').textContent = icons[currentTab];
    document.getElementById('emptyMsg').innerHTML    = msgs[currentTab];
    return;
  }

  empty.classList.remove('visible');

  // Favs first
  list.sort((a, b) => {
    const af = favs.has(a.id) ? 0 : 1;
    const bf = favs.has(b.id) ? 0 : 1;
    return af - bf || a.name.localeCompare(b.name);
  });

  const fragments = list.map((ch, idx) => {
    const isFav    = favs.has(ch.id);
    const delay    = Math.min(idx * 0.025, 0.4);
    const iconHTML = ch.icon
      ? `<img class="canal-icon" src="${esc(ch.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = ch.icon ? 'style="display:none"' : '';

    // Filter programs if searching
    let progs = ch.programs;
    if (q) {
      const chMatch = ch.name.toLowerCase().includes(q);
      if (!chMatch) {
        progs = progs.filter(p =>
          p.titulo.toLowerCase().includes(q) ||
          (p.desc && p.desc.toLowerCase().includes(q)) ||
          (p.categoria && p.categoria.toLowerCase().includes(q))
        );
      }
    }

    const progsHTML = progs.map(p => {
      const active  = isNow(p.hora, p.fin);
      const past    = !active && isPast(p.hora, p.fin);
      const catTag  = p.categoria ? `<span class="prog-cat">${esc(p.categoria)}</span>` : '';
      const nowBadge = active ? `<span class="ahora-badge">▶ ahora</span>` : '';
      const descHTML = p.desc ? `<div class="desc">${esc(p.desc)}</div>` : '';
      const progressHTML = active && p.fin
        ? `<div class="prog-progress"><div class="prog-progress-fill" style="width:${progressPct(p.hora,p.fin)}%"></div></div>`
        : '';

      return `<div class="programa${active?' ahora':''}${past?' pasado':''}">
        <div class="hora-col">
          <span class="hora">${esc(p.hora)}</span>
          ${p.fin ? `<span class="fin-hora">${esc(p.fin)}</span>` : ''}
        </div>
        <span class="prog-emoji">${p.emoji||'📡'}</span>
        <div class="prog-body">
          <span class="titulo">${esc(p.titulo)}</span>
          <div class="prog-meta">${catTag}${nowBadge}</div>
          ${descHTML}
          ${progressHTML}
        </div>
      </div>`;
    }).join('');

    // Start collapsed if no current program and not a fav
    const hasNow = ch.programs.some(p => isNow(p.hora, p.fin));
    const collapsed = !hasNow && !isFav && currentTab === 'todos' ? 'collapsed' : '';

    return `<div class="canal-card ${collapsed} ${isFav?'is-fav':''}" data-id="${esc(ch.id)}" style="animation-delay:${delay}s">
      <div class="canal-header">
        <div class="canal-header-left" onclick="toggleCard(this)">
          ${iconHTML}
          <div class="canal-icon-placeholder" ${placeholderStyle}>📺</div>
          <div>
            <div class="canal-nombre">${esc(ch.name)}</div>
            <div class="canal-count">${progs.length} programas</div>
          </div>
        </div>
        <div class="canal-actions">
          <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${esc(ch.id)}')" title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}">★</button>
          <span class="canal-chevron" onclick="toggleCard(this)">▾</span>
        </div>
      </div>
      <div class="programas-list">${progsHTML}</div>
    </div>`;
  });

  container.innerHTML = fragments.join('');
  updateCounts();
}

// ── TOGGLE COLLAPSE ───────────────────────────────────────────
function toggleCard(el) {
  el.closest('.canal-card').classList.toggle('collapsed');
}

// ── SEARCH ────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
let searchTimer;

searchInput.addEventListener('input', function () {
  searchQuery = this.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  render();
  searchInput.focus();
});

// ── BACK TO TOP ───────────────────────────────────────────────
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateCounts();
  render();
  document.getElementById('loadingScreen').classList.add('hidden');

  // Auto-refresh counts every minute
  setInterval(() => { updateCounts(); render(); }, 60000);
});
</script>
</body>
</html>
