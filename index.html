ón de palabras", "desc": "Un famoso escritor lee su nuevo libro ante una multitud de admiradores. Se trata de la historia de un novelista fracasado que encuentra un manuscrito. Decide publicarlo como suyo y consigue un gran éxito. El autor original es un anciano que lo escribió en su juventud, en plena Segunda Guerra Mundial, época en la que encontró al amor de su vida.", "categoria": "FILM", "emoji": "📡"}, {"hora": "08:27", "fin": "10:07", "titulo": "Dragonfly: La sombra de la libélula", "desc": "El jefe de urgencias del Chicago Memorial Hospital, el doctor Joe Darrow, es un respetado traumatólogo, pero su dilatada experiencia profesional no le sirve de mucho cuando su mujer fallece trágicamente en accidente de autobús durante una misión médica en Venezuela. Seis meses después, el cuerpo de Emily sigue sin aparecer y Joe no consigue superar el dolor por su pérdida. Entonces empieza a captar señales que parecen indicarle que ella quiere comunicarse con él. Extrañas formas abstractas con aspecto de libélula empiezan a aparecer en todo lo que lo rodea, para decirle que mire más allá para encontrar la respuesta a sus preguntas.", "categoria": "FILM", "emoji": "📡"}, {"hora": "10:07", "fin": "13:20", "titulo": "¿Conoces a Joe Black?", "desc": "Por un lado, Susan se encuentra en un restaurante y comienza a hablar con un desconocido que se ha fijado en ella. Conversan durante un buen rato y después cada quién se va por su lado. El chico queda tan impactado con ella que, una vez en la calle, cruza sin mirar y es arrollado brutalmente por un camión. Por otro lado, la muerte siente curiosidad por ver cómo es ser un mortal y decide tomar, temporalmente, el cuerpo del chico muerto para ver qué se siente. Así, la muerte se presenta ante William Parrish, un hombre mayor y acaudalado, a punto de cumplir años, que sabe que no le queda mucho de vida, y que está preparando una gran fiesta de despedida. La muerte, que se hace llamar Joe Black, y que ha venido a llevárselo, le propone irano, especialista en las relaciones entre tecnologías informáticas y poder, se enfrenta esta semana a nuestro gran reto. Nos ha hablado, entre otras cosas, de la inteligencia artificial, de sus peligros, de por qué Elon Musk en un narcisista, Peter Thiel un psicópata y de por qué nuestro picante es peor que cualquier magnate tecnológico. Disfruta de una nueva entrega de A las Bravas.", "categoria": "None", "emoji": "📡"}, {"hora": "14:32", "fin": "15:38", "titulo": "CARA C", "desc": "Leire Martínez: Nuevo Disco, Un Pasado En Orquestas Y La Oreja De Van Gogh Cara C En Los40 Podcast. Leire Martínez ha sido durante 17 años la vocalista de La oreja de Van Gogh. Pero esa etapa forma parte del pasado. Ahora emprende una nueva era en solitario con la ilusión de la que sabe que ha encontrado su camino, el que le hace feliz. Historias de aquella niña es el resultado de este nuevo camino que ha tomado. Del disco, de su grupo, de la maternidad, la conciliación familiar o, incluso, de Saiko y la forma en la que las nuevas generaciones entienden el amor ha hablado con ella Cris Regatero en Cara C. Sin dejar de lado su adolescencia, su paso por distintos talentos como Operación Triunfo o su experiencia como actriz. Una mujer camaleónica con mucha verdad en su discurso y dispuesta a hablar de todo.", "categoria": "None", "emoji": "📡"}, {"hora": "15:38", "fin": "16:25", "titulo": "Tercer Acto", "desc": "Tercer Acto Antonia Zegers: “si Una Mujer No Cumple Con La Maternidad, Hay Un Castigo Bíblico; Si Es Un Hombre, No Pasa Nada”. En el séptimo episodio del videopodcast ‘Tercer Acto’, la actriz reflexiona sobre los papeles para las mujeres mayores en su oficio, la necesidad de que los hombres se sumen a la revolución femenina y la importancia de saber romper una relación sin perder a la antigua pareja y construir una nueva familia.", "categoria": "None", "emoji": "📡"}, {"hora": "16:25", "fin": "16:46", "titulo": "¿Y tú qué miras?", "desc": "¿y Tú Qué Miras? Con Carlos Franganillo: \"hoy En Día Es Mucho Más Difícil Tener Control Sobre Lo Que Ven Tus Hijos\". El periodista y presentador de informativos, Carlos Franganillo, se reúne con Mariola Cubells para realizar el cuestionario de '¿Y tú qué miras?' Donde ambos harán un recorrido audiovisual por todos aquellos programas, series y películas que les han marcado a lo largo de sus vidas.", "categoria": "None", "emoji": "📡"}, {"hora": "16:46", "fin": "18:03", "titulo": "Ni tan bien", "desc": "Ni Tan Bien 02x33 Aimar Bretos, La Inspiración De Ayuso Y La Jubilación. Aimar Bretos (aka EL RIGOR en persona) nos visita para hablar de su salto a la televisión: “La noche de Aimar” y de la ilusión de las primeras veces, las conversaciones pausadas y el volver a ejercitar nuestra capacidad de escucha (no es hacer burpees con las orejas). Laura sigue con mala pata, literal y metafóricamente. Aunque en su sección aparece a saludar por sorpresa Fran Perea (si vuelve otra vez al programa tendremos que ponerlo en nómina). Nos habla de lo que tiene en común con La Sirenita: ella también quiere tener dos pies. Luego descubrimos la inspiración de Isabel Díaz Ayuso (literalmente hablamos con su inspiración). Una movIDA. Charlie nos cuenta que le ha parado por la calle un fan para pedirle un favorcillo y cómo lleva lo de tener 36 años y que aún le queden 31 para jubilarse. No le hemos dicho que sigue pareciendo que tiene 18 para que no se flipe. El final del programa lo dedicamos a comentar la noticia sobre unos noruegos que hacen un simpa, pero acabamos hablando de bancos de esperma. Yo qué sé. Igual al final todo es un sueño de Resines.", "categoria": "None", "emoji": "📡"}, {"hora": "18:03", "fin": "18:30", "titulo": "Es noticia en El País", "desc": "El repaso a alguna de las noticias de la semana tal y como las ha contando en vídeo EL PAIS. Entrevistas, reportajes, actualidad política, información del continente americano. Una visión global de lo que sucede en el mundo desde la perspectiva de los periodistas del pe "hora": "13:38", "fin": "13:46", "titulo": "El tiempo 1", "desc": "La información meteorológica de la Comunidad de Madrid, con Antonio López, Elena Miñambres, Ainhoa González y Sara Valle.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "13:46", "fin": "14:40", "titulo": "Planeta hostil: Océanos", "desc": "Escarbamos bajo la superficie del hábitat más extenso de la Tierra: nuestros océanos, con el fin de descubrir un mundo de extremos extraordinarios, desde apabullantes profundidades a tormentosas costas, pasando por vastos desiertos azules y arrecifes de coral superpoblados. Los océanos constituyen ambientes dinámicos, donde los animales deben adaptarse a una vida de cambios constantes. Descubrimos cómo las focas eluden a los tiburones, cómo las tortugas arriesgan sus vidas para engendrar a la siguiente generación y cómo las ingeniosas orcas luchan por su supervivencia frente a una competición siempre en aumento.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "14:40", "fin": "15:30", "titulo": "Humedales maravillosos", "desc": "El agua es la clave de la vida. Proporciona refugio a innumerables plantas y animales, desde gatos amantes del agua y aves depredadoras hasta libélulas asesinas y follaje carnívoro. Puede ser un vivero, una parada migratoria, una despensa y un hogar.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:30", "fin": "15:55", "titulo": "Grandes viajes en tren: España 2ª parte", "desc": "El viaje comienza en Andalucía, en Granada, donde Philippe Gougler, nuestro trotamundos ferroviario descubre la granada, el fruto mítico y misterioso de 365 granos. Después, ponemos rumbo a Madrid, la capital de España, gracias al tren de alta velocidad español conocido como «El Pato», debido a la forma de su « pico ». En Madrid, Philippe se deja llevar por el ambiente, sobre todo el que hay dentro del tren de Cervantes, con un Don Quijote ¡que parece auténtico! Descubre también un tren matinal.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "1 // ── THEME ─────────────────────────────────────────────────────
const html      = document.documentElement;
const toggle    = document.getElementById('themeToggle');
const thumb     = document.getElementById('toggleThumb');
const metaTheme = document.getElementById('meta-theme');

function applyTheme(dark) {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  thumb.textContent = dark ? '🌙' : '☀️';
  metaTheme.content = dark ? '#080c1a' : '#f0f4ff';
  localStorage.setItem('epg-theme', dark ? 'dark' : 'light');
  toggle.checked = dark;
}

const savedTheme = localStorage.getItem('epg-theme');
applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
toggle.addEventListener('change', () => applyTheme(toggle.checked));

// ── FAVORITES ─────────────────────────────────────────────────
function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem('epg-favs') || '[]')); }
  catch { return new Set(); }
}

function saveFavs(set) {
  localStorage.setItem('epg-favs', JSON.stringify([...set]));
}

function toggleFav(chId) {
  const favs = getFavs();
  if (favs.has(chId)) { favs.delete(chId); } else { favs.add(chId); }
  saveFavs(favs);
  // Update button in DOM
  const card = document.querySelector(`.canal-card[data-id="${chId}"]`);
  if (card) {
    const btn = card.querySelector('.fav-btn');
    const isFav = favs.has(chId);
    btn.classList.toggle('active', isFav);
    card.classList.toggle('is-fav', isFav);
  }
  updateCounts();
  // Re-render if we're on favs tab
  if (currentTab === 'favoritos') render();
}

// ── TIME ──────────────────────────────────────────────────────
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function timeToMins(hhmm) {
  if (!hhmm) return -1;
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function isPast(hora, fin) {
  const now = timeToMins(nowHHMM());
  if (fin) return timeToMins(fin) <= now;
  return timeToMins(hora) < now - 60;
}

function isNow(hora, fin) {
  if (!fin) return false;
  const now = timeToMins(nowHHMM());
  return timeToMins(hora) <= now && now < timeToMins(fin);
}

function progressPct(hora, fin) {
  const start = timeToMins(hora);
  const end   = timeToMins(fin);
  const now   = timeToMins(nowHHMM());
  if (end <= start) return 0;
  return Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
}

// ── STATE ─────────────────────────────────────────────────────
let currentTab = 'todos';
let searchQuery = '';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

// ── COUNTS ────────────────────────────────────────────────────
function updateCounts() {
  const favs = getFavs();
  const now  = nowHHMM();
  let nowCount = 0;
  CHANNELS.forEach(ch => {
    ch.programs.forEach(p => { if (isNow(p.hora, p.fin)) nowCount++; });
  });
  document.getElementById('countTodos').textContent  = CHANNELS.length;
  document.getElementById('countFavs').textContent   = favs.size;
  document.getElementById('countAhora').textContent  = nowCount;
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchesSearch(ch, q) {
  if (!q) return true;
  if (ch.name.toLowerCase().includes(q)) return true;
  return ch.programs.some(p =>
    p.titulo.toLowerCase().includes(q) ||
    (p.desc && p.desc.toLowerCase().includes(q)) ||
    (p.categoria && p.categoria.toLowerCase().includes(q))
  );
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('lista');
  const empty     = document.getElementById('emptyState');
  const favs      = getFavs();
  const q         = searchQuery.toLowerCase();

  let list = CHANNELS.filter(ch => {
    if (!matchesSearch(ch, q)) return false;
    if (currentTab === 'favoritos') return favs.has(ch.id);
    if (currentTab === 'ahora')     return ch.programs.some(p => isNow(p.hora, p.fin));
    return true;
  });

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.add('visible');
    const icons  = { todos:'🔭', favoritos:'⭐', ahora:'📡' };
    const msgs   = {
      todos: 'No se encontraron canales',
      favoritos: 'Aún no tienes favoritos.<br>Pulsa ★ en un canal para añadirlo.',
      ahora: 'No hay programas en antena ahora mismo.'
    };
    document.getElementById('emptyIcon').textContent = icons[currentTab];
    document.getElementById('emptyMsg').innerHTML    = msgs[currentTab];
    return;
  }

  empty.classList.remove('visible');

  // Favs first
  list.sort((a, b) => {
    const af = favs.has(a.id) ? 0 : 1;
    const bf = favs.has(b.id) ? 0 : 1;
    return af - bf || a.name.localeCompare(b.name);
  });

  const fragments = list.map((ch, idx) => {
    const isFav    = favs.has(ch.id);
    const delay    = Math.min(idx * 0.025, 0.4);
    const iconHTML = ch.icon
      ? `<img class="canal-icon" src="${esc(ch.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = ch.icon ? 'style="display:none"' : '';

    // Filter programs if searching
    let progs = ch.programs;
    if (q) {
      const chMatch = ch.name.toLowerCase().includes(q);
      if (!chMatch) {
        progs = progs.filter(p =>
          p.titulo.toLowerCase().includes(q) ||
          (p.desc && p.desc.toLowerCase().includes(q)) ||
          (p.categoria && p.categoria.toLowerCase().includes(q))
        );
      }
    }

    const progsHTML = progs.map(p => {
      const active  = isNow(p.hora, p.fin);
      const past    = !active && isPast(p.hora, p.fin);
      const catTag  = p.categoria ? `<span class="prog-cat">${esc(p.categoria)}</span>` : '';
      const nowBadge = active ? `<span class="ahora-badge">▶ ahora</span>` : '';
      const descHTML = p.desc ? `<div class="desc">${esc(p.desc)}</div>` : '';
      const progressHTML = active && p.fin
        ? `<div class="prog-progress"><div class="prog-progress-fill" style="width:${progressPct(p.hora,p.fin)}%"></div></div>`
        : '';

      return `<div class="programa${active?' ahora':''}${past?' pasado':''}">
        <div class="hora-col">
          <span class="hora">${esc(p.hora)}</span>
          ${p.fin ? `<span class="fin-hora">${esc(p.fin)}</span>` : ''}
        </div>
        <span class="prog-emoji">${p.emoji||'📡'}</span>
        <div class="prog-body">
          <span class="titulo">${esc(p.titulo)}</span>
          <div class="prog-meta">${catTag}${nowBadge}</div>
          ${descHTML}
          ${progressHTML}
        </div>
      </div>`;
    }).join('');

    // Start collapsed if no current program and not a fav
    const hasNow = ch.programs.some(p => isNow(p.hora, p.fin));
    const collapsed = !hasNow && !isFav && currentTab === 'todos' ? 'collapsed' : '';

    return `<div class="canal-card ${collapsed} ${isFav?'is-fav':''}" data-id="${esc(ch.id)}" style="animation-delay:${delay}s">
      <div class="canal-header">
        <div class="canal-header-left" onclick="toggleCard(this)">
          ${iconHTML}
          <div class="canal-icon-placeholder" ${placeholderStyle}>📺</div>
          <div>
            <div class="canal-nombre">${esc(ch.name)}</div>
            <div class="canal-count">${progs.length} programas</div>
          </div>
        </div>
        <div class="canal-actions">
          <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${esc(ch.id)}')" title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}">★</button>
          <span class="canal-chevron" onclick="toggleCard(this)">▾</span>
        </div>
      </div>
      <div class="programas-list">${progsHTML}</div>
    </div>`;
  });

  container.innerHTML = fragments.join('');
  updateCounts();
}

// ── TOGGLE COLLAPSE ───────────────────────────────────────────
function toggleCard(el) {
  el.closest('.canal-card').classList.toggle('collapsed');
}

// ── SEARCH ────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
let searchTimer;

searchInput.addEventListener('input', function () {
  searchQuery = this.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  render();
  searchInput.focus();
});

// ── BACK TO TOP ───────────────────────────────────────────────
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateCounts();
  render();
  document.getElementById('loadingScreen').classList.add('hidden');

  // Auto-refresh counts every minute
  setInterval(() => { updateCounts(); render(); }, 60000);
});
</script>
