les de París están fuera de la ley y rodeados de muros. No hay ni policía, ni hospitales ni escuelas para los habitantes de los distritos más peligrosos. El 13 es el más peligroso de todos y allí, Taha, es el amo indiscutible con un control absoluto sobre el crimen. En el mismo barrio vive Leito, un hombre de una rara integridad que se niega a aceptar que las drogas circulen por el barrio. En un golpe a los traficantes, Leito destruye un importante alijo de heroína y Taha secuestra a su hermana como represalia. Un policía enviado a la zona para encontrar una potente bomba se alía con Leito y entre ambos tratarán de desactivar el explosivo y encontrar a la hermana de Leito.", "categoria": "FILM", "emoji": "📡"}, {"hora": "07:45", "fin": "09:45", "titulo": "Pelham 1, 2, 3", "desc": "Azul, Verde, Gris y Marrón son cuatro criminales que han preparado un audaz plan para secuestrar un vagón de metro. Ellos son un exconductor expulsado de la compañía del metropolitano, un coronel mercenario, un exmafioso y un cuarto y misterioso personaje. El esquema del asalto ha sido ideado por Azul, que quiere pedir a la policía, después de ocupar una unidad de transporte con diecisiete personas, un rescate de un millón de dólares. Para ello, y con un plan de fuga perfectamente trazado a través de los túneles, fruto de sus muchos años conduciendo trenes y conociéndose perfectamente recovecos y salidas ocultas de la red, desenganchan un vagón de un convoy reteniendo en él a todos los pasajeros. Amenazan con que por cada hora que pase sin recibir el dinero pedido, matarán a un rehén. El teniente Zachary Z Garber, de la policía de Nueva York, se hace cargo del caso.", "categoria": "FILM", "emoji": "📡"}, {"hora": "09:45", "fin": "12:00", "titulo": "Reglas de compromiso", "desc": "El Coronel Terry Childers es un veterano marine, un oficial condecorado con experiencia de combate en Vietnam, Beirut y Tormenta del Desierto, todo un patriota, un héroe. Pero ahora el país a quien tan bien ha servido lo ha procesado por una misión de rescate que no terminó bien. Como abogado ha elegido al Coronel Hays Hodges, un camarada de armas que le debe la vida a Childers. Hodges no es el mejor abogado en servicio, pero Childers confía en él como un hermano de la Marina que sabe lo que es jugarse la vida bajo el fuego. Atrapado por el deber y por la amistad, Hodges acepta el caso de mala gana, incluso empieza a dudar del hombre que salvó su vida en Vietnam treinta años antes.", "categoria": "FILM", "emoji": "📡"}, {"hora": "12:00", "fin": "13:30", "titulo": "Leones por corderos", "desc": "Una veterana periodista televisiva debe entrevistar en Washington a Jasper, un senador republicano con aspiraciones presidenciales que está a punto de soltar una noticia bomba sobre una nueva estrategia bélica contra el terrorismo en Afganistán e Irak. Mientras tanto, en Los Ángeles, un idealista profesor se enfrenta a un alumno privilegiado que está a punto de tirar toda su prometedora carrera por la borda. Al mismo tiempo, pero esta vez en Afganistán, dos jóvenes enrolados en el ejército americano luchan por su supervivencia en una zona montañosa huyendo de los talibanes.", "categoria": "FILM", "emoji": "📡"}, {"hora": "13:30", "fin": "16:00", "titulo": "Chernóbil 1986", "desc": "Alexey, un bombero en la central eléctrica, es acompañado por Valery, un ingeniero, y Boris, un buzo militar, en una peligrosa misión para drenar el agua del depósito debajo del reactor en llamas.", "categoria": "FILM", "emoji": "📡"}, {"hora": "16:00", "fin": "17:30", "titulo": "Getaway", "desc": "Brent Magna es un conductor de coches de carreras que se ve abocado a tomar las riendas de una misión cuando su esposa es secuestrada. Brent contará con la ayuda de una joven 'hacker', pero su única esperanza de salvar a su esposa será seguir las órdenes de la misteriosa voz que vigila todos sus movimientos mediante cámaras montadas en el coche de Brent.", "categoria": "FILM", "emoji": "📡"}, {"hora": "17:30", "fin": " esde la perspectiva de los periodistas del periódico.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "12:27", "fin": "13:36", "titulo": "Sastre y Maldonado", "desc": "Sastreymaldonado El Informativo 3x31. Como en cada episodio, este también ha seguido un guion de manera escrupulosa. Aunque conviene decir que la actualidad ha sido tanta en la hora previa a la grabación que no había más que imaginar a Miguel como presentador de informativos (no hay que imaginar mucho porque se ha puesto muy en el papel) y luego escuchar a Sastre contando lo que acababa de pasar, empezando por la imputación de Zapatero. Con eso y con el resumen de las elecciones andaluzas se ha ido prácticamente la hora.", "categoria": "None", "emoji": "📡"}, {"hora": "13:36", "fin": "14:29", "titulo": "A las Bravas 4x34 Mara Torres: \"La reina Letizia me dijo una frase que me pareció fundamental\"", "desc": "Periodista, escritora de diez y todo un faro en la SER. Mara Torres se enfrenta a nuestro gran reto y hemos comprobado que nuestras patatas la han hecho hablar por hablar. En la 2 noticias abrirían con su sufrimiento, aunque ha aguantado como un faro contra las olas del picante. Disfruta de una nueva entrega de A las Bravas.", "categoria": "None", "emoji": "📡"}, {"hora": "14:29", "fin": "15:35", "titulo": "CARA C", "desc": "Manuel Turizo: Apambichao, La Reina Del Flow, Nicky Jam O Alejandro Sanz Cara C En Los40 Podcast. Manuel Turizo ha lanzado Ampambichao, un álbum que nos muestra su tierra, sus raíces y sus orígenes con colaboraciones con artistas como Maluma o Emilia. De eso ha hablado con Cris Regatero en Cara C. También de su infancia, sus primeros éxitos con Una lady como tú y Déjala que vuelva. Ha confesado algo sobre La reina del flow y ha recordado cómo conoció a Nicky Jam. Y no ha tenido reparos en hablar de su mood fiestero con Grupo Frontera o Alejandro Sanz y qué música hay en sus playlists, entre otras cosas. Más cercano que nunca y con ganas de cantar.", "categoria": "None", "emoji": ón para que se acabe el mundo. Pues pulsadlo ya, pesaos. Charlie Pee, nuestro fuet sin gluten, metió sin querer el bono metro en la lavadora, pero a diferencia de nuestra salud mental, su bono metro sigue funcionando. Nos cuenta que lleva meses pagando (sin saberlo) a una compañía telefónica sin tener ni siquiera línea con ellos. Me ha desbloqueado un nuevo miedo. Al final hablamos sobre una riña en un edificio en Santiago de Compostela por parte de los adultos a sus vecinos estudiantes, pero con una curiosa propuesta de paz. Esto nos hace revivir cómo eran Carol, Laura y Charlie cuando estudiaban. Sí, estas chicas tienen estudios.", "categoria": "None", "emoji": "📡"}, {"hora": "18:00", "fin": "18:27", "titulo": "Es noticia en El País", "desc": "El repaso a alguna de las noticias de la semana tal y como las ha contando en vídeo EL PAIS. Entrevistas, reportajes, actualidad política, información del continente americano. Una visión global de lo que sucede en el mundo desde la perspectiva de los periodistas del periódico.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "18:27", "fin": "18:36", "titulo": "AS Maurice Greene y el secreto de los velocistas de leyenda", "desc": "Maurice Greene, oro olímpico en Sidney 2000, charla con Santi Castañeda en París y ofrece tanto espectáculo como en la pista. La carrera perfecta, Noah Lyles y Sha’ Carrie Richardson, el G.O.A.T. de los 100 metros lisos... Puro show de velocista en el aniversario de los Juegos.", "categoria": "None", "emoji": "📡"}, {"hora": "18:36", "fin": "18:57", "titulo": "AS ‘Secuestro atajado’: la increíble lección de vida de Claudio Tamburrini", "desc": "Entrevista en profundidad con el exportero Claudio Tamburrini, secuestrado durante la dictadura de Videla en Argentina. El rapto, la tortura, la fuga 120 días después en la que volvió a nacer, la final del Mundial 78 para sanar ya en libertad, el juicio, el perdón, la memoria...", "categoria": "None", "emoji": "📡"}, {"hora": "18:57", "fin": "20:04", "titulo": "  de vida y el bienestar, promoviendo hábitos de vida beneficiosos.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "11:55", "fin": "12:00", "titulo": "Madrid desde el aire: El corazón del invierno", "desc": "Serie documental que muestra hasta el último rincón de la comunidad madrileña desde el cielo. La serie constituye un documento imprescindible para conocer los espacios naturales de Madrid y el valor histórico de sus construcciones y pueblos.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "12:00", "fin": "13:10", "titulo": "Telenoticias 1", "desc": "Telenoticias 1, con Víctor Arribas y Cristina Ortega ofreciendo una información cercana y directa con especial atención a todo lo ocurrido en la Comunidad de Madrid.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "13:10", "fin": "13:35", "titulo": "Hora Deportiva", "desc": "Espacio dedicado al deporte con entrevistas, reportajes y humor. Presentado por Javier Callejo y Juanma Cueto, el programa destacará lo más importante del día aunque también habrá tiempo para el entretenimiento y el análisis de los expertos colaboradores.", "categoria": "SPORTS", "emoji": "⚽"}, {"hora": "13:35", "fin": "13:45", "titulo": "El tiempo 1", "desc": "La información meteorológica de la Comunidad de Madrid, con Antonio López, Elena Miñambres, Ainhoa González y Sara Valle.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "13:45", "fin": "14:40", "titulo": "Planeta hostil: Montañas", "desc": "Las montañas más altas de la Tierra albergan leopardos de las nieves, águilas reales y cabras montesas. Pero solo los animales más fuertes son capaces de soportar el clima extremo, la escasez de alimentos y el oxígeno limitado en dichas alturas. Planeta Hostil presenta el comportamiento animal como nunca antes se había filmado, utilizando una tecnología innovadora que logra captar nuevos ángulos y escalas,  brindando así un acceso exclusivo a uno de los entornos más extremos del planeta.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "14:40", "fin": "15:30", "titulo": "Mentes animales: Las construcciones", "desc": "Durante millones de años, los termiteros fueron las construcciones más altas del mundo. ¿Significa esto que las termitas tienen un cerebro superior? ¿Una especie de inteligencia social? Ciertamente significa que las termitas son diferentes.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:30", "fin": "15:55", "titulo": "Grandes viajes en tren: Taiwán 1ª parte", "desc": "Del tamaqo de la Bretaqa, Taiwan es una isla particular, con un estatus diferenciado en Asia. Para descubrirla, lo mas sencillo es tomar el tren y conocer a los taiwaneses y su cultura a lo largo de esos viajes.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "15:55", "fin": "16:45", "titulo": "Viajes alucinantes en tren: Escocia", "desc": "Hoy viajamos por las Tierras Altas escocesas desde Inverness hasta Edimburgo. Por el camino nos espera el Parque Nacional de Cairngorm, fabulosos paisajes y valles ricos en folclore.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "16:45", "fin": "17:30", "titulo": "Viajes alucinantes en tren: California", "desc": "Desde la frontera mexicana en San Diego, seguimos la costa californiana hacia el norte, hasta la ciudad de San Luis Obispo, a bordo del bien llamado Pacific Surfliner.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "17:30", "fin": "18:25", "titulo": "Corcega, la belleza mediterranea", "desc": "Córcega es la cuarta isla más grande del Mediterráneo y un territorio auténtico y preservado.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "18:25", "fin": "19:25", "titulo": "Egipto eterno: El Nilo", "desc": "El Nilo definió a Egipto como país agrícola, ydominarlo y controlarlo ha sido su máxima prioridad. El Egipto contemporáneo cumple con ese deseo de los faraones, pero desde la construcción de la Presa de Asuán, la cultura nubia parece abocada a la desaparición.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:25", "fin": "19:50", "t  que no brillan lo que deben a causa de sus estereotipados personajes. Como curiosidad, entre el reparto, destaca Maria Rohm, esposa de Towers y protagonista de muchas de sus producciones.", "categoria": "FILM", "emoji": "📡"}, {"hora": "15:30", "fin": "17:30", "titulo": "Ciudad Real Madrid", "desc": "Programa deportivo que incluye los partidos de la fábrica en directo y toda la actualidad del Real Madrid: Primer equipo, baloncesto y cantera. Con la última hora de la Liga española y las principales ligas internacionales.", "categoria": "SPORTS", "emoji": "⚽"}, {"hora": "17:30", "fin": "19:35", "titulo": "Real Madrid Conecta", "desc": "Programa que repasa la actualidad y la última hora blanca a través de entrevistas y debates con leyendas del fútbol y el baloncesto del equipo madridista.", "categoria": "SPORTS", "emoji": "⚽"}, {"hora": "19:35", "fin": "21:30", "titulo": "¡Puños fuera!", "desc": "El comisario Rizzo, célebre en Nápoles por su corpulencia y su afición a repartir puñetazos, viaja a Sudáfrica para investigar un caso de tráfico de drogas y diamantes. Con la colaboración del ex policía Caputo y del pequeño Bodo, conseguirá zafarse de la persecución a que se ve sometido en cuanto llega a Johannesburgo, y logrará reunir pistas que le lleven hasta el cerebro de la operación.", "categoria": "FILM", "emoji": "📡"}, {"hora": "21:30", "fin": "23:00", "titulo": "El legado de las mentiras", "desc": "'Thriller' de acción y espionaje de alto nivel protagonizado por Scott Adkins, un veterano del cine de acción con títulos a sus espaldas como \"Los mercenarios 2\", \"Triple amenaza\", \"Boyka: Invicto 4\" o \"Accident Man\", se pone en la piel del protagonista, Martin Baxter, un exagente del MI6 centrado ahora en sacar adelante a su precoz hija de 12 años, mientras trata de superar los errores de su pasado en violentas peleas clandestinas. Ahora, sin embargo, deberá regresar al espionaje dentro de las altas esferas, donde descubrirá una impactante verdad sobre ciertas operaciones realizadas por servicios secretos desconocidos.", "categoria": "FILM", "emoji": "📡"}]}, {"id": "RTVE_Cocina.TV", "name": "RTVE_Cocina.TV", "icon": "", "programs": [{"hora": "00:26", "fin": "00:58", "titulo": "Torres en la cocina - Risotto escarolas y solomillo de cerdo", "desc": "Risotto de escarolas y solomillo de cerdo. Con la campeona mundial de natación sincronizada Gemma Mengual los hermanos Torres van a preparar un risotto de escarolas, y también un solomillo de cerdo relleno con una salsa muy especial con base de zanahorias.", "categoria": "None", "emoji": "📡"}, {"hora": "00:58", "fin": "01:29", "titulo": "Torres en la cocina - Raviolis de gambas y flan de coco", "desc": "Hoy acompaña a Javier y Sergio Cayetana G. Cuervo. Juntos preparan unos raviolis de gambas con estragón, pero sin pasta y un flan de coco con fresas y menta.", "categoria": "None", "emoji": "📡"}, {"hora": "01:29", "fin": "02:00", "titulo": "Torres en la cocina - Ensalada tomate,cerezas. Lomo relleno", "desc": "Ensalada de tomate y cerezas. Lomo relleno. Hoy tomates rellenos de queso con una salsa poco común y muy sabrosa, con cerezas. De segundo, un lomo ibérico abierto como un libro, en el que hermanos Torres insertarán una pasta de foie y chalota.", "categoria": "None", "emoji": "📡"}, {"hora": "02:00", "fin": "02:31", "titulo": "Torres en la cocina - San Jacobos brócoli. Tarta de manzana", "desc": "San Jacobos de brócoli. Tarta de manzana. La cantante malagueña Nuria Fergó ayuda a elaborar unos San Jacobos hechos de brócoli, muy sabrosos pero al mismo tiempo muy ligeros.", "categoria": "CULTURE", "emoji": "📡"}, {"hora": "02:31", "fin": "03:03", "titulo": "Torres en la cocina - Ensalada cigalas. Mejillones cachelos", "desc": "Ensalada de cigalas. Mejillones con cachelos. Hoy desde Ogrove paraíso de mariscos y otros productos excelentes, Javier y Sergio preparan una ensalada de cigalas con algas de primero, y almejas y mejillones acompañados de cachelos o patatas gallegas. Les acomp n cestero que cuenta con un Premio Nacional de Artesanía y a un técnico encargado de vigilar la salud de los ríos. En la cocina de Diego Ferrer, este les sorprende con Rebozuelos con alubias y callos de bacalao.", "categoria": "None", "emoji": "📡"}, {"hora": "05:25", "fin": "05:54", "titulo": "El señor de los bosques - Sierra de Montsant. Tarragona", "desc": "Programa de naturaleza que nos muestra los bosques de España.", "categoria": "None", "emoji": "📡"}, {"hora": "05:54", "fin": "06:22", "titulo": "El señor de los bosques - Gargantilla del Lozoya", "desc": "En la Gargantilla del Lozoya, en plena sierra madrileña, el periodista Quico Taronjí recorre con Vicente Sevilla este entorno rico en encinas, robles y fuentes de agua. En el camino, descubren unos falsos níscalos de la encina, una pipa, unos pie azul y unos Páxilo enrollado. Durante la ruta, conversan con una bióloga experta en aves migratorias y con Carolina, una química que les explica la importancia de los principios activos de las plantas medicinales. En la cocina, el chef Diego Ferrer les propone una receta de repollo relleno de arroz basmati, pimentón, gambas y los pie azul.", "categoria": "None", "emoji": "📡"}, {"hora": "06:22", "fin": "06:51", "titulo": "El señor de los bosques - Hoces del río Duratón", "desc": "Las Hoces del Duratón son meandros encajonados por paredes de roca caliza, en el noroeste de la provincia de Segovia. Vicente Sevilla y el compositor y director de orquesta Luis Cobos encuentran un tipo de arbusto, el bonetero, y setas como las tricolomas, las orejas de Judas y una seta de racimo.", "categoria": "None", "emoji": "📡"}, {"hora": "06:51", "fin": "07:43", "titulo": "Cocina al punto- Jamón ibérico \"Dehesa de Extremadura\"", "desc": "Hoy, Javier Peña se desplaza hasta Extremadura para descubrir todos los secretos del jamón ibérico Denominación de Origen Dehesa Extremeña. Ya en los fogones, el chef y Tamara cocinan: Trampantojo de callos y Tarrina de paté ibérico con mermelada de to // ── THEME ─────────────────────────────────────────────────────
const html      = document.documentElement;
const toggle    = document.getElementById('themeToggle');
const thumb     = document.getElementById('toggleThumb');
const metaTheme = document.getElementById('meta-theme');

function applyTheme(dark) {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  thumb.textContent = dark ? '🌙' : '☀️';
  metaTheme.content = dark ? '#080c1a' : '#f0f4ff';
  localStorage.setItem('epg-theme', dark ? 'dark' : 'light');
  toggle.checked = dark;
}

const savedTheme = localStorage.getItem('epg-theme');
applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
toggle.addEventListener('change', () => applyTheme(toggle.checked));

// ── FAVORITES ─────────────────────────────────────────────────
function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem('epg-favs') || '[]')); }
  catch { return new Set(); }
}

function saveFavs(set) {
  localStorage.setItem('epg-favs', JSON.stringify([...set]));
}

function toggleFav(chId) {
  const favs = getFavs();
  if (favs.has(chId)) { favs.delete(chId); } else { favs.add(chId); }
  saveFavs(favs);
  // Update button in DOM
  const card = document.querySelector(`.canal-card[data-id="${chId}"]`);
  if (card) {
    const btn = card.querySelector('.fav-btn');
    const isFav = favs.has(chId);
    btn.classList.toggle('active', isFav);
    card.classList.toggle('is-fav', isFav);
  }
  updateCounts();
  // Re-render if we're on favs tab
  if (currentTab === 'favoritos') render();
}

// ── TIME ──────────────────────────────────────────────────────
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function timeToMins(hhmm) {
  if (!hhmm) return -1;
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function isPast(hora, fin) {
  const now = timeToMins(nowHHMM());
  if (fin) return timeToMins(fin) <= now;
  return timeToMins(hora) < now - 60;
}

function isNow(hora, fin) {
  if (!fin) return false;
  const now = timeToMins(nowHHMM());
  return timeToMins(hora) <= now && now < timeToMins(fin);
}

function progressPct(hora, fin) {
  const start = timeToMins(hora);
  const end   = timeToMins(fin);
  const now   = timeToMins(nowHHMM());
  if (end <= start) return 0;
  return Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
}

// ── STATE ─────────────────────────────────────────────────────
let currentTab = 'todos';
let searchQuery = '';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

// ── COUNTS ────────────────────────────────────────────────────
function updateCounts() {
  const favs = getFavs();
  const now  = nowHHMM();
  let nowCount = 0;
  CHANNELS.forEach(ch => {
    ch.programs.forEach(p => { if (isNow(p.hora, p.fin)) nowCount++; });
  });
  document.getElementById('countTodos').textContent  = CHANNELS.length;
  document.getElementById('countFavs').textContent   = favs.size;
  document.getElementById('countAhora').textContent  = nowCount;
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchesSearch(ch, q) {
  if (!q) return true;
  if (ch.name.toLowerCase().includes(q)) return true;
  return ch.programs.some(p =>
    p.titulo.toLowerCase().includes(q) ||
    (p.desc && p.desc.toLowerCase().includes(q)) ||
    (p.categoria && p.categoria.toLowerCase().includes(q))
  );
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('lista');
  const empty     = document.getElementById('emptyState');
  const favs      = getFavs();
  const q         = searchQuery.toLowerCase();

  let list = CHANNELS.filter(ch => {
    if (!matchesSearch(ch, q)) return false;
    if (currentTab === 'favoritos') return favs.has(ch.id);
    if (currentTab === 'ahora')     return ch.programs.some(p => isNow(p.hora, p.fin));
    return true;
  });

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.add('visible');
    const icons  = { todos:'🔭', favoritos:'⭐', ahora:'📡' };
    const msgs   = {
      todos: 'No se encontraron canales',
      favoritos: 'Aún no tienes favoritos.<br>Pulsa ★ en un canal para añadirlo.',
      ahora: 'No hay programas en antena ahora mismo.'
    };
    document.getElementById('emptyIcon').textContent = icons[currentTab];
    document.getElementById('emptyMsg').innerHTML    = msgs[currentTab];
    return;
  }

  empty.classList.remove('visible');

  // Favs first
  list.sort((a, b) => {
    const af = favs.has(a.id) ? 0 : 1;
    const bf = favs.has(b.id) ? 0 : 1;
    return af - bf || a.name.localeCompare(b.name);
  });

  const fragments = list.map((ch, idx) => {
    const isFav    = favs.has(ch.id);
    const delay    = Math.min(idx * 0.025, 0.4);
    const iconHTML = ch.icon
      ? `<img class="canal-icon" src="${esc(ch.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = ch.icon ? 'style="display:none"' : '';

    // Filter programs if searching
    let progs = ch.programs;
    if (q) {
      const chMatch = ch.name.toLowerCase().includes(q);
      if (!chMatch) {
        progs = progs.filter(p =>
          p.titulo.toLowerCase().includes(q) ||
          (p.desc && p.desc.toLowerCase().includes(q)) ||
          (p.categoria && p.categoria.toLowerCase().includes(q))
        );
      }
    }

    const progsHTML = progs.map(p => {
      const active  = isNow(p.hora, p.fin);
      const past    = !active && isPast(p.hora, p.fin);
      const catTag  = p.categoria ? `<span class="prog-cat">${esc(p.categoria)}</span>` : '';
      const nowBadge = active ? `<span class="ahora-badge">▶ ahora</span>` : '';
      const descHTML = p.desc ? `<div class="desc">${esc(p.desc)}</div>` : '';
      const progressHTML = active && p.fin
        ? `<div class="prog-progress"><div class="prog-progress-fill" style="width:${progressPct(p.hora,p.fin)}%"></div></div>`
        : '';

      return `<div class="programa${active?' ahora':''}${past?' pasado':''}">
        <div class="hora-col">
          <span class="hora">${esc(p.hora)}</span>
          ${p.fin ? `<span class="fin-hora">${esc(p.fin)}</span>` : ''}
        </div>
        <span class="prog-emoji">${p.emoji||'📡'}</span>
        <div class="prog-body">
          <span class="titulo">${esc(p.titulo)}</span>
          <div class="prog-meta">${catTag}${nowBadge}</div>
          ${descHTML}
          ${progressHTML}
        </div>
      </div>`;
    }).join('');

    // Start collapsed if no current program and not a fav
    const hasNow = ch.programs.some(p => isNow(p.hora, p.fin));
    const collapsed = !hasNow && !isFav && currentTab === 'todos' ? 'collapsed' : '';

    return `<div class="canal-card ${collapsed} ${isFav?'is-fav':''}" data-id="${esc(ch.id)}" style="animation-delay:${delay}s">
      <div class="canal-header">
        <div class="canal-header-left" onclick="toggleCard(this)">
          ${iconHTML}
          <div class="canal-icon-placeholder" ${placeholderStyle}>📺</div>
          <div>
            <div class="canal-nombre">${esc(ch.name)}</div>
            <div class="canal-count">${progs.length} programas</div>
          </div>
        </div>
        <div class="canal-actions">
          <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${esc(ch.id)}')" title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}">★</button>
          <span class="canal-chevron" onclick="toggleCard(this)">▾</span>
        </div>
      </div>
      <div class="programas-list">${progsHTML}</div>
    </div>`;
  });

  container.innerHTML = fragments.join('');
  updateCounts();
}

// ── TOGGLE COLLAPSE ───────────────────────────────────────────
function toggleCard(el) {
  el.closest('.canal-card').classList.toggle('collapsed');
}

// ── SEARCH ────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
let searchTimer;

searchInput.addEventListener('input', function () {
  searchQuery = this.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  render();
  searchInput.focus();
});

// ── BACK TO TOP ───────────────────────────────────────────────
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateCounts();
  render();
  document.getElementById('loadingScreen').classList.add('hidden');

  // Auto-refresh counts every minute
  setInterval(() => { updateCounts(); render(); }, 60000);
});
</script>
