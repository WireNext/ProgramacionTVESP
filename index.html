 askotariko mini-pizzak. Saio hau sare sozialetan ikusitako menu bati eskainita dago, eta era askotariko mini-pizzak prestatuko ditugu. Lehen irteeran, Bilboko Cervecería Mexicana La Atómicara joango gara; han, ganba-aguachile bat prestatuko digute. Eguneko bigarren irteeran, Inés Basterra influencerrarekin izango gara, bere errezeta biralen atalean, eta hark gazta eta tipulaz egindako mokadu kurruskari bat prestatuko digu. Ikuspegi gastronomikotik, mini-pizzak egiteko orea behar bezala moldatzen eta mozten ikasiko dugu; eta ikuspegi nutrizionaletik, elikagaien mini bertsioek errazioak kontrolatzen benetan laguntzen duten ala ez aztertuko dugu. Azkenik, gure ezagutza-pilulan, José Miguel Muleten eskutik, barazkien etorkizuna elikagai erakargarriagoen zaporea lortzetik datorren ala ez jakingo dugu; krispeten zaporea duten tomate berriekin gertatzen den bezala, adibidez.", "categoria": "None", "emoji": "📡"}, {"hora": "04:28", "fin": "04:43", "titulo": "Momentos Historias a bocados", "desc": "Artajona", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "04:43", "fin": "04:56", "titulo": "Momentos Historias a bocados", "desc": "Artziniega", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "04:56", "fin": "05:47", "titulo": "Todo el Mundo a la Mesa", "desc": "Labastida. Labastida tradizio eta zaporearen eszenatoki bihurtzen da: plazako karpan patatak txorizoarekin prestatzen dira, eta bertako ohiturak eta lanbideak ezagutzen dira, hala nola kanpai-hotsa, artzainen dantza eta mahatsaren prentsaketa lagarrean. Arabako kultura eta gastronomiaren esentzia ezagutzeko ibilbidea.", "categoria": "None", "emoji": "📡"}, {"hora": "05:47", "fin": "06:34", "titulo": "Historias a Bocados", "desc": "Berastegi. Atal honetan, Hung Fai Idiazabal Gaztaren unibertsoan sartuko da bete-betean, Gazpio gaztandegiko historia ezagutu eta ibilbideari ekingo dio. Jose Ignacio Ugartemendiak kudeatzen duen gaztandegian, saioko sukaldari berriak gozatu ederra hartuko du ardi latxen artean, arkume jaio berriei titia hartzen lagunduz eta gaztagintzan topera murgilduz. Halaber, saioan gizendu ere egingo dela konturatuko da, gaztandegitik ateratzen diren esneki guztiak dastatu ondoren. Orobat, Hung Faik Susana Iturralde Kildalen historiaren berri izango du Berastegin. Postari gisa lan egiteaz gainera (sukaldariak, gutunak eta paketeak aukeratuz postari lanean lagunuko dio), emakume hau  duela 100 urte Tolosaldera Mustad enpresarekin lanera etorri ziren norvegiarretako baten biloba da. Norvegiarrak ez ziren bakarrik etorri Gipuzkoara, negu giroko bizitza ekarri zuten beraiekin eta baita eski alpinoa Euskal Herrira ere. Norvegiar zaporea izango du, berebat Susanak Hung Fairi prestatuko dion postreak. Bestalde, Anderrek guztia handia den leku berezira bisita egingo du: tailerra, zurezko eskulturak eta Luis Erasoren bihotza guztia da oso handi. Berastegiarrak hainbat neurritako motozerrekin egiten dituen eskultura erraldoiak ikusita, ahoa bete hortz geldituko da aurkezlea. Urtero, udan, gizon hau bere tresna guztiak hartuta Euskal Herrian barrena ibiltzen da. Bere ibileren berri emango dio Anderri, honek itsas zapoa parrillan prestatu eta jaten duten bitartean.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "06:34", "fin": "07:25", "titulo": "Historias a Bocados", "desc": "Gatika. Ander Gonzalezek eta Hung Faik Gatikara bisita egingo dute, elkarrekin aurkezten duten azken saioa honetan, Anderrek Hong Kongeko sukaldariari behin betikoz lekukoa pasa aurretik. Hung Faik Miren Ardeoren behiak eroso eta luxu artean bizi direla ikusi ahal izango du zuzen-zuzenean: koltxoien gainean atseden hartuz, hozbero egokian, hazkagailu automatikoekin... Animalien ongizatea zaintzearen helburua produktibitatearen eta produktuaren kalitatea hobetzea da: esnea. Hung Faik, berriz, Mireni hegaluze gorriaren Tatakia barazkiekin prestatuz sukaldaritzarako duen trebetasuna erakutsiko dio. Hung Faik, halaber, Itziar Etxebarriak eta David Torrek osatutako bikotearen historia ezagutuko du. Fruitu arbolen mintegi bat du bikoteak. Itziarrek sagarrondoa nola landatzen den erakutsiko dio eta Davidek sagardotako sagarrondoak nola inausten diren. Biekin, Hung Faik sagarrarekin egindako hainbat produktu dastatu ahal izango ditu: sagar gozokia, sagar erreak eta sagar konpota. Bestalde, Ander idi probetan murgilduko da. Jose Ramon Bilbao eta Jon Ander semea bere idi parea entrenatzen ari dira lehiaketetarako prest izan daitezen, eta sukaldariak animaliak apaintzen eta uztartzen parte hartuko du.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "07:25", "fin": "08:16", "titulo": "A Bocados", "desc": "2024-02-12 19:05:23", "categoria": "None", "emoji": "📡"}, {"hora": "08:16", "fin": "08:48", "titulo": "Eitb Kultura", "desc": "Mutis, Zineb Sedira, Olaia Aguayo eta Gari Arambarri. ¿Cuerpos que se entregan a aquello que va a desaparecer¿ du izena Mutis espazioak abian jarri duen aurreneko dantza ikuskizunak. Olatz De Andrés da zuzendaria eta dantzarien gehiengoa Mutiseko lehen eta bigarren promoziokoak. ¿Standing here wondering which way to go¿ izeneko erakusketa ikusgai dago Tabakaleran. Zineb Sedira artista frantziar-aljeriarrak kulturaz, erresistentziaz, denboraz zein identitateaz hausnartzen du lau eszenatan banatutako proiektu honetan. Maiatzaren 14an estreinatu zen ¿Jone, Batzuetan¿ filma Primeran plataforman. Aitzakia hori baliatuta, filmeko protagonista den Olaia Aguayorekin elkartu gara Aprikanon, bere kultur proposamenak ezagutzeko. Gaur egun ezinbestekoa da Gari Arambarrirentzat irudia analgoikoan jasotzea. Hainbat pelikula esperimental egin ditu materia, keinua eta paisaiaren inguruan hausnartzeko. Esku artean duen ¿Biharrak marrazteko gaurrak behar dira¿ proiektua ere erakutsi digu.", "categoria": "None", "emoji": "📡"}, {"hora": "08:48", "fin": "09:44", "titulo": "Euskadiko Orkestra 2024-2025", "desc": "Verdi. Giuseppe Verdiren 'Zingerren korua'. Il Trovatore. Orkestra zuzendari: Christoph-Mathias Mueller, Gorka Mirandak gidatutako 120 herrit n caso en el que un sádico desconocido está atacando a jóvenes de la alta sociedad de Washington.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "15:15", "fin": "16:25", "titulo": "C.S.I. NY", "desc": "Sanción en la jugada. Una hermosa futbolista aparece muerta en el hidromasaje de llos vestuarios y el equipo se da cuenta de que la competición no era limpia. Desde el oscuro pasado del entrenador hasta la rivalidad entre los miembros del equipo y al mundo de la cirugía plástica, el equipo tendrá que descubrir la verdad que se esconde tras un conflicto de intereses y alianzas.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "16:25", "fin": "17:10", "titulo": "C.S.I. NY", "desc": "Amor de sangre. El CSI se ve incolucrado en el oscuro mundo del culto al vampirismo moderno. Para éste, compartir sangre es la base de una excéntrica y supuestamente espiritual rama de la religión. Una joven es encontrada muerta por exanguinación en Central Park, con el lóbulo de la oreja cortado y una marca punzante en su cuello.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "17:10", "fin": "18:05", "titulo": "C.S.I. NY", "desc": "La fórmula. El CSI se ve inmerso en el  mundo de la Fórmula 1 para investigar la muerte de un legendario piloto de carreras en la explosión de un coche dos días antes del Grand Prix. Pronto se darán cuenta de que la velocidad, la adrenalina y los espónsors no es todo lo que está en juego en el mundo de las carreras profesionales, y mucho menos en el equipo en el equipo al que investigan.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "18:05", "fin": "19:00", "titulo": "C.S.I. NY", "desc": "Regla de incertidumbre. El CSI investiga los horribles resultados de una fiesta de cumpleaños donde los planes se convierten en algo que no merece la pena celebrar. Con pocas preguntas y difíciles de responder, el equipo tendrá que explotar todas sus habilidades.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "19:00", "fin": "19:55", "titulo": "C.S.I. NY", "desc": "El c ma truculenta cuando el cuerpo de uno de ellos aparece debajo de un bloque de hormigón.", "categoria": "SERIES", "emoji": "📺"}, {"hora": "23:25", "fin": "00:10", "titulo": "C.S.I. NY", "desc": "Punto de vista. Mac es testigo por casualidad de algunos extraños sucesos desde su apratamento relacionados con un caso abierto. Cuando parace que la investigación se enfría, Mac volverá a presenciar de nuevo peligrosos y sorprendente hechos que implican a alguien que conoce bien.", "categoria": "SERIES", "emoji": "📺"}]}, {"id": "Euronews.TV", "name": "Euronews.TV", "icon": "", "programs": [{"hora": "00:00", "fin": "00:15", "titulo": "Euronews Week-End", "desc": "Espacio informativo que ofrece las noticias más destacadas de la actualidad.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "00:15", "fin": "00:30", "titulo": "Euronews Week-End", "desc": "Espacio informativo que ofrece las noticias más destacadas de la actualidad.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "00:30", "fin": "01:00", "titulo": "Euronews Week-End", "desc": "Espacio informativo que ofrece las noticias más destacadas de la actualidad.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "01:00", "fin": "01:15", "titulo": "5 minutes", "desc": "Las noticias internacionales y regionales de última hora, análisis y entrevistas.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "01:15", "fin": "01:30", "titulo": "5 minutes", "desc": "Las noticias internacionales y regionales de última hora, análisis y entrevistas.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "01:30", "fin": "02:00", "titulo": "5 minutes", "desc": "Las noticias internacionales y regionales de última hora, análisis y entrevistas.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "02:00", "fin": "02:05", "titulo": "5 minutes", "desc": "Las noticias internacionales y regionales de última hora, análisis y entrevistas.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "02:05", "fin": "02:29", "titulo": "News", "desc": "Informativo de la cadena Euronews que an otagonistas de la misma. El objetivo de ''Cine de barrio'' es difundir y promocionar el cine nacional, recuperando para el gran público las películas más entrañables de nuestro cine. Los protagonistas son los invitados, actores de la gran pantalla de toda la vida, que a parte de presentar el filme, informan de sus planes profesionales.Concha Velasco se encarga de conducir espacio, en sustitución de otra memorable actriz del cine español, Carmen Sevilla, quien a su vez había tomado el relevo de José Manuel Parada en la presentación del programa. Parada había sido responsable de la dirección y presentación de ''Cine de barrio'' desde su puesta en antena, el 10 de julio de 1995.", "categoria": "FILM", "emoji": "📡"}, {"hora": "17:30", "fin": "18:15", "titulo": "Cine", "desc": "None", "categoria": "FILM", "emoji": "📡"}, {"hora": "18:15", "fin": "18:55", "titulo": "Aquí la Tierra", "desc": "Jacob Petrus ofrece una original mirada sobre el territorio y sus habitantes a través de la meteorología. La divulgación y la información sobre el terreno conviven con el descubrimiento de la naturaleza y el medio ambiente.", "categoria": "None", "emoji": "📡"}, {"hora": "18:55", "fin": "19:25", "titulo": "Telediario 2 Fin de Semana", "desc": "Informativo de Televisión Española de los fines de semana. Marc Sala y Lourdes Maldonado se encargan de presentar las últimas noticias de ámbito nacional e internacional surgidas durante el día.", "categoria": "NEWS", "emoji": "📰"}, {"hora": "19:25", "fin": "19:30", "titulo": "Deportes 2", "desc": "Actualidad deportiva diaria nacional e internacional.", "categoria": "SPORTS", "emoji": "⚽"}, {"hora": "19:30", "fin": "20:05", "titulo": "Informe Semanal", "desc": "El programa más veterano de la televisión nacional/, y el más antiguo de su género en Europa/, ofrece la emisión de reportajes de la actualidad internacional/, nacional/, social o cultural. A veces/, los reportajes pueden llegar a tener hasta media hora de duración.", "categoria": "None", "emoji": "📡"}, {"hora": "20:05", "fin": "20:05", "titulo": "Un mar de enredos", "desc": "Un mimado y rico dueño de un yate llamado Leonardo Montenegro cae por la borda y pierde completamente la memoria. Se convierte entonces en el objetivo de una cruel venganza organizada por su empleada Kate Sullivan, una madre soltera que compagina múltiples trabajos para sacar adelante a sus hijos.Rob Greenberg, uno de los productores de la exitosa serie de televisión ''Cómo conocí a vuestra madre'', dirige su primer largometraje fuera del mundo de los telefilmes. Se trata de la nueva versión de la cinta ''Un mar de líos'', la comedia estrenada en 1987 con la pareja sentimental formada por Goldie Hawn y Kurt Russell como protagonistas.En esta ocasión, los encargados de interpretar a los personajes principales son el mexicano Eugenio Derbez (''Instrucciones para ser un latin lover'') y Anna Faris (''Una conejita en el campus''), una de las actrices recurrentes dentro de este género cinematográfico en Hollywood. Destaca la presencia de la televisiva Eva Longoria y John Hannah (''The Mummy (La momia)'') en los roles secundarios.", "categoria": "None", "emoji": "📡"}, {"hora": "20:05", "fin": "21:30", "titulo": "Cine", "desc": "None", "categoria": "FILM", "emoji": "📡"}, {"hora": "21:30", "fin": "21:50", "titulo": "Cine", "desc": "None", "categoria": "FILM", "emoji": "📡"}, {"hora": "21:50", "fin": "23:10", "titulo": "Adictos al amor", "desc": "Linda es una profesora que decide marcharse a Manhattan después de recibir una atractiva oferta de trabajo. Su novio, Sam, al ver que no quiere regresar, decide ir en su busca a la ciudad de los rascacielos, donde descubre que su amada yace en los brazos de otro. De repente, aparece Maggie, la ex del nuevo novio de Linda, que le propone a Sam unirse en pareja vengativa para terminar con el noviazgo de sus amados.Esta comedia sentimental significó la 'opera prima' como director del actor de ''¡Jo, qué noche!'' Griffin Dune. Protagonizada por dos ha s pies. Desde un campo en Aberdeenshire donde aparece el concepto mismo de tiempo, pasando por el fantasmal perfil de un jardín ornamental perdido, hasta el descubrimiento de cientos de hornos de pizza que una vez alimentaron a las poderosas legiones de Roma, el presentador James Crawford nos revela cómo nuestros antepasados escribieron su historia sobre el paisaje de Escocia.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "19:10", "fin": "20:00", "titulo": "Secretos de la antigua China: La Pompeya china", "desc": "Gracias a las nuevas tecnologías, Allan Maca explora una antigua megaciudad perdida, una de las más grandes del planeta hace 4000 años. Pero, ¿por qué desapareció?", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "20:00", "fin": "21:00", "titulo": "Tumbas de Egipto: últimas excavaciones: Las momias olvidadas de Saqqara", "desc": "La necrópolis más grande del Antiguo Egipto, Saqqara, ha vuelto a desvelar un increíble tesoro arqueológico. En enero de 2021, se descubrieron más de cincuenta pozos funerarios, así como ataúdes y momias humanas de tres mil años de antigüedad.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "21:00", "fin": "22:00", "titulo": "Tumbas de Egipto: últimas excavaciones: Los misteriosos ataúdes egipcios", "desc": "En Saqqara, el equipo de científicos egipcios quiere encontrar las sepulturas escondidas en las profundidades del yacimiento. A los pies de la pirámide del faraón Teti hay decenas de ataúdes y momias milenarias nunca antes descubiertas.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "22:00", "fin": "23:40", "titulo": "Peligrosamente infiltrada", "desc": "Molly es una joven detective privada que trabaja para cubrir las deudas de su padre. Sus habilidades para fotografiar esposos infieles llama la atención de un agente del FBI, quien decide contratarla para ir de incógnito a una hermandad universitaria y proteger a la hija de un testigo que testificará contra unos importantes mafiosos. Para poder pasar n especial la sobrasada, y la repostería, sobre todo la típica ensaimada. Se explican procesos de elaboración, parámetros que se valoran en la cata, formas de degustación y su utilización culinaria. Histórico de emisiones: -01/09/2000 -08/11/2009 -24/08/2011.", "categoria": "None", "emoji": "📡"}, {"hora": "16:35", "fin": "17:06", "titulo": "A pedir de boca - Bonito del Norte", "desc": "Bonito del Norte.", "categoria": "None", "emoji": "📡"}, {"hora": "17:06", "fin": "17:35", "titulo": "El Señor de los bosques - María Botto", "desc": "Entre Cerezo de Arriba y Riaza, en la provincia de Segovia, se extiende un tupido bosque de pino albar y el camino natural de la Cañada Real Soriana. Un suelo rico en setas que esta vez descubrirá la actriz María Botto. Amante de la naturaleza, se dejará sorprender por la riqueza micológica del lugar.", "categoria": "None", "emoji": "📡"}, {"hora": "17:35", "fin": "18:03", "titulo": "El señor de los bosques - Santander", "desc": "Hoy visitaremos Cantabria, el Monte Corona, este lugar alberga un sorprendente bosque de Secuollas y el único hayedo y robledal al nivel del mar de la península ibérica. Mar y Montaña, dos lugares atractivos para la receta de mi amigo y cocinero Diego Ferrer, acompañados por Francine Gálvez.", "categoria": "None", "emoji": "📡"}, {"hora": "18:03", "fin": "18:32", "titulo": "El señor de los bosques - Córdoba", "desc": "Hoy os proponemos un viaje en el tiempo, conoceréis la provincia de Córdoba antes de que el hombre trasformara los encinares en dehesas y los acebuches en olivares. Vaís a conocer un fabuloso bosque mediterráneo el de la sierra de Cardeña y de Montoro, la cantante Merche nos acompañará en el recorrido.", "categoria": "None", "emoji": "📡"}, {"hora": "18:32", "fin": "19:00", "titulo": "El señor de los bosques - Cádiz", "desc": "Hoy nos vamos a buscar plantas y setas de primavera al lugar donde más llueve de España. a la Sierra de Grazalema en Cádiz. Este es un paraíso para las Orquídeas. Virginia y Raquel ganadoras de MasterChef, nos acompañarán en este recorrido por el campo y mostrarán su habilidad en los fogones.", "categoria": "None", "emoji": "📡"}, {"hora": "19:00", "fin": "19:29", "titulo": "El señor de los bosques - Sierra de Francia", "desc": "Miquel Silvestre, el protagonista viajero del programa de la 2, Diario de un nómada, nunca antes había estado en la sierra de Francia. Vicente le lleva a conocer este paraje donde descubren plantas acuáticas comestibles, setas con historia y artesanos de la madera.", "categoria": "None", "emoji": "📡"}, {"hora": "19:29", "fin": "19:57", "titulo": "El señor de los bosques - Hoyocasero, Avila", "desc": "El Pinar de Hoyocasero es un tesoro botánico desconocido, sus plantas en peligro de extinción lo hacen muy valioso. Antonio Carmona nos acompañará en esta ocasión y le enseñaremos el arte de este bosque.", "categoria": "None", "emoji": "📡"}, {"hora": "19:57", "fin": "20:46", "titulo": "Cocina al punto con Peña y Tamara - El pulpo", "desc": "El cocinero Javier Peña recorre España para buscar el mejor producto con el que prepara dos recetas desde su cocina junto a Tamara. Ágatha Ruiz de la Prada,Ana Guerra,Begoña Fraire,Blanca Padilla,Cecilia Gómez,Cristina Figueira,Javier García Peña,José Mota,María Gómez García,Miriam Diaz Aroca,Natalia de Molina,Rocío Muñoz,Santi Rodríguez,Soraya Arnelas,Tamara Falcó.", "categoria": "None", "emoji": "📡"}, {"hora": "20:46", "fin": "21:38", "titulo": "Cocina al punto con Peña y Tamara - Pimiento tap de cortí", "desc": "Hoy Peña visita Villafranca, Mallorca para conocer el cultivo del pimiento Tap de corti que es el que se usa para hacer el pimentón utilizado en la sobrasada. También cocina junto a Tamara: Sepia mallorquina y Empanadas mallorquinas para sorprender al chef Mundy. Ágatha Ruiz de la Prada,Ana Guerra,Begoña Fraire,Blanca Padilla,Cecilia Gómez,Cristina Figueira,Javier García Peña,José Mota,María Gómez García,Miriam Diaz Aroca,Natalia de Molina,Rocío Muñoz,Santi Rodríguez,Soray  se interna en una zona más arbolada, es la ribera del río Duratón, que en esta zona se retuerce en amplios y encañonados meandros que propician playas fluviales muy concurridas en época estival, quizá demasiado concurridas para el gusto del nómada.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "01:47", "fin": "02:13", "titulo": "Miquel Silvestre en Viajar: España: Castillo de Pedraza", "desc": "Miquel Silvestre tiene cita con otra monumental joya de la región, pero en este caso creada por la mano del hombre, de un hombre extraordinario que supo añadir al legado medieval de un pueblo empobrecido de la Castilla profunda toda la riqueza del arte pictórico de una España que quería coger el paso de una Europa que avanzaba. Lo entenderemos mejor cuando lleguemos a esa población que parece salida de un cuento de dragones, princesas y caballeros: Pedraza.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "02:13", "fin": "03:10", "titulo": "Aquí se hace", "desc": "Programa de reportajes en los que los madrileños y las madrileñas descubren la cantidad de productos que se consumen y fabrican en la comunidad.", "categoria": "DOCUMENTARY", "emoji": "🎥"}, {"hora": "03:10", "fin": "03:40", "titulo": "El punto sobre la historia", "desc": "David Botello y Lorenzo Gallardo recorrerán Madrid en bicicleta en busca de anécdotas de la historia de la ciudad, contándolas de una forma apasionante, desenfadada, divertida y con el máximo rigor.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "03:40", "fin": "03:45", "titulo": "Pongamos que hablo de Telemadrid", "desc": "Veintiocho años de historia audiovisual de Telemadrid ven la luz con este programa que rescata verdaderos tesoros que se conservan en el archivo gráfico de la cadena. Todos forman parte de la historia propia de los espectadores madrileños.", "categoria": "ENTERTAINMENT", "emoji": "🎭"}, {"hora": "03:45", "fin": "03:50", "titulo": "Pongamos que hablo de Telemadrid: Historias para no dormir", "desc": "Veintio // ── THEME ─────────────────────────────────────────────────────
const html      = document.documentElement;
const toggle    = document.getElementById('themeToggle');
const thumb     = document.getElementById('toggleThumb');
const metaTheme = document.getElementById('meta-theme');

function applyTheme(dark) {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  thumb.textContent = dark ? '🌙' : '☀️';
  metaTheme.content = dark ? '#080c1a' : '#f0f4ff';
  localStorage.setItem('epg-theme', dark ? 'dark' : 'light');
  toggle.checked = dark;
}

const savedTheme = localStorage.getItem('epg-theme');
applyTheme(savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
toggle.addEventListener('change', () => applyTheme(toggle.checked));

// ── FAVORITES ─────────────────────────────────────────────────
function getFavs() {
  try { return new Set(JSON.parse(localStorage.getItem('epg-favs') || '[]')); }
  catch { return new Set(); }
}

function saveFavs(set) {
  localStorage.setItem('epg-favs', JSON.stringify([...set]));
}

function toggleFav(chId) {
  const favs = getFavs();
  if (favs.has(chId)) { favs.delete(chId); } else { favs.add(chId); }
  saveFavs(favs);
  // Update button in DOM
  const card = document.querySelector(`.canal-card[data-id="${chId}"]`);
  if (card) {
    const btn = card.querySelector('.fav-btn');
    const isFav = favs.has(chId);
    btn.classList.toggle('active', isFav);
    card.classList.toggle('is-fav', isFav);
  }
  updateCounts();
  // Re-render if we're on favs tab
  if (currentTab === 'favoritos') render();
}

// ── TIME ──────────────────────────────────────────────────────
function nowHHMM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function timeToMins(hhmm) {
  if (!hhmm) return -1;
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function isPast(hora, fin) {
  const now = timeToMins(nowHHMM());
  if (fin) return timeToMins(fin) <= now;
  return timeToMins(hora) < now - 60;
}

function isNow(hora, fin) {
  if (!fin) return false;
  const now = timeToMins(nowHHMM());
  return timeToMins(hora) <= now && now < timeToMins(fin);
}

function progressPct(hora, fin) {
  const start = timeToMins(hora);
  const end   = timeToMins(fin);
  const now   = timeToMins(nowHHMM());
  if (end <= start) return 0;
  return Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
}

// ── STATE ─────────────────────────────────────────────────────
let currentTab = 'todos';
let searchQuery = '';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

// ── COUNTS ────────────────────────────────────────────────────
function updateCounts() {
  const favs = getFavs();
  const now  = nowHHMM();
  let nowCount = 0;
  CHANNELS.forEach(ch => {
    ch.programs.forEach(p => { if (isNow(p.hora, p.fin)) nowCount++; });
  });
  document.getElementById('countTodos').textContent  = CHANNELS.length;
  document.getElementById('countFavs').textContent   = favs.size;
  document.getElementById('countAhora').textContent  = nowCount;
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchesSearch(ch, q) {
  if (!q) return true;
  if (ch.name.toLowerCase().includes(q)) return true;
  return ch.programs.some(p =>
    p.titulo.toLowerCase().includes(q) ||
    (p.desc && p.desc.toLowerCase().includes(q)) ||
    (p.categoria && p.categoria.toLowerCase().includes(q))
  );
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('lista');
  const empty     = document.getElementById('emptyState');
  const favs      = getFavs();

    if (!matchesSearch(ch, q)) return false;
    if (currentTab === 'favoritos') return favs.has(ch.id);
    if (currentTab === 'ahora')     return ch.programs.some(p => isNow(p.hora, p.fin));
    return true;
  });

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.add('visible');
    const icons  = { todos:'🔭', favoritos:'⭐', ahora:'📡' };
    const msgs   = {
      todos: 'No se encontraron canales',
      favoritos: 'Aún no tienes favoritos.<br>Pulsa ★ en un canal para añadirlo.',
      ahora: 'No hay programas en antena ahora mismo.'
    };
    document.getElementById('emptyIcon').textContent = icons[currentTab];
    document.getElementById('emptyMsg').innerHTML    = msgs[currentTab];
    return;
  }

  empty.classList.remove('visible');

  // Favs first
  list.sort((a, b) => {
    const af = favs.has(a.id) ? 0 : 1;
    const bf = favs.has(b.id) ? 0 : 1;
    return af - bf || a.name.localeCompare(b.name);
  });

  const fragments = list.map((ch, idx) => {
    const isFav    = favs.has(ch.id);
    const delay    = Math.min(idx * 0.025, 0.4);
    const iconHTML = ch.icon
      ? `<img class="canal-icon" src="${esc(ch.icon)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = ch.icon ? 'style="display:none"' : '';

    // Filter programs if searching
    let progs = ch.programs;
    if (q) {
      const chMatch = ch.name.toLowerCase().includes(q);
      if (!chMatch) {
        progs = progs.filter(p =>
          p.titulo.toLowerCase().includes(q) ||
          (p.desc && p.desc.toLowerCase().includes(q)) ||
          (p.categoria && p.categoria.toLowerCase().includes(q))
        );
      }
    }

    const progsHTML = progs.map(p => {
      const active  = isNow(p.hora, p.fin);
      const past    = !active && isPast(p.hora, p.fin);
      const catTag  = p.categoria ? `<span class="prog-cat">${esc(p.categoria)}</span>` : '';
      const nowBadge = active ? `<span class="ahora-badge">▶ ahora</span>` : '';
      const descHTML = p.desc ? `<div class="desc">${esc(p.desc)}</div>` : '';
      const progressHTML = active && p.fin
        ? `<div class="prog-progress"><div class="prog-progress-fill" style="width:${progressPct(p.hora,p.fin)}%"></div></div>`
        : '';

      return `<div class="programa${active?' ahora':''}${past?' pasado':''}">
        <div class="hora-col">
          <span class="hora">${esc(p.hora)}</span>
          ${p.fin ? `<span class="fin-hora">${esc(p.fin)}</span>` : ''}
        </div>
        <span class="prog-emoji">${p.emoji||'📡'}</span>
        <div class="prog-body">
          <span class="titulo">${esc(p.titulo)}</span>
          <div class="prog-meta">${catTag}${nowBadge}</div>
          ${descHTML}
          ${progressHTML}
        </div>
      </div>`;
    }).join('');

    // Start collapsed if no current program and not a fav
    const hasNow = ch.programs.some(p => isNow(p.hora, p.fin));
    const collapsed = !hasNow && !isFav && currentTab === 'todos' ? 'collapsed' : '';

    return `<div class="canal-card ${collapsed} ${isFav?'is-fav':''}" data-id="${esc(ch.id)}" style="animation-delay:${delay}s">
      <div class="canal-header">
        <div class="canal-header-left" onclick="toggleCard(this)">
          ${iconHTML}
          <div class="canal-icon-placeholder" ${placeholderStyle}>📺</div>
          <div>
            <div class="canal-nombre">${esc(ch.name)}</div>
            <div class="canal-count">${progs.length} programas</div>
          </div>
        </div>
        <div class="canal-actions">
          <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${esc(ch.id)}')" title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}">★</button>
          <span class="canal-chevron" onclick="toggleCard(this)">▾</span>
        </div>
      </div>
      <div class="programas-list">${progsHTML}</div>
    </div>`;
  });

  container.innerHTML = fragments.join('');
  updateCounts();
}

// ── TOGGLE COLLAPSE ───────────────────────────────────────────
function toggleCard(el) {
  el.closest('.canal-card').classList.toggle('collapsed');
}

// ── SEARCH ────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
let searchTimer;

searchInput.addEventListener('input', function () {
  searchQuery = this.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  render();
  searchInput.focus();
});

// ── BACK TO TOP ───────────────────────────────────────────────
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateCounts();
  render();
  document.getElementById('loadingScreen').classList.add('hidden');

  // Auto-refresh counts every minute
  setInterval(() => { updateCounts(); render(); }, 60000);
});
</script>
</body>
</html>
